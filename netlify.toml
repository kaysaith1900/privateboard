# Netlify config · the public marketing site is built from public/home.html
# (the same file the app server serves locally at /home.html), with the
# assets it needs copied alongside. Single source of truth · public/ —
# editing the home page or shared assets in one place updates both the
# app and the deployed website.
[build]
  command = """
    rm -rf _site &&
    mkdir -p _site/fonts _site/avatars _site/vendor &&
    cp public/home.html _site/index.html &&
    cp public/favicon.svg public/themes.css public/agent-overlay.css public/agent-overlay.js _site/ &&
    cp public/voice-3d.js public/home-3d-loader.js public/home-3d-mock.js _site/ &&
    if [ -f public/home-3d-poster.webp ]; then cp public/home-3d-poster.webp _site/; fi &&
    if [ -f public/home-3d-poster.jpg ];  then cp public/home-3d-poster.jpg  _site/; fi &&
    cp public/vendor/three.module.min.js public/vendor/OrbitControls.js _site/vendor/ &&
    cp public/fonts/human-sans.woff2 public/fonts/agent-Italic.woff2 _site/fonts/ &&
    cp public/avatars/socrates.svg public/avatars/first-principles.svg public/avatars/value-investor.svg public/avatars/user-empathy.svg public/avatars/long-horizon.svg public/avatars/phenomenologist.svg public/avatars/chair.svg public/avatars/historian.svg _site/avatars/
  """
  publish = "_site"

# 404 fallback to home keeps deep-link typos friendly on the marketing site.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Long-cache fonts and svg avatars (immutable filenames).
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/avatars/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS / JS get a moderate cache — easy to invalidate by editing.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
