<!DOCTYPE html>
<!-- ==================================================================
     Bar Chart · adapted to anthropic-essay spine
     Source: kami bar-chart.html
     Migration: hex values → spine CSS variables
     (--paper / --paper-soft / --ink / --ink-mid / --ink-soft / --rule
      / --accent = --clay) so the chart inherits the spine's palette
     ================================================================== -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Bar chart · anthropic-essay spine</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* anthropic-essay spine tokens (mirror of public/report/spines/anthropic-essay.css) */
  :root {
    --paper:       #F4F0E8;
    --paper-soft:  #EDE6D6;
    --ink:         #1A1814;
    --ink-mid:     #6B6359;
    --ink-soft:    #978C7E;
    --ink-muted:   #B5AB9B;
    --rule:        #DDD5C8;
    --rule-soft:   #E8E1D2;
    --clay:        #CC785C;
    --clay-deep:   #A85A41;
    --accent:      var(--clay);
    --accent-deep: var(--clay-deep);
    --em:          #B65A3A;

    --serif: "Tiempos", "Charter", Georgia, serif;
    --sans:  -apple-system, "SF Pro Text", "Söhne", "Inter", system-ui, sans-serif;
    --mono:  "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 56px 32px;
  }

  .frame { max-width: 920px; width: 100%; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .eyebrow::before { content: "— "; }

  h1 {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.005em;
    line-height: 1.2;
    margin-bottom: 28px;
  }
  h1 em { color: var(--accent-deep); font-style: italic; }

  /* ===== KAMI CHART · figure + svg =====
     Class anatomy:
       .kami-chart            — figure wrapper
       .kc-svg                — the svg
       .kc-canvas             — full-bleed paper-soft rect background
       .kc-grid               — light horizontal gridlines
       .kc-baseline           — heavy x-axis baseline
       .kc-y-tick             — y-axis numeric labels
       .kc-y-unit             — vertical axis-name label
       .kc-bar                — every <rect> bar
         .kc-series-primary   — focal · brand accent
         .kc-series-secondary — neutral · ink-mid
         .kc-series-tertiary  — softer · ink-soft
       .kc-data-label         — number above each bar (primary is heavier)
       .kc-category-label     — group labels below baseline
       .kc-legend-text        — legend caption text
     .kc-caption              — editorial caption below the chart */
  .kami-chart {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 36px 44px 32px;
    margin: 32px 0;
  }
  .kami-chart > .kc-figheader {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .kami-chart > .kc-figheader .kc-fignum {
    font-family: var(--mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--accent-deep); font-weight: 600;
  }
  .kami-chart > .kc-figheader .kc-figtitle {
    font-family: var(--mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-mid);
  }

  .kami-chart svg.kc-svg {
    display: block;
    width: 100%;
    min-width: 480px;
    overflow: visible;
  }

  .kc-canvas { fill: var(--paper-soft); }
  .kc-grid { stroke: var(--rule-soft); stroke-width: 0.8; }
  .kc-baseline { stroke: var(--ink); stroke-width: 0.8; }
  .kc-y-tick {
    fill: var(--ink-soft);
    font: 10px var(--sans);
  }
  .kc-y-unit {
    fill: var(--ink-soft);
    font: 9px var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Bar series · spine accent for primary, neutrals for the rest */
  .kc-bar { transition: none; }
  .kc-bar.kc-series-primary   { fill: var(--accent); }
  .kc-bar.kc-series-secondary { fill: var(--ink-mid); }
  .kc-bar.kc-series-tertiary  { fill: var(--ink-soft); }

  .kc-data-label {
    fill: var(--ink);
    font: 10px var(--sans);
  }
  .kc-data-label.kc-primary { font-weight: 600; }
  .kc-category-label {
    fill: var(--ink);
    font: 11px var(--sans);
  }
  .kc-legend-divider { stroke: var(--rule); stroke-width: 0.8; }
  .kc-legend-swatch.kc-series-primary   { fill: var(--accent); }
  .kc-legend-swatch.kc-series-secondary { fill: var(--ink-mid); }
  .kc-legend-text {
    fill: var(--ink-mid);
    font: 10px var(--sans);
  }

  .kc-caption {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.7;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
    max-width: 60ch;
  }
  .kc-caption em { color: var(--accent-deep); font-style: italic; }
</style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">visual preview · kami bar-chart in anthropic-essay spine</p>
    <h1>What a kami chart looks like in our <em>spine palette</em></h1>

    <figure class="kami-chart">
      <div class="kc-figheader">
        <span class="kc-fignum">Figure 01</span>
        <span class="kc-figtitle">Time to ship · weeks per option</span>
      </div>

      <!-- ============================================================
           Chart area: x=60 y=40 w=560 h=280 · base y=320
           viewBox: 0 0 680 420
           Groups: 4 · group-width=140 · bar-width=32 · gap=8
           Scale: max=140 · 1 unit = 2px
           ============================================================ -->
      <svg class="kc-svg" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" aria-label="Bar chart">

        <rect class="kc-canvas" width="100%" height="100%"/>

        <!-- Horizontal gridlines -->
        <line class="kc-grid" x1="60" y1="320" x2="620" y2="320"/>
        <line class="kc-grid" x1="60" y1="280" x2="620" y2="280"/>
        <line class="kc-grid" x1="60" y1="240" x2="620" y2="240"/>
        <line class="kc-grid" x1="60" y1="200" x2="620" y2="200"/>
        <line class="kc-grid" x1="60" y1="160" x2="620" y2="160"/>
        <line class="kc-grid" x1="60" y1="120" x2="620" y2="120"/>
        <line class="kc-grid" x1="60" y1="80"  x2="620" y2="80"/>
        <line class="kc-grid" x1="60" y1="40"  x2="620" y2="40"/>

        <!-- Y-axis tick labels -->
        <text class="kc-y-tick" x="52" y="324" text-anchor="end">0</text>
        <text class="kc-y-tick" x="52" y="284" text-anchor="end">20</text>
        <text class="kc-y-tick" x="52" y="244" text-anchor="end">40</text>
        <text class="kc-y-tick" x="52" y="204" text-anchor="end">60</text>
        <text class="kc-y-tick" x="52" y="164" text-anchor="end">80</text>
        <text class="kc-y-tick" x="52" y="124" text-anchor="end">100</text>
        <text class="kc-y-tick" x="52" y="84"  text-anchor="end">120</text>
        <text class="kc-y-tick" x="52" y="44"  text-anchor="end">140</text>

        <!-- Y-axis vertical label -->
        <text class="kc-y-unit" x="16" y="184" transform="rotate(-90 16 184)" text-anchor="middle">WEEKS</text>

        <!-- X-axis baseline -->
        <line class="kc-baseline" x1="60" y1="320" x2="620" y2="320"/>

        <!-- ===== BARS =====
             Group centres: 130 / 270 / 410 / 550
             Series A bars at x: 94 / 234 / 374 / 514  (primary · brand accent)
             Series B bars at x: 134 / 274 / 414 / 554 (secondary · ink-mid) -->

        <!-- Group 1: 2021 -->
        <rect class="kc-bar kc-series-primary"   x="94"  y="232" width="32" height="88" rx="2"/>
        <rect class="kc-bar kc-series-secondary" x="134" y="256" width="32" height="64" rx="2"/>

        <!-- Group 2: 2022 -->
        <rect class="kc-bar kc-series-primary"   x="234" y="200" width="32" height="120" rx="2"/>
        <rect class="kc-bar kc-series-secondary" x="274" y="224" width="32" height="96"  rx="2"/>

        <!-- Group 3: 2023 -->
        <rect class="kc-bar kc-series-primary"   x="374" y="176" width="32" height="144" rx="2"/>
        <rect class="kc-bar kc-series-secondary" x="414" y="192" width="32" height="128" rx="2"/>

        <!-- Group 4: 2024 -->
        <rect class="kc-bar kc-series-primary"   x="514" y="144" width="32" height="176" rx="2"/>
        <rect class="kc-bar kc-series-secondary" x="554" y="168" width="32" height="152" rx="2"/>

        <!-- Data labels (number above each bar) -->
        <text class="kc-data-label kc-primary" x="110" y="228" text-anchor="middle">44</text>
        <text class="kc-data-label"            x="150" y="252" text-anchor="middle">32</text>
        <text class="kc-data-label kc-primary" x="250" y="196" text-anchor="middle">60</text>
        <text class="kc-data-label"            x="290" y="220" text-anchor="middle">48</text>
        <text class="kc-data-label kc-primary" x="390" y="172" text-anchor="middle">72</text>
        <text class="kc-data-label"            x="430" y="188" text-anchor="middle">64</text>
        <text class="kc-data-label kc-primary" x="530" y="140" text-anchor="middle">88</text>
        <text class="kc-data-label"            x="570" y="164" text-anchor="middle">76</text>

        <!-- X-axis category labels -->
        <text class="kc-category-label" x="130" y="340" text-anchor="middle">2021</text>
        <text class="kc-category-label" x="270" y="340" text-anchor="middle">2022</text>
        <text class="kc-category-label" x="410" y="340" text-anchor="middle">2023</text>
        <text class="kc-category-label" x="550" y="340" text-anchor="middle">2024</text>

        <!-- Legend -->
        <line class="kc-legend-divider" x1="60" y1="368" x2="620" y2="368"/>
        <rect class="kc-legend-swatch kc-series-primary"   x="60"  y="380" width="12" height="12" rx="2"/>
        <text class="kc-legend-text" x="78"  y="391">Option A · primary lane</text>
        <rect class="kc-legend-swatch kc-series-secondary" x="240" y="380" width="12" height="12" rx="2"/>
        <text class="kc-legend-text" x="258" y="391">Option B · alternate path</text>
      </svg>

      <p class="kc-caption">The primary lane (clay) ships <em>22% faster than the alternate</em>, with the gap widening each year. The alternate path's slower trend through 2024 closes the case for switching investment to the primary track.</p>
    </figure>
  </div>
</body>
</html>
