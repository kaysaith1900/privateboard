        <div class="cover-byline">
          <div class="byline-block">
            <div class="label">Filed</div>
            <div class="value">${escape(filedDate)}</div>
          </div>
          <div class="byline-block">
            <div class="label">Authors</div>
            <div class="value">
              ${members.length} director${members.length === 1 ? "" : "s"}
              ${members.length ? `<div class="signed-avatars">${signed}</div>` : ""}
            </div>
          </div>
          <div class="byline-block">
            <div class="label">Subject</div>
            <div class="value">${subjectShort}</div>
          </div>
          <div class="byline-block">
            <div class="label">Doc ID</div>
            <div class="value" style="font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;">${escape(docId || "—")}</div>
          </div>
        </div>
      </header>

      <article class="body" data-report-body>${renderMarkdown(brief.bodyMd || "_(empty brief)_")}</article>

      <div class="foot-rule">// end of brief · boardroom</div>

      <!-- Colophon · the "growth" surface. Always rendered. The card
           inside (brand mark + tagline + URL) appears in both screen
           and PDF — that's the part designed to travel with a shared
           PDF and tell the recipient where to try the product. The
           share-CTA strip appears only on screen, prompting the
           current reader to download + share the PDF. -->
      <aside class="colophon" aria-label="About PrivateBoard">
        <div class="colophon-share">
          <button type="button" class="colophon-share-btn" data-download data-download-bottom>
            <span class="colophon-share-icon" aria-hidden="true">↓</span>
            <span class="colophon-share-label">Download PDF · share this brief</span>
          </button>
          <p class="colophon-share-hint">Send the PDF to anyone — they'll see the full styled report and a footer with where to try PrivateBoard themselves.</p>
        </div>

        <div class="colophon-card" aria-hidden="true">
          <span class="colophon-rule" aria-hidden="true"></span>
          <span class="colophon-eyebrow">a brief generated with</span>
          <span class="colophon-brand">
            <svg class="colophon-mark" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" role="img" aria-label="PrivateBoard">
              <rect class="colophon-mark-bg" width="16" height="16"/>
              <rect class="colophon-mark-fg" x="3"  y="2"  width="2" height="2"/>
              <rect class="colophon-mark-fg" x="7"  y="2"  width="2" height="2"/>
              <rect class="colophon-mark-fg" x="11" y="2"  width="2" height="2"/>
              <rect class="colophon-mark-fg" x="2"  y="4"  width="12" height="2"/>
              <rect class="colophon-mark-fg" x="1"  y="7"  width="14" height="2"/>
              <rect class="colophon-mark-fg" x="2"  y="10" width="1"  height="4"/>
              <rect class="colophon-mark-fg" x="13" y="10" width="1"  height="4"/>
            </svg>
            <span class="colophon-name">PrivateBoard</span>
          </span>
          <span class="colophon-cta-url">privateboard.ai</span>
        </div>
      </aside>
    `;

    // ── Post-render pass · tag specific sections + inline badges so
    //    CSS can apply distinctive treatments. Idempotent and tolerant
    //    to missing sections (a report may skip Frame Shift, etc.).
    decorateReport(document.querySelector("[data-report-body]"));

    // Render any mermaid blocks. Wrapped in try/catch — a syntax error in
    // one diagram should not blank the whole report. The mermaid script is
    // deferred, so it may not be available the instant `load()` resolves;
    // poll up to 5s before giving up and leaving the raw fenced text in
    // place as a graceful fallback.
    if (document.querySelector(".mermaid")) {
      const mermaid = await new Promise((resolve) => {
        if (window.mermaid) return resolve(window.mermaid);
        let elapsed = 0;
        const t = setInterval(() => {
          if (window.mermaid) { clearInterval(t); resolve(window.mermaid); }
          else if ((elapsed += 50) > 5000) { clearInterval(t); resolve(null); }
        }, 50);
      });
      if (mermaid) {
        try {
          // Pick mermaid theme variables based on the active spine.
          // Each spine uses neutral quadrant fills (no colored tints —
          // all four quadrants share one fill for a clean Gartner / BCG
          // matrix look) and the spine's accent for plotted points.
          const spineKey = (brief.spine && SPINES.has(brief.spine)) ? brief.spine : "boardroom-dark";
          const themes = {
            "boardroom-dark": {
              base: "dark",
              vars: {
                background: "#131312",
                quadrantFill: "#1A1A18",
                quadrantText: "#B6B0A2",
                pointFill: "#C8C5BE",
                pointText: "#8E8B83",
                titleFill: "#C8C5BE",
                axisText: "#8E8B83",
                border: "#3A3A35",
                inner: "#2A2A26",
              },
              fontFamily: '"Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif',
            },
            "a16z-thesis": {
              base: "default",
              vars: {
                background: "#F7F3E8",
                quadrantFill: "#F7F3E8",
                quadrantText: "#57503F",
                pointFill: "#14110C",
                pointText: "#14110C",
                titleFill: "#14110C",
                axisText: "#847B65",
                border: "#BCB39A",
                inner: "#DCD3BD",
              },
              fontFamily: '"Inter", "Helvetica Neue", -apple-system, system-ui, sans-serif',
            },
            "anthropic-essay": {
              base: "default",
              vars: {
                background: "#FAF7F0",
                quadrantFill: "#F4F0E8",
                quadrantText: "#6B6359",
                pointFill: "#1A1814",
                pointText: "#4A4338",
                titleFill: "#1A1814",
                axisText: "#978C7E",
                border: "#DDD5C8",
                inner: "#E8E1D2",
              },
              fontFamily: '"Charter", "Source Serif Pro", "Iowan Old Style", Georgia, serif',
            },
            "gartner-note": {
              base: "default",
              vars: {
                background: "#FFFFFF",
                quadrantFill: "#FAFBFC",
                quadrantText: "#455364",
                pointFill: "#0A4DA1",
                pointText: "#1A2332",
                titleFill: "#1A2332",
                axisText: "#6B7785",
                border: "#BFC8D3",
                inner: "#DDE2E8",
              },
              fontFamily: '"Inter", "Helvetica Neue", Arial, sans-serif',
            },
            "mckinsey-deck": {
              base: "default",
              vars: {
                background: "#FFFFFF",
                quadrantFill: "#FBFCFD",
                quadrantText: "#4A5870",
                pointFill: "#2251FF",
                pointText: "#051C2C",
                titleFill: "#051C2C",
                axisText: "#758296",
                border: "#B8C2D0",
                inner: "#D5DCE4",
              },
              fontFamily: '"Inter", "Helvetica Neue", Arial, sans-serif',
            },
            "openai-paper": {
              base: "default",
              vars: {
                background: "#FFFFFF",
                quadrantFill: "#FAFAFA",
                quadrantText: "#404040",
                pointFill: "#10A37F",
                pointText: "#0D0D0D",
                titleFill: "#0D0D0D",
                axisText: "#6E6E80",
                border: "#E5E5E5",
                inner: "#EFEFEF",
              },
              fontFamily: '"Söhne", "Inter", -apple-system, system-ui, sans-serif',
            },
          };
          const t = themes[spineKey];
          // themeCSS shapes the rendered SVG beyond what themeVariables
          // expose. The chart title is hidden because the markdown
          // already renders an H3 caption directly above each chart —
          // showing it twice is the single ugliest mermaid default.
          // Hide every mermaid chart's built-in <text> title — the markdown
          // already prints an H3 caption right above each diagram, and
          // showing it twice is mermaid's single ugliest default. Apply
          // across quadrant / xychart / pie / timeline.
          const themeCSS = `
            g.quadrant-chart text { font-family: ${t.fontFamily}; }
            g.quadrant-point > circle, .quadrant-point circle {
              stroke: ${t.vars.background};
              stroke-width: 1.5px;
            }
            text.quadrant-title,
            .pieTitleText,
            .xy-chart .title-text,
            .timeline .title-text,
            .timeline-title { display: none !important; }
            /* xychart bars: thin stroke against the background so adjacent
               bars don't merge visually on dense datasets. */
            .xy-chart .bar { stroke: ${t.vars.background}; stroke-width: 1px; }
            /* Pie slice text: legibility on the dark / light spines. */
            .pieCircle { stroke: ${t.vars.background}; stroke-width: 1.5px; }
            text.slice, .pieLegendText { font-family: ${t.fontFamily}; }
            /* Timeline · period/label fonts inherit the spine. */
            .timeline text { font-family: ${t.fontFamily}; }
          `;
          mermaid.initialize({
            startOnLoad: false,
            theme: t.base,
            fontFamily: t.fontFamily,
            themeCSS,
            quadrantChart: {
              chartWidth: 640,
              chartHeight: 480,
              // Hide mermaid's own title slot — the H3 above the chart
              // is the caption. Setting padding/size to 0 keeps the
              // layout from leaving an empty band at the top.
              titlePadding: 0,
              titleFontSize: 0,
              titleTextMargin: 0,
              quadrantPadding: 8,
              quadrantInternalBorderStrokeWidth: 0.5,
              quadrantExternalBorderStrokeWidth: 1,
              quadrantLabelFontSize: 12,
              quadrantTextTopPadding: 12,
              pointRadius: 6,
              pointLabelFontSize: 12,
              pointTextPadding: 8,
              xAxisLabelFontSize: 13,
              xAxisLabelPadding: 8,
              yAxisLabelFontSize: 13,
              yAxisLabelPadding: 8,
              xAxisPosition: "bottom",
              yAxisPosition: "left",
            },
            themeVariables: {
              background: t.vars.background,
              primaryColor: t.vars.quadrantFill,
              primaryTextColor: t.vars.titleFill,
              primaryBorderColor: t.vars.border,
              lineColor: t.vars.border,
              secondaryColor: t.vars.quadrantFill,
              tertiaryColor: t.vars.background,
              // All 4 quadrants share the same fill — clean matrix.
              quadrant1Fill: t.vars.quadrantFill,
              quadrant2Fill: t.vars.quadrantFill,
              quadrant3Fill: t.vars.quadrantFill,
              quadrant4Fill: t.vars.quadrantFill,
              quadrant1TextFill: t.vars.quadrantText,
              quadrant2TextFill: t.vars.quadrantText,
              quadrant3TextFill: t.vars.quadrantText,
              quadrant4TextFill: t.vars.quadrantText,
              quadrantPointFill: t.vars.pointFill,
              quadrantPointTextFill: t.vars.pointText,
              quadrantTitleFill: t.vars.titleFill,
              quadrantXAxisTextFill: t.vars.axisText,
              quadrantYAxisTextFill: t.vars.axisText,
              quadrantInternalBorderStrokeFill: t.vars.inner,
              quadrantExternalBorderStrokeFill: t.vars.border,
            },
            flowchart: { useMaxWidth: true, htmlLabels: true },
            // ── xychart-beta · bar charts ──────────────────────────
            // Tight margins, label hidden (caption above), and a single
            // colour palette derived from the spine's pointFill so
            // every bar in a chart shares a coherent voice. Mermaid
            // 11+ accepts the `xyChart` key (older releases tolerated
            // `xychart` — keep BOTH so the config isn't fragile across
            // CDN bumps).
            xyChart: {
              width: 720,
              height: 360,
              titlePadding: 0,
              titleFontSize: 0,
              showTitle: false,
              showDataLabel: true,
              plotReservedSpacePercent: 50,
              xAxis: { labelFontSize: 12, titleFontSize: 0, showTitle: false },
              yAxis: { labelFontSize: 12, titleFontSize: 13 },
            },
            // Pie · legend on the right, slice labels disabled so wide
            // labels don't push the chart off-screen. The legend
            // already carries label + value (showData: true above).
            pie: {
              textPosition: 0.7,
              useMaxWidth: true,
            },
            // Timeline · cards-on-rail; title suppressed (caption above).
            timeline: {
              padding: 16,
              useMaxWidth: true,
            },
          });
          await mermaid.run({ querySelector: ".mermaid" });
        } catch (e) {
          // Per-diagram failures already render as inline error overlays —
          // log and move on.
          console.warn("[mermaid] render failed:", e);
        }
      }
    }
  }

  load();
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>

</body>
</html>
