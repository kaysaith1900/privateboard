<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOARDROOM // BRIEF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<!-- Spine CSS · loaded dynamically below based on brief.spine. The
     default href below is rendered immediately so the report doesn't
     show unstyled until the brief fetch returns. -->
<link rel="stylesheet" href="report/spines/boardroom-dark.css" id="spine-css">
<style>
  /* ─── Top-rule "Download PDF" button ──────────────────────────
     Styled to match the existing back link (mono uppercase low-key
     link, not a punchy CTA). The download glyph prefix is a typographic
     down-arrow, not an emoji icon. */
  .top-rule .top-actions {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    flex: 0 0 auto;
  }
  .top-rule .download {
    appearance: none;
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    font: inherit;
    /* Match the back link's mono treatment (per-spine CSS sets the
       precise font-size + color; we only inherit). */
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--text-soft);
    text-transform: none;
  }
  .top-rule .download::before { content: "↓ "; color: var(--text-faint); }
  .top-rule .download:hover { color: var(--text); }

  /* ─── Print / Save-as-PDF discipline ───────────────────────────
     Two responsibilities here:
     (1) Strip the on-screen chrome (top-rule, foot-rule, version
         strip, download button) so the PDF reads as a filed
         deliverable, not a webpage screenshot.
     (2) For the dark spine specifically, invert to a light-paper
         palette by redefining the CSS variables at body level. This
         removes the dependency on Chrome's "Background graphics"
         checkbox and produces a PDF that's universally readable on
         screen and on physical paper. Other spines are already light
         and pass through unchanged. */

  /* ─── CJK font dispatch · GLOBAL (screen AND print) ───────────
     Chrome does NOT do per-glyph cascade walking reliably in the
     print pipeline: it picks the first font that "looks right for
     the script" and stays there. With a cascade of
     "Helvetica Neue, Inter, Arial, PingFang SC, ..." Chrome lands
     on Arial (advertises minimal CJK coverage), renders every
     Chinese ideograph as `.notdef` (invisible / tofu), and the
     PingFang SC entry NEVER gets tried. Result: empty Chinese
     text in the saved PDF, even on a Mac with PingFang installed
     system-wide.

     Fix: register three named handles — `cjk-sans`, `cjk-serif`,
     `cjk-mono` — each scoped to the CJK Unicode ranges via
     `unicode-range`. When a CJK code point hits the cascade,
     Chrome is FORCED to dispatch to the CJK handle (only that
     handle covers the range), which uses `local()` to pick
     PingFang / Hiragino / Songti / STSong from the OS. Latin
     code points fall through to the next font as before, so
     Latin display still renders in Helvetica / Charter / Menlo.

     OUTSIDE @media print so it applies on both screen + print.
     Some CJK selectors live outside @media print (e.g.
     body.is-cjk .cover-title) and need the same dispatch. */
  /* Why STSong leads each src list:
     - macOS regular Chrome resolves PingFang SC fine — but headless
       Chrome (and the same user-action Save-as-PDF on some configs)
       walks `local()` and gives up after the first miss instead of
       trying the rest. Putting a guaranteed-available font (STSong
       ships with macOS since 10.0) first means we always have at
       least ONE working dispatcher; the more aesthetic faces sit
       behind it for environments that DO resolve them.
     - Empirically: cjk-serif (Songti SC/STSong leading) worked while
       cjk-sans (PingFang SC leading) didn't — same chain otherwise,
       only the lead changed. So the FIRST local() is what matters
       most; later entries are best-effort improvements. */
  @font-face {
    font-family: "cjk-sans";
    src: local("STSong"),
         local("PingFang SC"), local("PingFangSC-Regular"),
         local("Hiragino Sans GB"), local("HiraginoSansGB-W3"),
         local("Source Han Sans CN"), local("Noto Sans CJK SC"),
         local("Songti SC"), local("STHeiti");
    unicode-range: U+1100-11FF, U+2E80-2FFF, U+3000-303F,
                   U+3040-309F, U+30A0-30FF, U+3100-312F,
                   U+3130-318F, U+3190-319F, U+31F0-31FF,
                   U+3200-32FF, U+3300-33FF, U+3400-4DBF,
                   U+4E00-9FFF, U+A000-A4CF, U+A960-A97F,
                   U+AC00-D7AF, U+F900-FAFF, U+FE30-FE4F,
                   U+FF00-FFEF;
  }
  @font-face {
    font-family: "cjk-serif";
    src: local("STSong"), local("Songti SC"),
         local("Source Han Serif CN"), local("Noto Serif CJK SC"),
         local("PingFang SC"), local("Hiragino Sans GB");
    unicode-range: U+1100-11FF, U+2E80-2FFF, U+3000-303F,
                   U+3040-309F, U+30A0-30FF, U+3100-312F,
                   U+3130-318F, U+3190-319F, U+31F0-31FF,
                   U+3200-32FF, U+3300-33FF, U+3400-4DBF,
                   U+4E00-9FFF, U+A000-A4CF, U+A960-A97F,
                   U+AC00-D7AF, U+F900-FAFF, U+FE30-FE4F,
                   U+FF00-FFEF;
  }
  @font-face {
    font-family: "cjk-mono";
    src: local("STSong"), local("PingFang SC"),
         local("Hiragino Sans GB"), local("Songti SC");
    unicode-range: U+1100-11FF, U+2E80-2FFF, U+3000-303F,
                   U+3040-309F, U+30A0-30FF, U+3100-312F,
                   U+3130-318F, U+3190-319F, U+31F0-31FF,
                   U+3200-32FF, U+3300-33FF, U+3400-4DBF,
                   U+4E00-9FFF, U+A000-A4CF, U+A960-A97F,
                   U+AC00-D7AF, U+F900-FAFF, U+FE30-FE4F,
                   U+FF00-FFEF;
  }

  /* Print-paper backstop · hidden on screen; shown only during the
     print render. Inside @media print (below) it expands to a
     position:fixed full-page background. */
  [data-print-paper-fill] { display: none; }

  @media print {
    *, *::before, *::after {
      print-color-adjust: exact !important;
      -webkit-print-color-adjust: exact !important;
      box-shadow: none !important;
    }

    /* Per-page safe area · @page margin gives EVERY page a
       consistent 14mm top/bottom + 12mm side gutter. Edge-to-edge
       paper colour is painted via a JS-injected @page { background }
       rule (see swapSpine in the script block). The bottom-center
       margin box carries the page counter — that's the ONLY thing
       in the bleed area; no document title, no logo, no "page X of
       Y", no spine name. The cover page (`@page :first`) suppresses
       the counter so the title sheet stays clean. */
    @page {
      size: A4;
      margin: 14mm 12mm;
      /* Explicitly claim every margin box and leave the top + side
         ones empty. Chrome's print engine inserts its own
         title / url / date in the top-* boxes by default; declaring
         them in CSS (even with empty content) tells Chrome we're
         managing this margin area, suppressing the auto-headers.
         The bottom-center carries the page counter — that's the
         only thing in the bleed area. The bottom-left / bottom-right
         are also explicitly emptied so the page number sits alone.
         Note: a user who manually re-enables "Headers and footers"
         in the print preview dialog can still override CSS — that
         toggle is browser chrome, not document CSS. */
      @top-left      { content: ""; }
      @top-center    { content: ""; }
      @top-right     { content: ""; }
      @bottom-left   { content: ""; }
      @bottom-right  { content: ""; }
      @bottom-center {
        content: counter(page);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        color: #978C7E;
        vertical-align: top;
        padding-top: 4mm;
      }
    }
    @page :first {
      @bottom-center { content: none; }
    }
    body { padding: 0 !important; }

    /* Strip browser chrome from the PDF. */
    .top-rule,
    .foot-rule,
    .cover-versions,
    .reading-nav,
    [data-back],
    [data-download],
    .top-actions,
    .colophon-share {
      display: none !important;
    }

    /* Page-frame background · matches body's printed colour per spine
       so any PDF engine that paints html beyond body's box (some
       legacy print pipelines) stays coherent. Default white; per-
       spine selectors below override for the light-paper spines.
       The earlier `:has()` selector silently failed on browsers
       that don't support `:has()` in print mode (some Chrome
       versions, headless / Save-as-PDF pipelines), leaving html
       white and the dark spine PDF unreadable. We now mirror the
       `data-spine` attribute onto `<html>` itself in `swapSpine`
       (see JS below), so a plain attribute selector picks up the
       light-paper colour reliably. */
    html { background: #FFFFFF !important; }
    html[data-spine="anthropic-essay"] { background: #F4F0E8 !important; }
    html[data-spine="a16z-thesis"]     { background: #F7F3E8 !important; }
    html[data-spine="boardroom-dark"]  { background: #FAF7F0 !important; }

    /* Print-paper backstop · a `position: fixed; inset: 0` div with
       `print-color-adjust: exact` reliably paints on every printed
       page in Chrome, where `html { background }` and `body {
       background }` are inconsistently honoured. JS sets the
       background colour per spine in `swapSpine` so this paints the
       cream / white paper colour edge-to-edge. z-index: -1 keeps it
       behind all content. */
    [data-print-paper-fill] {
      display: block !important;
      position: fixed !important;
      inset: 0 !important;
      z-index: -1 !important;
      print-color-adjust: exact !important;
      -webkit-print-color-adjust: exact !important;
      pointer-events: none !important;
    }

    /* Container resets so .doc fills the printable area instead of
       being clipped at its 880px on-screen max-width. */
    .doc { max-width: none !important; padding: 0 !important; margin: 0 !important; }
    main.doc > [data-report-content] { padding: 0 !important; }

    /* Cover gets its own page so the body opens on a fresh sheet. */
    .cover {
      padding: 8mm 0 18mm !important;
      break-after: page;
      page-break-after: always;
      border-bottom: none !important;
    }

    /* ─── Dark spine · invert to light paper for printing ───────
       Token-level swap on body. Every callsite that uses var(--bg)
       / var(--text) / var(--text-soft) / etc. picks up these
       printed-paper values for the duration of the print render. */
    body[data-spine="boardroom-dark"] {
      background: #FAF7F0 !important;
      color: #1A1814 !important;
      --bg: #FAF7F0;
      --panel: #F4F0E8;
      --panel-2: #EDE6D6;
      --panel-3: #E2D9C4;
      --hi: #DDD5C8;
      --line: #DDD5C8;
      --line-bright: #DDD5C8;
      --line-strong: #C0B8A8;
      --text: #1A1814;
      --text-soft: #4A4338;
      --text-dim: #6B6359;
      --text-faint: #978C7E;
      --accent: #6B6660;
      --accent-faint: #B5AB9B;
      /* Gold (--lime / --em) reads well on cream — keep slightly
         deeper values for paper contrast. */
      --lime: #B58950;
      --lime-dim: #5C4422;
      --em: #B58950;
      --em-deep: #8C6730;
      /* Cross-spine tokens are defined on :root in boardroom-dark as
         `var(--text)` chains. Those resolve on html while --text still
         means "paper white" for dark UI, so descendants inherit
         low-contrast greys and the unified cover stack (var(--ink) /
         var(--paper) / var(--rule) in report.html) never picks up the
         paper palette. Redefine aliases explicitly on body for print. */
      --ink: #1A1814;
      --ink-soft: #4A4338;
      --ink-mid: #6B6359;
      --ink-faint: #978C7E;
      --ink-muted: #B5AB9B;
      --paper: #FAF7F0;
      --paper-soft: #EDE6D6;
      --paper-deep: #E2D9C4;
      --rule: #DDD5C8;
      --rule-soft: #E8E1D2;
      --surface: #FAF7F0;
      --surface-hover: #F0EBDD;
    }
    /* The Bottom Line panel had a transparent bg + top rule; on paper
       give it a faint cream wash so it reads as a callout. */
    body[data-spine="boardroom-dark"] .body section.section-bottom-line {
      background: transparent !important;
      border-top-color: #1A1814 !important;
    }
    /* CJK dispatch handles (cjk-sans / cjk-serif / cjk-mono) are
       declared OUTSIDE this @media block — see the @font-face
       trio at the top of <style>. Per-element font-family rules
       below reference those handles so CJK glyphs route to
       PingFang / Songti / etc. via `local()`. */

    /* Sans-anchored body text · Latin in Helvetica/Inter, CJK
       routed through cjk-sans (which `local()`s to PingFang SC). */
    body, .body, .body p, .body li,
    .body td, .body th,
    .rec-rationale, .rec-risk, .rec-risk-text, .rec-meta-value, .rec-action,
    .nq-why, .cover-deck {
      font-family: "cjk-sans",
                   "Helvetica Neue", "Inter", "Arial",
                   sans-serif !important;
    }
    /* Serif-anchored display copy · headlines, italic claims, big-idea
       kickers — the typographic moments worth preserving in serif.
       CJK ranges route to cjk-serif (which prefers Songti for the
       serif voice, falling back to PingFang). */
    .body h1, .body h2, .body h3, .body h4,
    .body section.section-bottom-line p,
    .body section.section-thesis p,
    .body section.section-working-hypothesis p,
    .body section.section-headline-findings .pillar h3,
    .body section.section-big-ideas ol > li p:first-child strong,
    .nq-question, .cover-title {
      font-family: "cjk-serif",
                   "Charter", "Source Serif Pro", "Iowan Old Style",
                   "Georgia",
                   serif !important;
    }
    /* Mono kickers / labels · CJK chars in mono context don't really
       have a mono face, so cjk-mono falls back to PingFang SC. The
       result is mono-styled Latin labels with PingFang Han for the
       rare CJK character that lands in a kicker. */
    .top-rule .crumb,
    .body .chapter-num,
    .cover-tag, .cover-tag .secondary,
    .byline-block .label,
    .cover-versions-label, .cover-version,
    .body section.section-bottom-line h2,
    .body section.section-thesis h2,
    .body section.section-headline-findings .pillar .pillar-num,
    .rec-num, .rec-meta-label, .rec-risk-prefix,
    .nq-num, .nq-attribution,
    .body section.section-planning-assumption blockquote strong:first-child,
    .body section.section-methodology strong,
    .body code,
    .body table.md-table th {
      font-family: "cjk-mono",
                   "SF Mono", "JetBrains Mono", "Menlo",
                   "Helvetica Neue", "Arial",
                   monospace !important;
    }

    /* ─── Page-break discipline (all spines) ─────────────────────
       Avoid splitting short cards / panels across pages. */
    .body section.section-bottom-line,
    .body section.section-thesis,
    .body section.section-working-hypothesis,
    .body section.section-frame-shift,
    .body section.section-planning-assumption,
    .body section.section-why-now,
    .body section.section-two-paths,
    .body section.section-headline-findings .pillar,
    .body section.section-recommendations li.rec-item,
    .body section.section-considerations li.rec-item,
    .body section.section-the-bet > ol > li,
    .body section.section-new-questions li.nq-item,
    .body figure.kami-chart,
    .body table.md-table,
    /* Tier A additions · the units that were still getting sliced
       between pages despite the legacy ruleset. Each one is a small
       atomic visual block that deserves to land whole. The strip
       parent IS in this list (intro + 3-5 cards typically fits on
       one page); the grid itself is NOT — under Tier B the grid is
       block-flowed in print, so individual `.metric-card` atoms are
       what we actually want unbreakable. Listing the grid here would
       force ALL cards onto the same page even when they overflow,
       leaving large dead space at page bottoms. */
    .body .metric-strip,                      /* intro + grid as one unit */
    .body blockquote,                         /* convergence / SPA / pull-quotes */
    .body ol > li, .body ul > li {            /* tighter than the per-section li rules above */
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Strip intro stays glued to the first card · lone "Three numbers
       worth pricing in" titles wandering to a previous page bottom
       look broken even when individual cards are intact. */
    .body .metric-strip-intro {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* Glue rules · keep heading + first content together. CSS only
       has break-after: avoid, which says "no break right after this
       element" — so applying it to the first content element after a
       heading also makes that pair atomic. We pair them with the
       heading rule below for redundancy. */
    .body h2, .body h3, .body h4 {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* Don't let a heading land alone in the page footer with its
       opener on the next page. The adjacent-sibling selector matches
       the FIRST element after the heading and refuses to break
       before it · effectively keeps "heading + opener" as one unit.
       Coverage extended past the original p / blockquote / table /
       metric-strip set to also include ol / ul / pillars-grid /
       mermaid / h3 — these were the silent culprits behind sections
       that opened with a list (very common) or a sub-heading
       getting their h2 stranded at the bottom of a page. Same set
       applied at the top-of-body level (no <section> wrap, e.g. a
       model-invented heading like "共识忽视的三件事") so the glue
       holds even when the H2 didn't match a section classifier. */
    .body section > h2 + p,
    .body section > h2 + blockquote,
    .body section > h2 + table.md-table,
    .body section > h2 + .metric-strip,
    .body section > h2 + ol,
    .body section > h2 + ul,
    .body section > h2 + .pillars-grid,
    .body section > h2 + h3,
    .body section > h2 + figure.kami-chart,
    .body section > h3 + p,
    .body section > h3 + blockquote,
    .body section > h3 + table.md-table,
    .body section > h3 + ol,
    .body section > h3 + ul,
    .body section > h3 + h4,
    .body > h2 + p,
    .body > h2 + blockquote,
    .body > h2 + table.md-table,
    .body > h2 + ol,
    .body > h2 + ul,
    .body > h2 + .pillars-grid,
    .body > h3 + p,
    .body > h3 + ol,
    .body > h3 + ul {
      break-before: avoid;
      page-break-before: avoid;
    }
    /* Paragraph-level orphan / widow control · a paragraph isn't
       allowed to leave only 1-3 lines on either side of a page
       break. Bumped from 3 → 4 — at typical line height + heading
       cadence, 3 still let a 4-line para split 1+3 which reads as
       a stranded line. 4 forces moves like "pull whole paragraph
       to next page" which is the desired behaviour. Cheapest
       typographic discipline; massive effect on multi-page feel. */
    .body { orphans: 4; widows: 4; }
    /* H3 sub-section heading · same anti-orphan rule as h2. The
       prior block only set this on h2 / h3 / h4, but break-after
       on h3 still allowed h3 to slip to the bottom of the page
       with content on the next. The companion break-before: avoid
       on h3 + (next sibling) above completes the pair. */
    .body section > h3,
    .body > h3 {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* Bottom-line / convergence callouts shouldn't split. They're
       short by design (1-3 paragraphs), so forcing them whole is
       cheap and a split mid-callout reads as a layout bug. */
    .body section.section-bottom-line,
    .body section.section-the-bet > blockquote,
    .body blockquote.callout {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* The "▼ session output ▼" / "// end of session" frame around
       brief output is not part of the report PDF (it's a chat-side
       UI), but a sibling rule — the brief title block (h1 / kicker /
       byline rows together) MUST stay glued. Same pattern. */
    .body .brief-info,
    .body .brief-kicker,
    .body .brief-meta-row {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .body .brief-kicker { break-after: avoid; page-break-after: avoid; }

    /* ─── Tier B · CSS Grid → flex-wrap in print ────────────────
       Chrome's PDF engine notoriously ignores `break-inside: avoid`
       on direct children of a `display: grid` container — but it
       DOES honour the same hint on flex children. The earlier fix
       collapsed both the Headline-Findings pillar grid and the
       metric-strip card grid to `display: block` for safety, which
       worked but stacked everything vertically — the user reported
       the PDF then looks nothing like the on-screen side-by-side
       layout. Switching to flex-wrap keeps the side-by-side cards
       visible in print AND lets the per-card `break-inside: avoid`
       (defined later in this @media block for `.metric-card`) hold,
       so a single card never gets sliced across pages. The on-screen
       grid is untouched.

       `flex: 1 1 180px` mirrors the screen `minmax(180px, 1fr)` —
       each card gets at least 180px and shares any extra evenly. */
    .body .pillars-grid,
    .body .metric-strip-grid {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 10px !important;
      align-items: stretch !important;
    }
    .body .pillars-grid > .pillar,
    .body .metric-strip-grid > .metric-card {
      flex: 1 1 180px !important;
      max-width: 100% !important;
      margin-bottom: 0 !important;
    }
    /* Drop the cell's vertical hairline in print · with flex-wrap +
       10px gap, the inter-cell rule is replaced by whitespace. Leaving
       the border-right in produces stray vertical strokes on the
       trailing edge of each row when cards wrap to a new row. */
    .body .metric-strip-grid > .metric-card { border-right: 0 !important; }

    /* Glue chapter-num to its h2 · the "Section 0X" kicker is a
       sibling element inserted before the heading (not nested), so
       the legacy heading-only break-after: avoid doesn't cover it.
       Without this, the kicker can land alone in a page footer with
       its h2 floating to the next page top — visually orphaned. */
    .body .chapter-num {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* First-child glue · the first item inside a grid (now block-
       flowed) shouldn't be allowed to break away from the section's
       h2 above. Combined with the h2's break-after: avoid this
       locks the heading + opener pair across page boundaries. */
    .body .pillars-grid > .pillar:first-child,
    .body .metric-strip-grid > .metric-card:first-child,
    .body section.section-recommendations ol > li:first-child,
    .body section.section-considerations  ol > li:first-child,
    .body section.section-the-bet         ol > li:first-child,
    .body section.section-new-questions   ol > li:first-child,
    .body section.section-big-ideas       ol > li:first-child {
      break-before: avoid;
      page-break-before: avoid;
    }
    .body section.section-methodology {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Kami chart figures shouldn't reserve big empty boxes when the
       inline SVG is small. */
    .body figure.kami-chart { padding: 14px !important; }
    .body figure.kami-chart svg.kc-svg { max-width: 100% !important; height: auto !important; }
  }

  /* ─── Author byline · name list (spine-agnostic) ───────────────
     The cover used to render circular avatar imgs alongside an
     "{N} directors" count. Both got dropped in favour of the names
     themselves rendered in the spine's main typography — reads as a
     proper editorial byline ("by Socrates · Marc Andreessen · Peter
     Thiel") rather than an app-style avatar row.

     The middot separator is a subtler weight than the names so the
     eye walks the list of contributors directly. Line-height stays
     tight so 5+ names wrap without bloating the cover. */
  .byline-block.byline-authors .value.author-list {
    line-height: 1.45;
    letter-spacing: 0.005em;
  }
  .byline-block.byline-authors .author-sep {
    color: var(--rule, currentColor);
    opacity: 0.45;
    margin: 0 1px;
    font-weight: 400;
  }

  /* ─── Suppress duplicate borders at section boundaries ──────────
     When a numbered-list section (The Bet, Big Ideas) is immediately
     followed by a .chapter-num divider for the next chapter, the
     list's `:last-child` `border-bottom` and the chapter-num's own
     `border-bottom` (the rule below "Section 0X") render as two
     parallel hairlines right at the section boundary. Drop the
     list's closing rule — the chapter-num underline already
     provides the visual break. Spine-agnostic; the inline-style
     block loads after the spine CSS and the `:has()` selector
     gives it strictly higher specificity than the per-spine rule. */
  .body section.section-the-bet:has(+ .chapter-num) ol > li:last-child,
  .body section.section-big-ideas:has(+ .chapter-num) ol > li:last-child {
    border-bottom: none;
  }

  /* ─── Same fix at the Methodology footer boundary ────────────────
     The Methodology h2 carries its own `border-top` to act as a
     section divider, but it's skipped by `injectChapterNumbers`, so
     there's no chapter-num to absorb that role. When the preceding
     section already ends with its own closing rule (a markdown
     table's last-row `border-bottom`, or The Bet / Big Ideas
     `:last-child` `border-bottom`), the boundary renders two
     parallel hairlines. Suppress the Methodology border-top in
     those exact cases. */
  .body section:has(> table.md-table:last-child) + h2.section-methodology,
  .body section.section-the-bet + h2.section-methodology,
  .body section.section-big-ideas + h2.section-methodology {
    border-top: none;
  }

  /* ─── Drop the table's heavy top rule when it's the first content
     of a section ───────────────────────────────────────────────────
     Pattern hit hard by Risks-to-Manage / Pre-Mortem (and any other
     table-first section): the chapter-num kicker above the H2
     already carries an underline (its border-bottom hairline), and
     the table immediately below the H2 carries its own 2px
     border-top. With only the H2 title between them, those two
     parallel rules read as a doubled frame around the heading. The
     table's row separators keep its internal structure clear without
     the top rule. Spine-agnostic — applied via the inline-loaded
     stylesheet which beats per-spine selectors. */
  .body section > table.md-table:first-child {
    border-top: none;
  }

  /* ─── Metric-strip · spine-agnostic baseline ─────────────────────
     Editorial / Swiss register: oversized thin numerals top-left, mute
     mono label bottom-left, hairline grid (no card backgrounds, no
     surrounding box). Whitespace + typography do the work. Per-spine
     CSS (public/report/spines/*.css) only swaps font tokens + accent
     colours; the layout and rhythm are constant across spines so a
     "key metrics" block reads the same shape no matter which voice
     the report is in.

     Discipline:
       · No `border-left` callout treatment. The grid uses border-right
         on cells purely as a divider — not as an accent rail.
       · Single hairline weight (1px var(--rule)) wraps the grid top +
         bottom and slices between cells. No double parallel borders
         against adjacent .chapter-num / section h2 (those only carry
         underlines on the heading itself, not on this block).
       · The big value is the eye-catch · thin sans, large size.
       · Trend glyph rides as a small superscript so it never competes
         with the value. */
  .body .metric-strip {
    margin: 30px 0 36px;
  }
  /* Intro kicker · small mono caption with the Dribbble-style solid
     square bullet to anchor the line. Optional · only renders when
     the metric-strip JSON carries `intro`. */
  .body .metric-strip-intro {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-soft, #8E8B83);
    margin: 0 0 22px;
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .body .metric-strip-intro::before {
    content: "";
    display: inline-block;
    width: 7px;
    height: 7px;
    background: currentColor;
    flex-shrink: 0;
  }
  /* Grid · explicit columns per card count. Top + bottom hairlines
     bracket the block, vertical hairlines slice between cells. */
  .body .metric-strip-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    align-items: stretch;
    border-top: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    border-bottom: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
  }
  .body .metric-strip-grid[data-cards="2"] { grid-template-columns: repeat(2, 1fr); }
  .body .metric-strip-grid[data-cards="3"] { grid-template-columns: repeat(3, 1fr); }
  .body .metric-strip-grid[data-cards="4"] { grid-template-columns: repeat(4, 1fr); }
  .body .metric-strip-grid[data-cards="5"] { grid-template-columns: repeat(5, 1fr); }
  /* Narrow viewports · collapse to a 2×N grid so cells stay readable.
     Cards on row 2+ pick up a top border so the horizontal rules slot
     in correctly. Print uses `display: block` from the page-break
     rules above, so this only affects on-screen at tablet / phone. */
  @media (max-width: 720px) {
    .body .metric-strip-grid,
    .body .metric-strip-grid[data-cards="3"],
    .body .metric-strip-grid[data-cards="4"],
    .body .metric-strip-grid[data-cards="5"] {
      grid-template-columns: repeat(2, 1fr);
    }
    .body .metric-strip-grid > .metric-card { border-right: 1px solid var(--rule); }
    .body .metric-strip-grid > .metric-card:nth-child(2n) { border-right: 0; }
  }
  /* Cell · pure padded box, no surrounding border, no fill. Vertical
     hairline lives on the right edge; the LAST column drops it. */
  .body .metric-card {
    display: flex;
    flex-direction: column;
    padding: 22px 20px 18px;
    background: transparent;
    border: 0;
    border-right: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    min-height: 144px;
    overflow: hidden;
    position: relative;
  }
  .body .metric-strip-grid > .metric-card:last-child { border-right: 0; }
  /* Last column drop · works for any data-cards value. */
  .body .metric-strip-grid[data-cards="2"] > .metric-card:nth-child(2n),
  .body .metric-strip-grid[data-cards="3"] > .metric-card:nth-child(3n),
  .body .metric-strip-grid[data-cards="4"] > .metric-card:nth-child(4n),
  .body .metric-strip-grid[data-cards="5"] > .metric-card:nth-child(5n) {
    border-right: 0;
  }
  /* Visual order · value at top, label at bottom, qualifier +
     attribution stack just above the label. Done with flex `order`
     so the renderer's HTML stays in author order (label, value-row,
     qualifier, attribution) and screen readers read label-first. */
  .body .metric-card > .metric-value-row { order: 1; margin-bottom: auto; }
  .body .metric-card > .metric-qualifier { order: 2; margin-top: 16px; }
  .body .metric-card > .metric-attribution { order: 3; margin-top: 6px; }
  .body .metric-card > .metric-label { order: 4; margin-top: 12px; }
  /* Big number · sans light, oversized. Tabular nums so digits land
     on the same column inside one card (e.g. 1,243.5 stays aligned
     when the card is multi-line). */
  .body .metric-value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1;
    margin: 0;
  }
  .body .metric-value {
    font-family: var(--sans, "Söhne", "Inter", "Helvetica Neue", "Helvetica",
                  "Arial", "PingFang SC", sans-serif);
    font-size: 40px;
    font-weight: 300;
    font-variant-numeric: lining-nums tabular-nums;
    color: var(--ink, var(--text, #C8C5BE));
    letter-spacing: -0.022em;
    line-height: 0.95;
    /* Long values shouldn't break across lines or shrink the card —
       overflow with ellipsis instead, which is rare in practice (most
       metrics are 4-7 chars). Letter-spacing already pulls them tight. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  /* Per-card-count value sizing · denser layouts get smaller numerals
     so 5-card rows on a 940px content width don't squash. The baseline
     40px is the 3-card default; 4 / 5 cards step down, 2 cards step
     up since each cell has more horizontal room. */
  .body .metric-strip-grid[data-cards="2"] .metric-value { font-size: 52px; }
  .body .metric-strip-grid[data-cards="3"] .metric-value { font-size: 44px; }
  .body .metric-strip-grid[data-cards="4"] .metric-value { font-size: 36px; }
  .body .metric-strip-grid[data-cards="5"] .metric-value { font-size: 30px; }
  @media (max-width: 720px) {
    /* Narrow viewport collapses to 2-column grid (see below) — value
       size returns to the 2-card baseline so cells with more room
       use it instead of staying in 4/5-card density. */
    .body .metric-strip-grid[data-cards="3"] .metric-value,
    .body .metric-strip-grid[data-cards="4"] .metric-value,
    .body .metric-strip-grid[data-cards="5"] .metric-value { font-size: 44px; }
  }
  /* Trend glyph · rides like a small annotation next to the number.
     Mono so it reads as a chip, not as part of the value. The negative
     `top` lifts it to align with the number's cap height. */
  .body .metric-trend {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1;
    color: var(--text-dim, #5C5A52);
    letter-spacing: 0.04em;
    position: relative;
    top: -14px;
    flex-shrink: 0;
  }
  .body .metric-trend[data-trend="up"]   { color: var(--em, var(--lime, #6FB572)); }
  .body .metric-trend[data-trend="down"] { color: var(--red, #B5706A); }
  .body .metric-trend[data-trend="flat"] { color: var(--text-dim, #5C5A52); }
  /* Label · mono caps caption pinned to the bottom of the card.
     Allowed to wrap to 2 lines · long-form labels (e.g. "Time to first
     production deploy") shouldn't truncate to two letters when there's
     room on a second line. */
  .body .metric-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-soft, #8E8B83);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* Qualifier · sans, small, sits just above the attribution / label.
     Capped to 2 lines so a chatty qualifier can't push the value
     off-screen. */
  .body .metric-qualifier {
    font-family: var(--sans);
    font-size: 12px;
    line-height: 1.45;
    color: var(--text-soft, #8E8B83);
    letter-spacing: -0.003em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* Attribution · faint mono caption between qualifier and label. */
  .body .metric-attribution {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint, #5C5A4D);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* Print · keep cells intact across page breaks. */
  @media print {
    .body .metric-card { break-inside: avoid; page-break-inside: avoid; }
  }
  /* Defensive · malformed strips render as a quiet placeholder. */
  .body .metric-strip-error {
    padding: 12px 14px;
    background: var(--panel-3, rgba(255, 255, 255, 0.04));
    color: var(--text-dim, #5C5A52);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .body .metric-strip-error::before {
    content: "// metric-strip · malformed";
    display: block;
    margin-bottom: 6px;
    color: var(--red, #B5706A);
  }

  /* ─── Path-comparison · spine-agnostic baseline ──────────────────
     Side-by-side binary comparison · 2 columns, verdict-tagged.
     Reference: mvp/screen-7-report-anthropic.html "03 — A Comparison"
     block. Per-spine CSS overrides accent colours; this baseline
     gives every spine a working render before its overrides ship.

     Discipline:
       · NO border-left as accent (project rule). Top accent rule
         encodes stance instead.
       · 2px stance accent on top edge — matches the report's
         heaviest-rule reservation tier.
       · 1px outer rule on each card — single ring, no doubled frames. */
  .body .path-comparison { margin: 28px 0 32px; }
  .body .path-comparison-intro {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-soft, var(--ink-soft, #5C5A52));
    margin: 0 0 20px;
    max-width: 740px;
  }
  .body .path-comparison .paths {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: stretch;
  }
  @media (max-width: 720px) {
    .body .path-comparison .paths { grid-template-columns: 1fr; }
  }
  .body .path-comparison .path {
    padding: 28px;
    background: var(--paper-soft, var(--panel-2, rgba(255, 255, 255, 0.025)));
    border: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    border-top-width: 2px;
    border-top-color: var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    display: flex;
    flex-direction: column;
  }
  /* Stance accents · weak / strong / neutral. Each spine remaps
     these to its palette in its own CSS file. */
  .body .path-comparison .path-weak   { border-top-color: var(--red,  #B5706A); }
  .body .path-comparison .path-strong { border-top-color: var(--em,   #6FB572); }
  /* path-neutral keeps the default rule colour. */

  .body .path-comparison .path-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-soft, var(--ink-soft, #8E8B83));
    margin-bottom: 14px;
  }
  .body .path-comparison .path-weak   .path-tag { color: var(--red, #B5706A); }
  .body .path-comparison .path-strong .path-tag { color: var(--em,  #6FB572); }

  .body .path-comparison .path-name {
    font-family: var(--font-headline, var(--serif, "Tiempos Headline", "Charter", Georgia, serif));
    font-size: 20px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--ink, var(--text, #C8C5BE));
    margin-bottom: 18px;
    letter-spacing: -0.005em;
  }
  .body .path-comparison .path-name-line + .path-name-sub {
    margin-top: 4px;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-soft, var(--ink-soft, #8E8B83));
    line-height: 1.45;
    letter-spacing: 0;
  }
  .body .path-comparison .path ul {
    list-style: none;
    padding: 0;
    margin: 0 0 auto;
  }
  .body .path-comparison .path li {
    position: relative;
    padding: 10px 0 10px 22px;
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-soft, var(--ink-soft, #5C5A52));
    border-bottom: 1px solid var(--rule-soft, var(--rule, rgba(0, 0, 0, 0.08)));
  }
  .body .path-comparison .path li:last-child { border-bottom: 0; }
  .body .path-comparison .path li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 16px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-faint, var(--ink-muted, #5C5A4D));
  }
  .body .path-comparison .path-weak   li::before { background: var(--red, #B5706A); }
  .body .path-comparison .path-strong li::before { background: var(--em,  #6FB572); }
  .body .path-comparison-implication {
    margin: 24px 0 0;
    font-family: var(--font-headline, var(--serif, "Tiempos", "Charter", Georgia, serif));
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink-soft, var(--text-soft, #4A4338));
    font-style: italic;
    max-width: 740px;
  }
  /* Print · keep both columns on the same page when possible. */
  @media print {
    .body .path-comparison { break-inside: avoid; page-break-inside: avoid; }
    .body .path-comparison .path { break-inside: avoid; page-break-inside: avoid; }
  }
  /* Defensive · malformed path-comparison renders as a quiet placeholder. */
  .body .path-comparison-error {
    padding: 12px 14px;
    background: var(--panel-3, rgba(255, 255, 255, 0.04));
    color: var(--text-dim, #5C5A52);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .body .path-comparison-error::before {
    content: "// path-comparison · malformed";
    display: block;
    margin-bottom: 6px;
    color: var(--red, #B5706A);
  }

  /* ─── Kami-chart · spine-agnostic inline-SVG charts ──────────────
     Replaces mermaid as the report's chart-rendering pipeline. Each
     chart is emitted by the writer as a fenced ```kami-chart block
     containing strict JSON; renderKamiChart() in JS turns it into
     inline SVG. Styling is driven entirely by spine CSS variables
     so each spine paints the chart in its own palette — no JS
     palette takeover, no race conditions, no scratchpad div. */
  .body .kami-chart {
    margin: 28px 0 32px;
    padding: 32px 36px 28px;
    background: var(--paper-soft, #ECE6DA);
    border: 1px solid var(--rule, rgba(0,0,0,0.14));
  }
  .body .kami-chart .kc-figheader {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 12px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--rule, rgba(0,0,0,0.14));
  }
  .body .kami-chart .kc-fignum {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent, var(--em, #6B6660));
    font-weight: 600;
  }
  .body .kami-chart .kc-figtitle {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mid, #6A655D);
  }
  .body .kami-chart svg.kc-svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* Canvas + grid + axis */
  .body .kami-chart .kc-canvas   { fill: var(--paper-soft, #ECE6DA); }
  .body .kami-chart .kc-grid     { stroke: var(--rule-soft, rgba(0,0,0,0.08)); stroke-width: 0.8; }
  .body .kami-chart .kc-baseline { stroke: var(--ink, #2A2724); stroke-width: 0.8; }
  .body .kami-chart .kc-y-tick {
    fill: var(--ink-soft, #978C7E);
    font: 10px var(--sans);
  }
  .body .kami-chart .kc-y-unit {
    fill: var(--ink-soft, #978C7E);
    font: 9px var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Bar series · spine accent for primary; neutrals for secondary/tertiary.
     Single-focal rule from kami's design guide: at most one series carries
     the accent. Multi-series charts use accent + ink-mid (+ ink-soft). */
  .body .kami-chart .kc-bar.kc-series-primary   { fill: var(--accent, var(--em, #6B6660)); }
  .body .kami-chart .kc-bar.kc-series-secondary { fill: var(--ink-mid, #6A655D); }
  .body .kami-chart .kc-bar.kc-series-tertiary  { fill: var(--ink-soft, #978C7E); }

  .body .kami-chart .kc-data-label {
    fill: var(--ink, #2A2724);
    font: 10px var(--sans);
  }
  .body .kami-chart .kc-data-label.kc-primary { font-weight: 600; }
  .body .kami-chart .kc-category-label {
    fill: var(--ink, #2A2724);
    font: 11px var(--sans);
  }

  /* Legend */
  .body .kami-chart .kc-legend-divider { stroke: var(--rule, rgba(0,0,0,0.14)); stroke-width: 0.8; }
  .body .kami-chart .kc-legend-swatch.kc-series-primary   { fill: var(--accent, var(--em, #6B6660)); }
  .body .kami-chart .kc-legend-swatch.kc-series-secondary { fill: var(--ink-mid, #6A655D); }
  .body .kami-chart .kc-legend-swatch.kc-series-tertiary  { fill: var(--ink-soft, #978C7E); }
  .body .kami-chart .kc-legend-text {
    fill: var(--ink-mid, #6A655D);
    font: 10px var(--sans);
  }

  /* Caption · editorial gloss below the chart. Serif italic <em> in accent. */
  .body .kami-chart .kc-caption {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-mid, #6A655D);
    line-height: 1.7;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--rule, rgba(0,0,0,0.14));
    max-width: 60ch;
  }
  .body .kami-chart .kc-caption em {
    color: var(--accent, var(--em, #B65A3A));
    font-style: italic;
  }

  /* Error fallback · mirrors the metric-strip-error register so a
     malformed chart degrades visibly without blowing up the report. */
  .body .kami-chart-error {
    margin: 28px 0;
    padding: 16px 18px;
    background: var(--paper-soft, #ECE6DA);
    border: 1px dashed var(--rule, rgba(0,0,0,0.14));
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft, #978C7E);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .body .kami-chart-error::before {
    content: "// kami-chart · malformed";
    display: block;
    margin-bottom: 6px;
    color: var(--red, #B5706A);
  }

  /* ─── Kami-chart · quadrant ──────────────────────────────────────
     2-axis plot · plot area framed; preferred (top-right) quadrant
     gets a subtle accent-tinted fill; crosshair at the midpoint;
     axis-end arrows; quadrant labels in the four corners. */
  .body .kami-chart .kc-q-frame  { fill: none; stroke: var(--rule, rgba(0,0,0,0.14)); stroke-width: 0.8; }
  .body .kami-chart .kc-q-axis   { stroke: var(--rule-soft, rgba(0,0,0,0.08)); stroke-width: 0.8; }
  .body .kami-chart .kc-q-tint   { fill: var(--paper-deep, rgba(0,0,0,0.03)); }
  .body .kami-chart .kc-q-arrow  { stroke: var(--ink-mid, #6A655D); stroke-width: 1.2; fill: none; }
  .body .kami-chart .kc-q-axis-label {
    fill: var(--ink, #2A2724); font: 11px var(--sans);
    letter-spacing: 0.08em;
  }
  .body .kami-chart .kc-q-quad-kicker {
    fill: var(--ink-soft, #978C7E);
    font: 9px var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.22em;
  }
  .body .kami-chart .kc-q-quad-kicker.kc-q-pref { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-q-quad-name {
    fill: var(--ink-mid, #6A655D); font: 10px var(--sans);
  }
  .body .kami-chart .kc-q-quad-name.kc-q-pref { fill: var(--accent, #6B6660); font-weight: 500; }
  .body .kami-chart .kc-point        { fill: var(--paper-soft, #ECE6DA); stroke: var(--ink, #2A2724); stroke-width: 1; }
  .body .kami-chart .kc-point-focal  { fill: var(--accent, #6B6660); stroke: var(--accent, #6B6660); stroke-width: 1; }
  .body .kami-chart .kc-point-tinted { fill: var(--paper-deep, rgba(0,0,0,0.03)); stroke: var(--accent, #6B6660); stroke-width: 1; }
  .body .kami-chart .kc-point-faint  { fill: var(--paper-deep, rgba(0,0,0,0.03)); stroke: var(--ink-muted, #B5AB9B); stroke-width: 1; }
  .body .kami-chart .kc-point-label {
    fill: var(--ink, #2A2724); font: 10px var(--sans);
  }
  .body .kami-chart .kc-point-label.kc-primary { fill: var(--accent, #6B6660); font-weight: 500; }
  .body .kami-chart .kc-point-label.kc-faint { fill: var(--ink-mid, #6A655D); }

  /* ─── Kami-chart · timeline ──────────────────────────────────────
     Horizontal time axis · events alternating above/below · each
     event = dot on axis + dashed connector + rect card with period
     (mono) + label (sans). Focal event renders in accent. */
  .body .kami-chart .kc-t-axis    { stroke: var(--ink-muted, #B5AB9B); stroke-width: 1.4; }
  .body .kami-chart .kc-t-arrow   { stroke: var(--ink-muted, #B5AB9B); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-t-dot     { fill: var(--ink-mid, #6A655D); stroke: var(--paper-soft, #ECE6DA); stroke-width: 1.5; }
  .body .kami-chart .kc-t-dot-focal { fill: var(--accent, #6B6660); stroke: var(--paper-soft, #ECE6DA); stroke-width: 1.5; }
  .body .kami-chart .kc-t-connector {
    stroke: var(--ink-soft, #978C7E); stroke-width: 1;
    stroke-dasharray: 3 3;
  }
  .body .kami-chart .kc-t-connector-focal {
    stroke: var(--accent, #6B6660); stroke-width: 1.2;
  }
  .body .kami-chart .kc-t-card {
    fill: var(--paper-soft, #ECE6DA);
    stroke: var(--rule, rgba(0,0,0,0.14));
    stroke-width: 0.8;
  }
  .body .kami-chart .kc-t-card-focal {
    fill: var(--paper, #F4EFE6);
    stroke: var(--accent, #6B6660);
    stroke-width: 1;
  }
  .body .kami-chart .kc-t-period {
    fill: var(--ink-soft, #978C7E);
    font: 8px var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-t-period-focal {
    fill: var(--accent, #6B6660); font-weight: 600;
  }
  .body .kami-chart .kc-t-label {
    fill: var(--ink, #2A2724);
    font: 11px var(--sans); font-weight: 500;
  }
  .body .kami-chart .kc-t-label-focal { font-size: 12px; }

  /* ─── Kami-chart · donut ─────────────────────────────────────────
     6-slice maximum · cx=300 cy=200 R=136 r=76 · clockwise from top.
     Slices declared in fill order; the largest (slice 1) carries the
     accent, the rest cascade down the neutral ramp. Hollow centre
     shows a single value + caption. Legend on the right. */
  .body .kami-chart .kc-slice-1 { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-slice-2 { fill: var(--ink-mid, #6A655D); }
  .body .kami-chart .kc-slice-3 { fill: var(--ink-soft, #978C7E); }
  .body .kami-chart .kc-slice-4 { fill: var(--ink-muted, #B5AB9B); }
  .body .kami-chart .kc-slice-5 { fill: var(--paper-deep, #E2D9C4); }
  .body .kami-chart .kc-slice-6 {
    fill: var(--paper-soft, #ECE6DA);
    stroke: var(--rule, rgba(0,0,0,0.14));
    stroke-width: 0.8;
  }
  .body .kami-chart .kc-donut-separator {
    fill: none;
    stroke: var(--paper-soft, #ECE6DA);
    stroke-width: 1.5;
  }
  .body .kami-chart .kc-donut-hole {
    fill: var(--paper-soft, #ECE6DA);
  }
  .body .kami-chart .kc-donut-center-value {
    fill: var(--accent, #6B6660);
    font: 26px var(--serif);
    font-weight: 500;
  }
  .body .kami-chart .kc-donut-center-label {
    fill: var(--ink-soft, #978C7E);
    font: 10px var(--sans);
    letter-spacing: 0.10em;
  }
  .body .kami-chart .kc-donut-legend-divider {
    stroke: var(--rule, rgba(0,0,0,0.14));
    stroke-width: 0.8;
  }
  .body .kami-chart .kc-donut-legend-swatch.kc-slice-1 { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-donut-legend-swatch.kc-slice-2 { fill: var(--ink-mid, #6A655D); }
  .body .kami-chart .kc-donut-legend-swatch.kc-slice-3 { fill: var(--ink-soft, #978C7E); }
  .body .kami-chart .kc-donut-legend-swatch.kc-slice-4 { fill: var(--ink-muted, #B5AB9B); }
  .body .kami-chart .kc-donut-legend-swatch.kc-slice-5 { fill: var(--paper-deep, #E2D9C4); }
  .body .kami-chart .kc-donut-legend-swatch.kc-slice-6 {
    fill: var(--paper-soft, #ECE6DA);
    stroke: var(--rule, rgba(0,0,0,0.14)); stroke-width: 0.8;
  }
  .body .kami-chart .kc-donut-legend-value {
    fill: var(--ink, #2A2724);
    font: 9.5px var(--sans);
  }
  .body .kami-chart .kc-donut-legend-value.kc-primary { font-weight: 600; }
  .body .kami-chart .kc-donut-legend-label {
    fill: var(--ink-mid, #6A655D);
    font: 9px var(--sans);
  }

  /* ─── Kami-chart · gantt (replaces inline mermaid gantt) ──────────
     Horizontal time axis with one bar per phase, optionally grouped
     into named sections. Time scale auto-fits the longest end value.
     Focal phase renders in accent. */
  .body .kami-chart .kc-g-section-bg { fill: var(--paper-deep, rgba(0,0,0,0.03)); }
  .body .kami-chart .kc-g-section-label {
    fill: var(--ink-soft, #978C7E);
    font: 9px var(--mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-g-row-rule { stroke: var(--rule-soft, rgba(0,0,0,0.08)); stroke-width: 0.8; }
  .body .kami-chart .kc-g-task-label {
    fill: var(--ink, #2A2724);
    font: 10px var(--sans);
  }
  .body .kami-chart .kc-g-task-label.kc-primary { font-weight: 600; }
  .body .kami-chart .kc-g-bar             { fill: var(--ink-mid, #6A655D); }
  .body .kami-chart .kc-g-bar.kc-primary  { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-g-bar-label {
    fill: var(--paper-soft, #ECE6DA);
    font: 9px var(--sans);
    font-weight: 600;
  }
  .body .kami-chart .kc-g-bar-label.kc-outside {
    fill: var(--ink-mid, #6A655D);
  }
  .body .kami-chart .kc-g-time-tick {
    fill: var(--ink-soft, #978C7E);
    font: 9px var(--mono);
    letter-spacing: 0.12em;
  }
  .body .kami-chart .kc-g-time-axis { stroke: var(--ink, #2A2724); stroke-width: 0.8; }

  /* ─── Kami-chart · tree (replaces inline mermaid mindmap) ─────────
     2-deep hierarchy · root + N branches + M leaves per branch.
     Connectors are right-angle paths with chevron arrows at child tops. */
  .body .kami-chart .kc-tree-node-bg { fill: var(--paper, #F4EFE6); }
  .body .kami-chart .kc-tree-root {
    fill: var(--paper-soft, #ECE6DA);
    stroke: var(--ink, #2A2724);
    stroke-width: 1;
  }
  .body .kami-chart .kc-tree-branch {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--ink-mid, #6A655D);
    stroke-width: 1;
  }
  .body .kami-chart .kc-tree-branch-focal {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--accent, #6B6660);
    stroke-width: 1;
  }
  .body .kami-chart .kc-tree-leaf {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--ink-mid, #6A655D);
    stroke-width: 1;
  }
  .body .kami-chart .kc-tree-leaf-focal {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--accent, #6B6660);
    stroke-width: 0.8;
  }
  .body .kami-chart .kc-tree-kicker {
    fill: var(--ink-soft, #978C7E);
    font: 8px var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-tree-kicker-focal { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-tree-text {
    fill: var(--ink, #2A2724);
    font: 11px var(--sans);
    font-weight: 500;
  }
  .body .kami-chart .kc-tree-connector       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.2; fill: none; }
  .body .kami-chart .kc-tree-connector-focal { stroke: var(--accent, #6B6660); stroke-width: 1.4; fill: none; }
  .body .kami-chart .kc-tree-chevron       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-tree-chevron-focal { stroke: var(--accent, #6B6660); stroke-width: 1.5; fill: none; stroke-linecap: round; }

  /* ─── Kami-chart · flowchart (replaces inline mermaid flowchart) ──
     Two layouts:
       · linear-v  · vertical chain of 2–5 nodes
       · y-decision · root (decision diamond) → 2 branches → optional join
     Node kinds: start | step | decision | outcome | end. */
  .body .kami-chart .kc-fl-node {
    fill: var(--paper, #F4EFE6);
    stroke: var(--ink, #2A2724);
    stroke-width: 1;
  }
  .body .kami-chart .kc-fl-node-focal {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--accent, #6B6660);
    stroke-width: 1.2;
  }
  .body .kami-chart .kc-fl-node-pill {
    fill: var(--paper-soft, #ECE6DA);
    stroke: var(--ink-mid, #6A655D);
    stroke-width: 1;
  }
  .body .kami-chart .kc-fl-node-faint {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--ink-muted, #B5AB9B);
    stroke-width: 1;
  }
  .body .kami-chart .kc-fl-kicker {
    fill: var(--ink-soft, #978C7E);
    font: 7px var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-fl-kicker-focal { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-fl-text {
    fill: var(--ink, #2A2724);
    font: 12px var(--sans);
    font-weight: 500;
  }
  .body .kami-chart .kc-fl-text-faint { fill: var(--ink-mid, #6A655D); }
  .body .kami-chart .kc-fl-arrow       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.2; fill: none; }
  .body .kami-chart .kc-fl-arrow-focal { stroke: var(--accent, #6B6660); stroke-width: 1.4; fill: none; }
  .body .kami-chart .kc-fl-arrowhead       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.4; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-fl-arrowhead-focal { stroke: var(--accent, #6B6660); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-fl-edge-label-bg {
    fill: var(--paper-soft, #ECE6DA);
  }
  .body .kami-chart .kc-fl-edge-label {
    fill: var(--ink-mid, #6A655D);
    font: 8px var(--mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-fl-edge-label.kc-primary {
    fill: var(--accent, #6B6660);
    font-weight: 600;
  }

  /* ─── Kami-chart · swimlane (replaces sequence + journey) ────────
     N lanes stacked vertically · steps positioned per lane in left-
     to-right order · elbow connectors between consecutive steps with
     chevron arrowheads. Focal lane gets a tinted background; focal
     step gets accent border. Reuses kc-fl-* classes for nodes. */
  .body .kami-chart .kc-sw-lane-bg     { fill: var(--paper-deep, rgba(0,0,0,0.03)); }
  .body .kami-chart .kc-sw-lane-bg-alt { fill: var(--paper-soft, #ECE6DA); }
  .body .kami-chart .kc-sw-lane-bg-focal { fill: var(--paper-deep, rgba(0,0,0,0.05)); }
  .body .kami-chart .kc-sw-lane-divider { stroke: var(--rule-soft, rgba(0,0,0,0.08)); stroke-width: 0.8; }
  .body .kami-chart .kc-sw-lane-divider-focal {
    stroke: var(--accent, #6B6660);
    stroke-width: 0.8;
    stroke-dasharray: 4 3;
  }
  .body .kami-chart .kc-sw-lane-label {
    fill: var(--ink-soft, #978C7E);
    font: 9px var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-sw-lane-label-focal { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-sw-label-col {
    fill: var(--paper, #F4EFE6);
    stroke: var(--rule, rgba(0,0,0,0.14));
    stroke-width: 0.8;
  }
  .body .kami-chart .kc-sw-arrow       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.2; fill: none; }
  .body .kami-chart .kc-sw-arrow-focal { stroke: var(--accent, #6B6660); stroke-width: 1.4; fill: none; }
  .body .kami-chart .kc-sw-arrowhead       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-sw-arrowhead-focal { stroke: var(--accent, #6B6660); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-sw-score-dot {
    fill: var(--accent, #6B6660);
  }
  .body .kami-chart .kc-sw-score-dot-faint {
    fill: var(--ink-muted, #B5AB9B);
  }

  /* ─── Kami-chart · state-machine ──────────────────────────────────
     Linear arrangement of state nodes · forward arrows (with optional
     event labels) · optional back-transitions drawn as dashed arcs
     above. Start dot + end double-circle markers are optional. */
  .body .kami-chart .kc-sm-state {
    fill: var(--paper, #F4EFE6);
    stroke: var(--ink-mid, #6A655D);
    stroke-width: 1;
  }
  .body .kami-chart .kc-sm-state-focal {
    fill: var(--paper-deep, rgba(0,0,0,0.03));
    stroke: var(--accent, #6B6660);
    stroke-width: 1.2;
  }
  .body .kami-chart .kc-sm-state-terminal {
    fill: var(--paper-soft, #ECE6DA);
    stroke: var(--ink, #2A2724);
    stroke-width: 1;
  }
  .body .kami-chart .kc-sm-kicker {
    fill: var(--ink-soft, #978C7E);
    font: 7px var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-sm-kicker-focal { fill: var(--accent, #6B6660); }
  .body .kami-chart .kc-sm-state-label {
    fill: var(--ink, #2A2724);
    font: 12px var(--sans);
    font-weight: 500;
  }
  .body .kami-chart .kc-sm-state-hint {
    fill: var(--ink-mid, #6A655D);
    font: 9px var(--mono);
  }
  .body .kami-chart .kc-sm-forward       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.2; fill: none; }
  .body .kami-chart .kc-sm-forward-focal { stroke: var(--accent, #6B6660); stroke-width: 1.4; fill: none; }
  .body .kami-chart .kc-sm-back {
    stroke: var(--ink-mid, #6A655D);
    stroke-width: 1.2;
    fill: none;
    stroke-dasharray: 4 3;
  }
  .body .kami-chart .kc-sm-arrowhead       { stroke: var(--ink-mid, #6A655D); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-sm-arrowhead-focal { stroke: var(--accent, #6B6660); stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .body .kami-chart .kc-sm-transition-label-bg { fill: var(--paper-soft, #ECE6DA); }
  .body .kami-chart .kc-sm-transition-label {
    fill: var(--ink-mid, #6A655D);
    font: 8px var(--mono);
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }
  .body .kami-chart .kc-sm-transition-label.kc-primary {
    fill: var(--accent, #6B6660);
    font-weight: 600;
  }
  .body .kami-chart .kc-sm-marker-start { fill: var(--ink, #2A2724); }
  .body .kami-chart .kc-sm-marker-end-outer { fill: none; stroke: var(--ink, #2A2724); stroke-width: 1.4; }
  .body .kami-chart .kc-sm-marker-end-inner { fill: var(--ink, #2A2724); }

  /* ─── Views-compared · spine-agnostic baseline ──────────────────
     The room's social map · always rendered when ≥ 2 directors.
     Layout: intro → 2-column compare grid (alignment | divergence)
     → per-director rows (full width) → chair synthesis (full width).
     Per-spine CSS swaps accent + surface tokens; layout is constant. */
  .body .views-compared { margin: 28px 0 32px; }
  .body .views-compared-intro {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-soft, var(--ink-soft, #5C5A52));
    margin: 0 0 24px;
    max-width: 740px;
  }
  .body .vc-section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft, var(--ink-faint, #978C7E));
    margin: 0 0 12px;
    padding: 0 0 8px;
    border-bottom: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
  }

  /* ── 2-column compare grid · agreement (left) | disagreement (right) ──
     Side-by-side reading is the whole point — the contrast lands in
     one glance instead of after scrolling. Below 760px the columns
     stack so the per-card content doesn't crush. */
  .body .vc-compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin: 0 0 32px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .body .vc-compare-grid { grid-template-columns: 1fr; gap: 24px; }
  }
  .body .vc-compare-col { min-width: 0; }
  .body .vc-compare-empty {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--text-faint, var(--ink-faint, #978C7E));
    font-style: italic;
    padding: 18px 0;
    line-height: 1.55;
  }

  /* ── Alignment cards · refined editorial register ──
     Hairline frame with the accent stripe on TOP (per project rule
     — left-borders are forbidden as callout treatments). 12px gap
     between cards keeps each card's accent-rule clearly its own. No
     surface fill — the spine's paper bg shows through. */
  .body .views-compared-alignment .vc-card {
    background: transparent;
    border: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    border-top: 2px solid var(--em, var(--lime, #6FB572));
    padding: 14px 16px;
    margin: 0 0 12px;
  }
  .body .views-compared-alignment .vc-card:last-child { margin-bottom: 0; }
  .body .vc-card-headline {
    font-family: var(--font-headline, var(--serif, "Tiempos Headline", "Charter", Georgia, serif));
    font-size: 16px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--ink, var(--text, #C8C5BE));
    margin: 0 0 8px;
    letter-spacing: -0.005em;
  }
  .body .vc-card-directors,
  .body .vc-side-directors {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 0 0 8px;
  }
  .body .vc-chip {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--text-soft, var(--ink-mid, #6B6359));
    background: transparent;
    border: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    border-radius: 10px;
    line-height: 1.45;
  }
  .body .vc-card-note {
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-soft, var(--ink-soft, #5C5A52));
    margin: 0;
  }

  /* ── Divergence forks · same hairline-frame register, but the
     top-accent stripe is in WARN/red instead of agreement-green.
     Compact side-by-side panels stack on narrow viewports. ── */
  .body .vc-fork {
    border: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    border-top: 2px solid var(--warn, var(--clay-deep, var(--red, #B5706A)));
    padding: 14px 16px;
    margin: 0 0 12px;
  }
  .body .vc-fork:last-child { margin-bottom: 0; }
  .body .vc-fork-hinge {
    font-family: var(--font-headline, var(--serif, Georgia, serif));
    font-style: italic;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink, var(--text, #C8C5BE));
    margin: 0 0 14px;
  }
  .body .vc-fork-sides {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 0 0 10px;
  }
  .body .vc-fork-sides[data-sides="3"] { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 920px) {
    /* In the 2-col compare-grid container, fork-sides is already
       cramped — collapse to single column so each side breathes. */
    .body .vc-fork-sides,
    .body .vc-fork-sides[data-sides="3"] { grid-template-columns: 1fr; }
  }
  .body .vc-side {
    padding: 10px 12px;
    background: transparent;
    border-top: 1px solid var(--rule-soft, var(--rule, rgba(0, 0, 0, 0.06)));
  }
  .body .vc-side-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--warn, var(--clay-deep, var(--red, #B5706A)));
    margin: 0 0 8px;
  }
  .body .vc-side-stance {
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-soft, var(--ink-soft, #5C5A52));
    margin: 0;
  }
  .body .vc-fork-resolution {
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-soft, var(--ink-mid, #6B6359));
    margin: 6px 0 0;
    padding: 8px 0 0;
    border-top: 1px dashed var(--rule-soft, var(--rule, rgba(0, 0, 0, 0.06)));
  }
  .body .vc-resolution-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-soft, var(--ink-faint, #978C7E));
    margin-right: 4px;
  }

  /* ── Per-director rows · tighter editorial rhythm ── */
  .body .views-compared-perspectives { margin: 0 0 24px; max-width: 820px; }
  .body .vc-row {
    border-top: 1px solid var(--rule, var(--line-bright, rgba(255, 255, 255, 0.08)));
    padding: 14px 0 13px;
  }
  /* Suppress the first row's top border when it sits directly under
     the section label · the label already carries a 1px border-bottom
     and a matching adjacent rule reads as a doubled frame around the
     heading (per CLAUDE.md no-double-parallel-borders rule). The
     label's underline opens the row series; the first row inherits
     its boundary from above. */
  .body .views-compared-perspectives > .vc-section-label + .vc-row {
    border-top: none;
  }
  .body .vc-row:last-child { border-bottom: 1px solid var(--rule, rgba(0, 0, 0, 0.08)); }
  .body .vc-row-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin: 0 0 5px;
  }
  .body .vc-row-name {
    font-family: var(--font-headline, var(--serif, Georgia, serif));
    font-size: 16px;
    font-weight: 500;
    color: var(--ink, var(--text, #C8C5BE));
    letter-spacing: -0.005em;
  }
  .body .vc-row-lens {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint, var(--ink-faint, #978C7E));
  }
  .body .vc-row-stance {
    font-family: var(--sans);
    font-style: italic;
    font-size: 13px;
    line-height: 1.45;
    color: var(--em, var(--clay-deep, var(--lime, #6FB572)));
    margin: 0 0 6px;
  }
  .body .vc-row-position {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-soft, var(--ink-soft, #5C5A52));
    margin: 0;
    max-width: 720px;
  }
  /* Director quote · italic serif at slightly smaller size. The
     italic + serif + colour-shift carries the "this is the spoken
     fragment" register; no left-border ornament (project rule). */
  .body .vc-row-quote {
    font-family: var(--font-headline, var(--serif, Georgia, serif));
    font-style: italic;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text, var(--ink-mid, #6B6359));
    margin: 7px 0 0;
    max-width: 700px;
  }
  .body .vc-row-quote::before { content: "“"; }
  .body .vc-row-quote::after { content: "”"; }

  /* ── Chair synthesis · closing block · italic serif framed by a
     thin top accent (mute ink, not a spine accent), so it reads as
     a closing remark rather than another argument. ── */
  .body .views-compared-synthesis {
    margin: 4px 0 0;
    padding: 14px 18px 16px;
    background: transparent;
    border: 1px solid var(--rule, rgba(0, 0, 0, 0.08));
    border-top: 2px solid var(--ink-faint, var(--text-faint, #978C7E));
  }
  .body .views-compared-synthesis .vc-section-label { margin-bottom: 8px; padding-bottom: 6px; }
  .body .vc-synthesis-body {
    font-family: var(--font-headline, var(--serif, Georgia, serif));
    font-style: italic;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink, var(--text, #C8C5BE));
    margin: 0;
    max-width: 720px;
  }

  /* Print · the Views-Compared module needs three distinct fixes:
       (a) page-break protection so the layout doesn't fragment across
           pages,
       (b) the NESTED divergence-fork grid (.vc-fork-sides, 2 or 3
           cols) must collapse to a single column — at PDF width the
           parent compare-grid already chops each side to ~314px, and
           a nested 2-col inside that crushes text to ~150px columns
           which read as "broken layout",
       (c) explicit ink-on-paper colors for everything whose default
           tokens resolve to translucent-white on dark spines (e.g.
           `--line-bright: rgba(255, 255, 255, 0.08)`, the various
           `--text-*` tokens in dark themes). On screen those work
           against the dark panel; in PDF the page background is
           paper, and translucent-white on white is invisible — which
           is why "section labels disappeared", "chip borders
           vanished", and "fork accent stripes were missing".
     Side-by-side comparison (alignment | divergence) at the OUTER
     compare-grid level IS preserved in PDF — that contrast is the
     whole point of the module. Only the nested fork-sides stack. */
  @media print {
    .body .views-compared {
      break-inside: avoid-page;
    }
    .body .views-compared-intro,
    .body .vc-compare-grid,
    .body .vc-compare-col,
    .body .vc-card,
    .body .vc-fork,
    .body .vc-side,
    .body .vc-row,
    .body .views-compared-synthesis {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* ── Layout fix · keep alignment | divergence side-by-side in PDF ──
       The screen-only `@media (max-width: 760px)` rule fires in Chrome's
       print pipeline at A4 portrait (printable area is ~688px) and
       stacks the columns, killing the contrast that's the whole point
       of the module. Force 2-col here with explicit `!important` so the
       responsive breakpoint can't override us in print. */
    .body .vc-compare-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 18px !important;
      align-items: start !important;
    }

    /* Stack the NESTED fork sides · at PDF width each outer column is
       ~314px and a nested 2-col would crush each side to ~150px. */
    .body .vc-fork-sides,
    .body .vc-fork-sides[data-sides="3"] {
      grid-template-columns: 1fr !important;
      gap: 8px !important;
    }
    /* Side dividers as horizontal hairlines once stacked · matches
       the on-screen narrow-width breakpoint behaviour. */
    .body .vc-side {
      border-top: 1px solid #DCD3BD !important;
      padding: 8px 12px !important;
    }
    .body .vc-side:first-child { border-top: none !important; padding-top: 0 !important; }

    /* Cap content widths · stop overflow regardless of spine padding. */
    .body .vc-card,
    .body .vc-fork,
    .body .vc-side,
    .body .vc-row,
    .body .views-compared-synthesis,
    .body .vc-card-headline,
    .body .vc-card-note,
    .body .vc-row-position,
    .body .vc-row-quote,
    .body .vc-synthesis-body,
    .body .vc-fork-hinge,
    .body .vc-side-stance,
    .body .vc-fork-resolution {
      max-width: 100% !important;
    }

    /* ── Visibility · force ink-on-paper colors ──
       Elements with translucent / dark-spine tokens get explicit
       dark values that print legibly. */
    .body .vc-section-label {
      color: #38332B !important;
      border-bottom-color: #DCD3BD !important;
    }
    /* Director chips · the on-screen `display: inline-flex` +
       `align-items: center` + `font-family: var(--mono)` combo
       ships text that prints blank in Chrome's PDF pipeline when
       the var-resolved font isn't in the headless Chrome font path
       (PingFang / SF Mono fall through to Songti, etc., which the
       print engine sometimes drops at 10px line-height: 1.45 with
       inline-flex containing). Reset to a print-safe shape:
       inline-block, explicit monospace stack with system fallbacks
       Chrome's PDF engine always has, slightly larger font for
       legibility, padding tuned so the small text doesn't get
       clipped by border-radius. */
    .body .vc-chip {
      display: inline-block !important;
      padding: 3px 10px !important;
      margin: 0 !important;
      font-family: "Helvetica", "Arial", "Songti SC", "STSong", sans-serif !important;
      font-size: 11px !important;
      font-weight: 500 !important;
      letter-spacing: 0.02em !important;
      line-height: 1.4 !important;
      color: #38332B !important;
      background: transparent !important;
      border: 1px solid #BCB39A !important;
      border-radius: 10px !important;
      vertical-align: baseline !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Alignment card · clay-deep top accent, hairline frame. */
    .body .views-compared-alignment .vc-card {
      border: 1px solid #DCD3BD !important;
      border-top: 2px solid #A85A41 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* Divergence fork · same chrome but the accent reads as the
       "split" marker. Same clay-deep so the module reads consistent
       in print; the contrast comes from the section labels above
       each column, not from competing accent colours. */
    .body .vc-fork {
      border: 1px solid #DCD3BD !important;
      border-top: 2px solid #A85A41 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .body .vc-fork-hinge {
      color: #14110C !important;
    }
    .body .vc-side-label {
      color: #A85A41 !important;
    }
    .body .vc-card-headline,
    .body .vc-row-name {
      color: #14110C !important;
    }
    .body .vc-card-note,
    .body .vc-row-position,
    .body .vc-side-stance,
    .body .vc-fork-resolution,
    .body .vc-synthesis-body {
      color: #38332B !important;
    }
    .body .vc-resolution-label {
      color: #847B65 !important;
    }
    .body .vc-row-lens {
      color: #847B65 !important;
    }
    .body .vc-row-quote {
      color: #57503F !important;
    }
    .body .vc-row {
      border-top-color: #DCD3BD !important;
    }
    .body .vc-row:last-child {
      border-bottom-color: #DCD3BD !important;
    }
    .body .views-compared-synthesis {
      border: 1px solid #DCD3BD !important;
      border-top: 2px solid #847B65 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Heading sticks to the intro that follows · no orphaned title. */
    .body section.section-views-compared > h2,
    .body h2.section-views-compared {
      break-after: avoid;
      page-break-after: avoid;
    }
  }

  /* Defensive · malformed views-compared renders as a quiet placeholder */
  .body .views-compared-error {
    padding: 12px 14px;
    background: var(--panel-3, rgba(255, 255, 255, 0.04));
    color: var(--text-dim, #5C5A52);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .body .views-compared-error::before {
    content: "// views-compared · malformed";
    display: block;
    margin-bottom: 6px;
    color: var(--red, #B5706A);
  }

  /* ─── Colophon · two-element footer with split visibility.
     ─────────────────────────────────────────────────────────────────
       1. `.colophon-share` · SCREEN ONLY. A [↓ Download PDF] button
          + hint copy that tells the current reader the PDF carries
          the full styled brief. Hidden in print.
       2. `.colophon-card` · PRINT ONLY. A quiet single-line "made
          with" credit that travels at the foot of the PDF. Hidden
          on screen so the in-app report doesn't read as marketing
          surface; appears only when the PDF gets shared.
          Visually muted on purpose — small mono micro-type, no
          card frame, no corner brackets, no marketing deck. The
          goal is "tasteful credit line," not "promotional card,"
          so the sender doesn't feel like they're forwarding an ad.
     Spine-agnostic baseline via CSS variables — each spine's
     palette flows in naturally. Horizontal margin matches `.body`'s
     32px padding so the footer aligns with the report content above
     it (a16z-thesis overrides to 56px to match its wider gutter ·
     see its spine CSS). `.foot-rule` follows the same pattern. */
  .colophon {
    margin: 32px 32px 8px;
  }

  .colophon-share {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: var(--panel-2, rgba(255, 255, 255, 0.025));
    border: 1px solid var(--line-bright, rgba(0, 0, 0, 0.08));
    flex-wrap: wrap;
  }
  .colophon-share-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--lime, #6FB572);
    color: var(--bg, #FFFFFF);
    border: 1px solid var(--lime, #6FB572);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .colophon-share-btn:hover {
    background: transparent;
    color: var(--lime, #6FB572);
  }
  .colophon-share-icon {
    font-size: 13px;
    line-height: 1;
  }
  .colophon-share-hint {
    flex: 1;
    min-width: 220px;
    margin: 0;
    font-family: var(--sans, var(--font-human));
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-soft, #6B6B6B);
    letter-spacing: -0.003em;
  }
