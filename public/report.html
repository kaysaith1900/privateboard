<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOARDROOM // BRIEF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<!-- Spine CSS · loaded dynamically below based on brief.spine. The
     default href below is rendered immediately so the report doesn't
     show unstyled until the brief fetch returns. -->
<link rel="stylesheet" href="report/spines/boardroom-dark.css" id="spine-css">
<style>
  /* ─── Top-rule "Download PDF" button ──────────────────────────
     Styled to match the existing back link (mono uppercase low-key
     link, not a punchy CTA). The download glyph prefix is a typographic
     down-arrow, not an emoji icon. */
  .top-rule .top-actions {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    flex: 0 0 auto;
  }
  .top-rule .download {
    appearance: none;
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    font: inherit;
    /* Match the back link's mono treatment (per-spine CSS sets the
       precise font-size + color; we only inherit). */
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--text-soft);
    text-transform: none;
  }
  .top-rule .download::before { content: "↓ "; color: var(--text-faint); }
  .top-rule .download:hover { color: var(--text); }

  /* ─── Print / Save-as-PDF discipline ───────────────────────────
     Two responsibilities here:
     (1) Strip the on-screen chrome (top-rule, foot-rule, version
         strip, download button) so the PDF reads as a filed
         deliverable, not a webpage screenshot.
     (2) For the dark spine specifically, invert to a light-paper
         palette by redefining the CSS variables at body level. This
         removes the dependency on Chrome's "Background graphics"
         checkbox and produces a PDF that's universally readable on
         screen and on physical paper. Other spines are already light
         and pass through unchanged. */
  @media print {
    *, *::before, *::after {
      print-color-adjust: exact !important;
      -webkit-print-color-adjust: exact !important;
      box-shadow: none !important;
    }

    /* Per-page safe area · @page margin gives EVERY page a
       consistent 14mm top/bottom + 12mm side gutter. Edge-to-edge
       paper colour is painted via a JS-injected @page { background }
       rule (see swapSpine in the script block). The bottom-center
       margin box carries the page counter — that's the ONLY thing
       in the bleed area; no document title, no logo, no "page X of
       Y", no spine name. The cover page (`@page :first`) suppresses
       the counter so the title sheet stays clean. */
    @page {
      size: A4;
      margin: 14mm 12mm;
      /* Explicitly claim every margin box and leave the top + side
         ones empty. Chrome's print engine inserts its own
         title / url / date in the top-* boxes by default; declaring
         them in CSS (even with empty content) tells Chrome we're
         managing this margin area, suppressing the auto-headers.
         The bottom-center carries the page counter — that's the
         only thing in the bleed area. The bottom-left / bottom-right
         are also explicitly emptied so the page number sits alone.
         Note: a user who manually re-enables "Headers and footers"
         in the print preview dialog can still override CSS — that
         toggle is browser chrome, not document CSS. */
      @top-left      { content: ""; }
      @top-center    { content: ""; }
      @top-right     { content: ""; }
      @bottom-left   { content: ""; }
      @bottom-right  { content: ""; }
      @bottom-center {
        content: counter(page);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        color: #978C7E;
        vertical-align: top;
        padding-top: 4mm;
      }
    }
    @page :first {
      @bottom-center { content: none; }
    }
    body { padding: 0 !important; }

    /* Strip browser chrome from the PDF. */
    .top-rule,
    .foot-rule,
    .cover-versions,
    [data-back],
    [data-download],
    .top-actions,
    .colophon-share {
      display: none !important;
    }

    /* Page-frame background · matches body's printed colour per spine
       so any PDF engine that paints html beyond body's box (some
       legacy print pipelines) stays coherent. Modern Chrome with
       @page margin: 0 fills the page from body alone, but this is
       belt-and-braces. Default white; per-spine `:has()` selectors
       below override for the light-paper spines. */
    html { background: #FFFFFF !important; }
    html:has(body[data-spine="anthropic-essay"]) { background: #F4F0E8 !important; }
    html:has(body[data-spine="a16z-thesis"])     { background: #F7F3E8 !important; }
    html:has(body[data-spine="boardroom-dark"])  { background: #FAF7F0 !important; }

    /* Container resets so .doc fills the printable area instead of
       being clipped at its 880px on-screen max-width. */
    .doc { max-width: none !important; padding: 0 !important; margin: 0 !important; }
    main.doc > [data-report-content] { padding: 0 !important; }

    /* Cover gets its own page so the body opens on a fresh sheet. */
    .cover {
      padding: 8mm 0 18mm !important;
      break-after: page;
      page-break-after: always;
      border-bottom: none !important;
    }

    /* ─── Dark spine · invert to light paper for printing ───────
       Token-level swap on body. Every callsite that uses var(--bg)
       / var(--text) / var(--text-soft) / etc. picks up these
       printed-paper values for the duration of the print render. */
    body[data-spine="boardroom-dark"] {
      background: #FAF7F0 !important;
      color: #1A1814 !important;
      --bg: #FAF7F0;
      --panel: #F4F0E8;
      --panel-2: #EDE6D6;
      --panel-3: #E2D9C4;
      --hi: #DDD5C8;
      --line: #DDD5C8;
      --line-bright: #DDD5C8;
      --line-strong: #C0B8A8;
      --text: #1A1814;
      --text-soft: #4A4338;
      --text-dim: #6B6359;
      --text-faint: #978C7E;
      --accent: #6B6660;
      --accent-faint: #B5AB9B;
      /* Gold (--lime / --em) reads well on cream — keep slightly
         deeper values for paper contrast. */
      --lime: #B58950;
      --lime-dim: #5C4422;
      --em: #B58950;
      --em-deep: #8C6730;
    }
    /* The Bottom Line panel had a transparent bg + top rule; on paper
       give it a faint cream wash so it reads as a callout. */
    body[data-spine="boardroom-dark"] .body section.section-bottom-line {
      background: transparent !important;
      border-top-color: #1A1814 !important;
    }
    /* Dark spine's mermaid frame — give it a paper bg in print. */
    body[data-spine="boardroom-dark"] .body pre.mermaid {
      background: #FFFFFF !important;
      border-color: #DDD5C8 !important;
    }

    /* ─── CJK font fallback for print ────────────────────────────
       In headless Chrome's PDF render path, "PingFang SC" and
       "Hiragino Sans GB" are often unreachable — they live outside
       the standard font directories. "Songti SC" (at /System/Library
       /Fonts/Supplemental/Songti.ttc) IS reachable, so it anchors
       every cascade as the dependable CJK fallback. Latin text still
       renders in the spine's preferred face; only CJK falls through. */

    /* Sans-anchored body text · Latin in Helvetica/Inter, CJK in Songti SC */
    body, .body, .body p, .body li,
    .body td, .body th,
    .rec-rationale, .rec-risk, .rec-risk-text, .rec-meta-value, .rec-action,
    .nq-why, .cover-deck {
      font-family: "Helvetica Neue", "Inter", "Arial",
                   "Songti SC", "STSong",
                   "Hiragino Sans GB", "PingFang SC",
                   "Source Han Sans CN", "Noto Sans CJK SC",
                   sans-serif !important;
    }
    /* Serif-anchored display copy · headlines, italic claims, big-idea
       kickers — the typographic moments worth preserving in serif. */
    .body h1, .body h2, .body h3, .body h4,
    .body section.section-bottom-line p,
    .body section.section-thesis p,
    .body section.section-working-hypothesis p,
    .body section.section-headline-findings .pillar h3,
    .body section.section-big-ideas ol > li p:first-child strong,
    .nq-question, .cover-title {
      font-family: "Charter", "Source Serif Pro", "Iowan Old Style",
                   "Georgia",
                   "Songti SC", "STSong",
                   "Source Han Serif CN", "Noto Serif CJK SC",
                   "PingFang SC", "Hiragino Sans GB", serif !important;
    }
    /* Mono kickers / labels stay mono with Songti SC as CJK fallback. */
    .top-rule .crumb,
    .body .chapter-num,
    .cover-tag, .cover-tag .secondary,
    .byline-block .label,
    .cover-versions-label, .cover-version,
    .body section.section-bottom-line h2,
    .body section.section-thesis h2,
    .body section.section-headline-findings .pillar .pillar-num,
    .rec-num, .rec-meta-label, .rec-risk-prefix,
    .nq-num, .nq-attribution,
    .body section.section-planning-assumption blockquote strong:first-child,
    .body section.section-methodology strong,
    .body code,
    .body table.md-table th {
      font-family: "SF Mono", "JetBrains Mono", "Menlo",
                   "Helvetica Neue", "Arial",
                   "Songti SC", "STSong", "Hiragino Sans GB", "PingFang SC",
                   monospace !important;
    }

    /* ─── Page-break discipline (all spines) ─────────────────────
       Avoid splitting short cards / panels across pages. */
    .body section.section-bottom-line,
    .body section.section-thesis,
    .body section.section-working-hypothesis,
    .body section.section-frame-shift,
    .body section.section-planning-assumption,
    .body section.section-why-now,
    .body section.section-two-paths,
    .body section.section-headline-findings .pillar,
    .body section.section-recommendations li.rec-item,
    .body section.section-considerations li.rec-item,
    .body section.section-the-bet > ol > li,
    .body section.section-new-questions li.nq-item,
    .body pre.mermaid,
    .body table.md-table,
    /* Tier A additions · the units that were still getting sliced
       between pages despite the legacy ruleset. Each one is a small
       atomic visual block that deserves to land whole. The strip
       parent IS in this list (intro + 3-5 cards typically fits on
       one page); the grid itself is NOT — under Tier B the grid is
       block-flowed in print, so individual `.metric-card` atoms are
       what we actually want unbreakable. Listing the grid here would
       force ALL cards onto the same page even when they overflow,
       leaving large dead space at page bottoms. */
    .body .metric-strip,                      /* intro + grid as one unit */
    .body blockquote,                         /* convergence / SPA / pull-quotes */
    .body ol > li, .body ul > li {            /* tighter than the per-section li rules above */
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Strip intro stays glued to the first card · lone "Three numbers
       worth pricing in" titles wandering to a previous page bottom
       look broken even when individual cards are intact. */
    .body .metric-strip-intro {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* Glue rules · keep heading + first content together. CSS only
       has break-after: avoid, which says "no break right after this
       element" — so applying it to the first content element after a
       heading also makes that pair atomic. We pair them with the
       heading rule below for redundancy. */
    .body h2, .body h3, .body h4 {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* Don't let a heading land alone in the page footer with its
       opener on the next page. The adjacent-sibling selector matches
       the FIRST element after the heading and refuses to break
       before it · effectively keeps "heading + opener" as one unit.
       Coverage extended past the original p / blockquote / table /
       metric-strip set to also include ol / ul / pillars-grid /
       mermaid / h3 — these were the silent culprits behind sections
       that opened with a list (very common) or a sub-heading
       getting their h2 stranded at the bottom of a page. Same set
       applied at the top-of-body level (no <section> wrap, e.g. a
       model-invented heading like "共识忽视的三件事") so the glue
       holds even when the H2 didn't match a section classifier. */
    .body section > h2 + p,
    .body section > h2 + blockquote,
    .body section > h2 + table.md-table,
    .body section > h2 + .metric-strip,
    .body section > h2 + ol,
    .body section > h2 + ul,
    .body section > h2 + .pillars-grid,
    .body section > h2 + h3,
    .body section > h2 + pre.mermaid,
    .body section > h3 + p,
    .body section > h3 + blockquote,
    .body section > h3 + table.md-table,
    .body section > h3 + ol,
    .body section > h3 + ul,
    .body section > h3 + h4,
    .body > h2 + p,
    .body > h2 + blockquote,
    .body > h2 + table.md-table,
    .body > h2 + ol,
    .body > h2 + ul,
    .body > h2 + .pillars-grid,
    .body > h3 + p,
    .body > h3 + ol,
    .body > h3 + ul {
      break-before: avoid;
      page-break-before: avoid;
    }
    /* Paragraph-level orphan / widow control · a paragraph isn't
       allowed to leave only 1-3 lines on either side of a page
       break. Bumped from 3 → 4 — at typical line height + heading
       cadence, 3 still let a 4-line para split 1+3 which reads as
       a stranded line. 4 forces moves like "pull whole paragraph
       to next page" which is the desired behaviour. Cheapest
       typographic discipline; massive effect on multi-page feel. */
    .body { orphans: 4; widows: 4; }
    /* H3 sub-section heading · same anti-orphan rule as h2. The
       prior block only set this on h2 / h3 / h4, but break-after
       on h3 still allowed h3 to slip to the bottom of the page
       with content on the next. The companion break-before: avoid
       on h3 + (next sibling) above completes the pair. */
    .body section > h3,
    .body > h3 {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* Bottom-line / convergence callouts shouldn't split. They're
       short by design (1-3 paragraphs), so forcing them whole is
       cheap and a split mid-callout reads as a layout bug. */
    .body section.section-bottom-line,
    .body section.section-the-bet > blockquote,
    .body blockquote.callout {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* The "▼ session output ▼" / "// end of session" frame around
       brief output is not part of the report PDF (it's a chat-side
       UI), but a sibling rule — the brief title block (h1 / kicker /
       byline rows together) MUST stay glued. Same pattern. */
    .body .brief-info,
    .body .brief-kicker,
    .body .brief-meta-row {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .body .brief-kicker { break-after: avoid; page-break-after: avoid; }

    /* ─── Tier B · CSS Grid → flex-wrap in print ────────────────
       Chrome's PDF engine notoriously ignores `break-inside: avoid`
       on direct children of a `display: grid` container — but it
       DOES honour the same hint on flex children. The earlier fix
       collapsed both the Headline-Findings pillar grid and the
       metric-strip card grid to `display: block` for safety, which
       worked but stacked everything vertically — the user reported
       the PDF then looks nothing like the on-screen side-by-side
       layout. Switching to flex-wrap keeps the side-by-side cards
       visible in print AND lets the per-card `break-inside: avoid`
       (defined later in this @media block for `.metric-card`) hold,
       so a single card never gets sliced across pages. The on-screen
       grid is untouched.

       `flex: 1 1 180px` mirrors the screen `minmax(180px, 1fr)` —
       each card gets at least 180px and shares any extra evenly. */
    .body .pillars-grid,
    .body .metric-strip-grid {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 10px !important;
      align-items: stretch !important;
    }
    .body .pillars-grid > .pillar,
    .body .metric-strip-grid > .metric-card {
      flex: 1 1 180px !important;
      max-width: 100% !important;
      margin-bottom: 0 !important;
    }

    /* Glue chapter-num to its h2 · the "Section 0X" kicker is a
       sibling element inserted before the heading (not nested), so
       the legacy heading-only break-after: avoid doesn't cover it.
       Without this, the kicker can land alone in a page footer with
       its h2 floating to the next page top — visually orphaned. */
    .body .chapter-num {
      break-after: avoid;
      page-break-after: avoid;
    }
    /* First-child glue · the first item inside a grid (now block-
       flowed) shouldn't be allowed to break away from the section's
       h2 above. Combined with the h2's break-after: avoid this
       locks the heading + opener pair across page boundaries. */
    .body .pillars-grid > .pillar:first-child,
    .body .metric-strip-grid > .metric-card:first-child,
    .body section.section-recommendations ol > li:first-child,
    .body section.section-considerations  ol > li:first-child,
    .body section.section-the-bet         ol > li:first-child,
    .body section.section-new-questions   ol > li:first-child,
    .body section.section-big-ideas       ol > li:first-child {
      break-before: avoid;
      page-break-before: avoid;
    }
    .body section.section-methodology {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* Mermaid charts shouldn't reserve big empty boxes when the SVG
       is small. */
    .body pre.mermaid { min-height: auto !important; padding: 14px !important; }
    .body pre.mermaid svg { max-width: 100% !important; height: auto !important; }
  }

  /* ─── Suppress duplicate borders at section boundaries ──────────
     When a numbered-list section (The Bet, Big Ideas) is immediately
     followed by a .chapter-num divider for the next chapter, the
     list's `:last-child` `border-bottom` and the chapter-num's own
     `border-bottom` (the rule below "Section 0X") render as two
     parallel hairlines right at the section boundary. Drop the
     list's closing rule — the chapter-num underline already
     provides the visual break. Spine-agnostic; the inline-style
     block loads after the spine CSS and the `:has()` selector
     gives it strictly higher specificity than the per-spine rule. */
  .body section.section-the-bet:has(+ .chapter-num) ol > li:last-child,
  .body section.section-big-ideas:has(+ .chapter-num) ol > li:last-child {
    border-bottom: none;
  }

  /* ─── Same fix at the Methodology footer boundary ────────────────
     The Methodology h2 carries its own `border-top` to act as a
     section divider, but it's skipped by `injectChapterNumbers`, so
     there's no chapter-num to absorb that role. When the preceding
     section already ends with its own closing rule (a markdown
     table's last-row `border-bottom`, or The Bet / Big Ideas
     `:last-child` `border-bottom`), the boundary renders two
     parallel hairlines. Suppress the Methodology border-top in
     those exact cases. */
  .body section:has(> table.md-table:last-child) + h2.section-methodology,
  .body section.section-the-bet + h2.section-methodology,
  .body section.section-big-ideas + h2.section-methodology {
    border-top: none;
  }

  /* ─── Drop the table's heavy top rule when it's the first content
     of a section ───────────────────────────────────────────────────
     Pattern hit hard by Risks-to-Manage / Pre-Mortem (and any other
     table-first section): the chapter-num kicker above the H2
     already carries an underline (its border-bottom hairline), and
     the table immediately below the H2 carries its own 1.5px
     border-top. With only the H2 title between them, those two
     parallel rules read as a doubled frame around the heading. The
     table's row separators keep its internal structure clear without
     the top rule. Spine-agnostic — applied via the inline-loaded
     stylesheet which beats per-spine selectors. */
  .body section > table.md-table:first-child {
    border-top: none;
  }

  /* ─── Metric-strip · spine-agnostic baseline ─────────────────────
     A row of KPI cards generated by the ```metric-strip fenced block.
     Per-spine CSS (public/report/spines/*.css) overrides surfaces +
     typography for visual personality; this baseline is what every
     spine inherits before its overrides land — keeps the strip
     readable even for spines that haven't shipped a treatment yet.

     Discipline:
       · No `border-left` as a callout (project rule · feedback memo).
       · Card boundaries are surface + spacing, not double parallel
         borders. The grid sits on the section background; cards lift
         via a tiny background tint.
       · Metric value is the eye-catch · big tabular numerals.
       · Trend glyph is small and doesn't compete with the value. */
  .body .metric-strip {
    margin: 26px 0 30px;
  }
  .body .metric-strip-intro {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-soft, #8E8B83);
    margin: 0 0 14px;
  }
  /* Grid · explicit columns per card count keeps cards uniform and
     kills the "lonely 5th card" problem you get from auto-fit when
     a row doesn't fully fill. The renderer stamps `data-cards` on
     the grid wrapper (see renderMetricStrip in this file). */
  .body .metric-strip-grid {
    display: grid;
    gap: 12px;
    align-items: stretch;
    grid-template-columns: repeat(3, 1fr);
  }
  .body .metric-strip-grid[data-cards="2"] { grid-template-columns: repeat(2, 1fr); }
  .body .metric-strip-grid[data-cards="3"] { grid-template-columns: repeat(3, 1fr); }
  .body .metric-strip-grid[data-cards="4"] { grid-template-columns: repeat(4, 1fr); }
  .body .metric-strip-grid[data-cards="5"] { grid-template-columns: repeat(5, 1fr); }
  /* Narrow viewports · collapse to two columns max so labels don't
     truncate down to two letters. Print uses `display: block` from
     the page-break rules above, so this only affects on-screen at
     tablet / phone widths. */
  @media (max-width: 720px) {
    .body .metric-strip-grid,
    .body .metric-strip-grid[data-cards="3"],
    .body .metric-strip-grid[data-cards="4"],
    .body .metric-strip-grid[data-cards="5"] {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  .body .metric-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px 18px;
    background: var(--panel-2, rgba(255, 255, 255, 0.025));
    border: 0.5px solid var(--line-bright, rgba(255, 255, 255, 0.08));
    min-height: 116px;
    overflow: hidden;
  }
  .body .metric-label {
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-soft, #8E8B83);
    line-height: 1.3;
    /* Long labels truncate to one line so the value lands on the
       same baseline across all cards — predictable rhythm beats
       fitting every word on cards with shorter labels. */
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .body .metric-value-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    line-height: 1;
    margin: 2px 0 0;
  }
  .body .metric-value {
    font-family: "SF Mono", "JetBrains Mono", "Menlo", "Helvetica Neue",
                 "Songti SC", monospace;
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums lining-nums;
    color: var(--text, #C8C5BE);
    letter-spacing: -0.018em;
    line-height: 1.05;
  }
  .body .metric-trend {
    font-family: "SF Mono", "JetBrains Mono", monospace;
    font-size: 13px;
    line-height: 1;
    color: var(--text-dim, #5C5A52);
    /* The big value's baseline sits a hair lower than the trend
       glyph's at this size · 1px nudge brings them into visual
       alignment without breaking baseline flow. */
    position: relative;
    top: -2px;
  }
  .body .metric-trend[data-trend="up"]   { color: var(--em, var(--lime, #6FB572)); }
  .body .metric-trend[data-trend="down"] { color: var(--red, #B5706A); }
  .body .metric-trend[data-trend="flat"] { color: var(--text-dim, #5C5A52); }
  /* Qualifier · pinned to the BOTTOM of the card via `margin-top:
     auto` so cards with vs without a qualifier still align their
     value baselines. Capped to 2 lines · longer text truncates
     rather than pushing the card height up. */
  .body .metric-qualifier {
    font-family: var(--sans);
    font-size: 11.5px;
    line-height: 1.45;
    color: var(--text-soft, #8E8B83);
    letter-spacing: -0.003em;
    margin: auto 0 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* Attribution · single line, ellipsis, mono uppercase footnote. */
  .body .metric-attribution {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint, #5C5A4D);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* When a card carries BOTH qualifier and attribution, the
     qualifier is no longer pinned to the bottom — the attribution
     is. Use `:last-child` on attribution to pull it to the bottom
     instead. */
  .body .metric-card > .metric-attribution:last-child {
    margin: auto 0 0;
  }
  .body .metric-card > .metric-qualifier:not(:last-child) {
    margin: auto 0 0;
  }
  .body .metric-card > .metric-qualifier:not(:last-child) + .metric-attribution {
    margin-top: 4px;
  }
  /* Print · keep cards intact across page breaks. */
  @media print {
    .body .metric-card { break-inside: avoid; page-break-inside: avoid; }
  }
  /* Defensive · malformed strips render as a quiet placeholder. */
  .body .metric-strip-error {
    padding: 12px 14px;
    background: var(--panel-3, rgba(255, 255, 255, 0.04));
    color: var(--text-dim, #5C5A52);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .body .metric-strip-error::before {
    content: "// metric-strip · malformed";
    display: block;
    margin-bottom: 6px;
    color: var(--red, #B5706A);
  }

  /* ─── Colophon · two-element footer with split visibility.
     ─────────────────────────────────────────────────────────────────
       1. `.colophon-share` · SCREEN ONLY. A [↓ Download PDF] button
          + hint copy that tells the current reader the PDF carries
          the full styled brief. Hidden in print.
       2. `.colophon-card` · PRINT ONLY. A quiet single-line "made
          with" credit that travels at the foot of the PDF. Hidden
          on screen so the in-app report doesn't read as marketing
          surface; appears only when the PDF gets shared.
          Visually muted on purpose — small mono micro-type, no
          card frame, no corner brackets, no marketing deck. The
          goal is "tasteful credit line," not "promotional card,"
          so the sender doesn't feel like they're forwarding an ad.
     Spine-agnostic baseline via CSS variables — each spine's
     palette flows in naturally. Horizontal margin matches `.body`'s
     32px padding so the footer aligns with the report content above
     it (a16z-thesis overrides to 56px to match its wider gutter ·
     see its spine CSS). `.foot-rule` follows the same pattern. */
  .colophon {
    margin: 32px 32px 8px;
  }

  .colophon-share {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: var(--panel-2, rgba(255, 255, 255, 0.025));
    border: 0.5px solid var(--line-bright, rgba(0, 0, 0, 0.08));
    flex-wrap: wrap;
  }
  .colophon-share-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--lime, #6FB572);
    color: var(--bg, #FFFFFF);
    border: 0.5px solid var(--lime, #6FB572);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .colophon-share-btn:hover {
    background: transparent;
    color: var(--lime, #6FB572);
  }
  .colophon-share-icon {
    font-size: 13px;
    line-height: 1;
  }
  .colophon-share-hint {
    flex: 1;
    min-width: 220px;
    margin: 0;
    font-family: var(--sans, var(--font-human));
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-soft, #6B6B6B);
    letter-spacing: -0.003em;
  }

  /* PDF-only credit · default hidden, flipped to a center-stacked
     letterpress-style sign-off in the @media print block below. Reads
     as a typographic colophon (think hardcover endmatter, academic
     journal, or O'Reilly book), not a marketing footer. The vertical
     stack is: short top rule (centered hairline) → tiny uppercase
     eyebrow → pixel mark + product name on one line → muted url. No
     border around it, no panel fill, no full-width edge — the
     whitespace is the framing. */
  .colophon-card {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 36px 12px 18px;
    margin-top: 36px;
    color: var(--text-soft, #6B6B6B);
  }
  .colophon-rule {
    width: 64px;
    height: 0.5px;
    background: var(--text-faint, #978C7E);
    opacity: 0.6;
  }
  .colophon-eyebrow {
    color: var(--text-faint, var(--text-dim, #8A8780));
    text-transform: uppercase;
    letter-spacing: 0.34em;
    font-size: 8.5px;
    font-weight: 600;
    font-family: var(--mono);
    /* Optical centering · letter-spacing pushes content right; nudge
       the whole eyebrow back so it reads centered under the rule. */
    padding-left: 0.34em;
  }
  .colophon-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .colophon-mark {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    opacity: 0.85;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .colophon-mark-bg { fill: var(--lime, #6FB572); }
  .colophon-mark-fg { fill: var(--bg, #FFFFFF); }
  .colophon-name {
    color: var(--text, #1A1A1A);
    font-family: var(--serif, var(--font-human, Georgia, serif));
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .colophon-cta-url {
    color: var(--text-soft, #6B6B6B);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  /* Backwards-compat · the "·" separator from the prior horizontal
     layout no longer renders meaningfully in a vertical stack. Keep
     the selector defined so old markup doesn't error if rendered. */
  .colophon-sep { display: none; }

  /* Print discipline · the share strip disappears, the credit line
     materialises, and both stay whole on whatever final page they
     land on. */
  @media print {
    .colophon {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .colophon-share { display: none !important; }
    .colophon-card {
      display: flex !important;
      flex-direction: column !important;
      break-inside: avoid;
      page-break-inside: avoid;
      /* If the colophon would orphan onto a near-empty last page,
         pull it up so it lands at the bottom of the prior page
         instead. The avoid hint is honoured by Chrome's PDF
         engine when there's any room at all. */
      break-before: avoid;
      page-break-before: avoid;
    }
  }
</style>
</head>
<body>

<div class="top-rule">
  <span class="crumb">Boardroom <span class="accent">·</span> Insights</span>
  <div class="top-actions">
    <button type="button" class="download" data-download title="Save this brief as a PDF">Download PDF</button>
    <a href="#" class="back" data-back>↩ back to room</a>
  </div>
</div>

<main class="doc">
  <div data-report-content>
    <div class="placeholder">loading the brief…</div>
  </div>
</main>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const roomId = params.get("r");
  const briefId = params.get("b");
  const root = document.querySelector("[data-report-content]");
  const back = document.querySelector("[data-back]");
  if (back) back.href = roomId ? `/#/r/${encodeURIComponent(roomId)}` : "/";

  /** Save as PDF · just trigger the browser's print dialog. The
   *  @media print rules below hide chrome and tighten margins so the
   *  output reads as a filed deliverable. The user picks "Save as
   *  PDF" as the destination — every modern browser supports it.
   *  Delegated so the top-of-page button AND the bottom colophon
   *  button (rendered later, after the brief loads) both trigger it
   *  without re-binding on every render. */
  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-download]");
    if (!btn) return;
    e.preventDefault();
    window.print();
  });

  /** Available spines · keys must match `composer.ts` SPINES. The link
   *  href is rewritten when the brief loads — pre-validated so a typo
   *  / unknown value falls back to boardroom-dark instead of 404'ing. */
  const SPINES = new Set([
    "boardroom-dark",
    "a16z-thesis",
    "anthropic-essay",
    "gartner-note",
    "mckinsey-deck",
    "openai-paper",
  ]);
  /** Per-spine paper colour · used both as a CSS variable on the
   *  document AND injected into @page { background } so the PDF
   *  margin area (the safe-zone gutter outside body) gets painted
   *  with the same paper colour as the body itself. Without the
   *  @page background, Chrome leaves @page margin transparent and
   *  it falls back to white — sections sit inside cream paper but
   *  the 14mm bleed around them shows white, reading as a print
   *  bug. CSS @page can't be selected by spine class, hence the
   *  JS-driven inline rule below. */
  const SPINE_PAPER = {
    "boardroom-dark":   "#FAF7F0",
    "anthropic-essay":  "#F4F0E8",
    "a16z-thesis":      "#F7F3E8",
    "mckinsey-deck":    "#FFFFFF",
    "gartner-note":     "#FFFFFF",
    "openai-paper":     "#FFFFFF",
  };

  function swapSpine(spine) {
    const link = document.getElementById("spine-css");
    if (!link) return;
    const safe = SPINES.has(spine) ? spine : "boardroom-dark";
    const href = `report/spines/${safe}.css`;
    if (link.getAttribute("href") !== href) link.setAttribute("href", href);
    document.body.setAttribute("data-spine", safe);
    // Inject (or replace) the per-spine @page background rule so the
    // PDF page bleed matches the paper colour. Replaces any prior
    // injected rule for this same id, so swapping spines repaints
    // cleanly without stacking style nodes.
    const paper = SPINE_PAPER[safe] || "#FFFFFF";
    let pageStyle = document.getElementById("spine-page-bg");
    if (!pageStyle) {
      pageStyle = document.createElement("style");
      pageStyle.id = "spine-page-bg";
      document.head.appendChild(pageStyle);
    }
    pageStyle.textContent = `@media print { @page { background: ${paper}; } }`;
  }

  function escape(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  function inline(s) {
    return s
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\*([^*]+)\*/g, "<em>$1</em>")
      // Underscore italics — common in Recommendations / New Questions
      // metadata labels (`_Rationale:_`, `_Owner:_` …). Without this, the
      // labels render as literal underscores and the whole card looks raw.
      .replace(/(^|[\s(\[])_([^_\n]+)_(?=$|[\s.,;:!?·\)\]])/g, "$1<em>$2</em>")
      .replace(/`([^`]+)`/g, "<code>$1</code>");
  }

  /** Mermaid 10.9.5 quadrantChart lexer is strict: anything beyond ASCII
   *  alphanumerics + spaces breaks UNQUOTED axis/quadrant/item labels
   *  (CJK, parens, `+`, etc. all fail with "Unrecognized text"). The
   *  fix is to ALWAYS wrap those labels in double quotes; titles are
   *  exempt. Mirrors src/utils/mermaid-sanitize.ts — keep in sync. */
  function sanitizeMermaid(src) {
    if (!src) return src;
    if (!/^\s*quadrantChart\b/i.test(src)) return src;

    const clamp01 = (n) => {
      if (!Number.isFinite(n)) return 0.5;
      return Math.max(0.02, Math.min(0.98, n));
    };
    const cleanLabel = (s) => s
      .replace(/（/g, "(")
      .replace(/）/g, ")")
      .replace(/，/g, " ")
      .replace(/：/g, " ")
      .replace(/、/g, " ")
      .replace(/。/g, " ")
      .replace(/；/g, " ")
      .replace(/["'`\[\]:]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    return src.split("\n").map((line) => {
      const indentMatch = /^(\s*)/.exec(line);
      const indent = indentMatch ? indentMatch[1] || "    " : "    ";
      const t = line.trim();
      if (!t) return line;

      // Title · cleaned but unquoted.
      const titleM = /^title\s+(.+)$/i.exec(t);
      if (titleM) return `${indent}title ${cleanLabel(titleM[1])}`;

      // Axis lines · always quoted both-ends.
      const ax = /^(x-axis|y-axis)\s+(.+)$/i.exec(t);
      if (ax) {
        const which = ax[1].toLowerCase();
        const rest = ax[2].trim();
        if (rest.includes("-->")) {
          const parts = rest.split("-->").map((s) => cleanLabel(s));
          if (parts.length === 2 && parts[0] && parts[1]) {
            return `${indent}${which} "${parts[0]}" --> "${parts[1]}"`;
          }
        }
        const cleaned = cleanLabel(rest);
        return `${indent}${which} "Low ${cleaned}" --> "High ${cleaned}"`;
      }

      // Quadrant labels · always quoted.
      const qM = /^(quadrant-[1-4])\s+(.+)$/i.exec(t);
      if (qM) return `${indent}${qM[1]} "${cleanLabel(qM[2])}"`;

      // Item lines · always quoted, coords clamped.
      const item = /^"?([^"\[\]]+?)"?\s*:\s*\[\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\]\s*$/.exec(t);
      if (item) {
        const label = cleanLabel(item[1]);
        const x = clamp01(parseFloat(item[2]));
        const y = clamp01(parseFloat(item[3]));
        return `${indent}"${label}": [${x.toFixed(2)}, ${y.toFixed(2)}]`;
      }

      return line;
    }).join("\n");
  }

  /** Parse a fenced ```metric-strip block body (strict JSON) and emit
   *  the dashboard card grid. Mirrors how ```mermaid is handled — the
   *  block is pulled out at the placeholder layer before block parsing,
   *  so the structured HTML survives the renderer's escape pass.
   *  Defensive: bad JSON / missing fields render as a quiet fallback
   *  block so a malformed strip doesn't break the rest of the report. */
  function renderMetricStrip(body) {
    let parsed;
    try { parsed = JSON.parse(body); } catch (e) {
      return `<div class="metric-strip metric-strip-error" data-err="parse">${escape(body)}</div>`;
    }
    if (!parsed || typeof parsed !== "object") {
      return `<div class="metric-strip metric-strip-error" data-err="shape"></div>`;
    }
    const intro = typeof parsed.intro === "string" ? parsed.intro.trim() : "";
    const cardsRaw = Array.isArray(parsed.cards) ? parsed.cards : [];
    const cards = [];
    for (const c of cardsRaw) {
      if (!c || typeof c !== "object") continue;
      const label = typeof c.label === "string" ? c.label.trim() : "";
      const value = typeof c.value === "string" ? c.value.trim() : "";
      if (!label || !value) continue;
      const qualifier = typeof c.qualifier === "string" ? c.qualifier.trim() : "";
      const attribution = typeof c.attribution === "string" ? c.attribution.trim() : "";
      const trend =
        c.trend === "up" || c.trend === "down" || c.trend === "flat" ? c.trend : "";
      cards.push({ label, value, qualifier, attribution, trend });
      if (cards.length >= 5) break;
    }
    if (cards.length === 0) {
      return `<div class="metric-strip metric-strip-error" data-err="empty"></div>`;
    }

    // Trend → arrow glyph (rendered in a small badge on the card).
    const trendGlyph = (t) => (t === "up" ? "↑" : t === "down" ? "↓" : t === "flat" ? "→" : "");

    const introHtml = intro
      ? `<p class="metric-strip-intro">${escape(intro)}</p>`
      : "";
    const cardsHtml = cards.map((c) => {
      const trendAttr = c.trend ? ` data-trend="${escape(c.trend)}"` : "";
      const trendBadge = c.trend
        ? `<span class="metric-trend" data-trend="${escape(c.trend)}" aria-label="${escape(c.trend)}">${trendGlyph(c.trend)}</span>`
        : "";
      const qualifier = c.qualifier ? `<div class="metric-qualifier">${escape(c.qualifier)}</div>` : "";
      const attribution = c.attribution ? `<div class="metric-attribution">${escape(c.attribution)}</div>` : "";
      return `<div class="metric-card"${trendAttr}>` +
        `<div class="metric-label">${escape(c.label)}</div>` +
        `<div class="metric-value-row"><span class="metric-value">${escape(c.value)}</span>${trendBadge}</div>` +
        qualifier +
        attribution +
        `</div>`;
    }).join("");

    return `<div class="metric-strip" data-cards="${cards.length}">` +
      introHtml +
      `<div class="metric-strip-grid">${cardsHtml}</div>` +
      `</div>`;
  }

  // Slightly richer markdown than the in-room renderer — supports h1–h4,
  // bullets, ordered lists, paragraphs, blockquotes, fenced code blocks
  // (incl. ```mermaid for diagrams), and pipe tables.
  function renderMarkdown(md) {
    // Pre-pass · pull out fenced ```code blocks before splitting on blank
    // lines, since a code block can legally contain blank lines.
    const placeholders = [];
    let stripped = "";
    {
      const lines = md.split("\n");
      let i = 0;
      while (i < lines.length) {
        // Fence info-string allows dashes too (e.g. ```metric-strip).
        // Stock `\w*` excludes `-`, so multi-word lang tags fell
        // through and rendered as raw text · the brief writer emits
        // ```metric-strip / ```chart-block style fences regularly.
        const fence = /^```([\w-]*)\s*$/.exec(lines[i]);
        if (fence) {
          const lang = (fence[1] || "").toLowerCase();
          const start = i + 1;
          let end = lines.length;
          for (let j = start; j < lines.length; j++) {
            if (/^```\s*$/.test(lines[j])) { end = j; break; }
          }
          const body = lines.slice(start, end).join("\n");
          const idx = placeholders.length;
          if (lang === "mermaid") {
            placeholders.push(`<pre class="mermaid">${escape(sanitizeMermaid(body))}</pre>`);
          } else if (lang === "metric-strip") {
            placeholders.push(renderMetricStrip(body));
          } else {
            placeholders.push(
              `<pre class="codeblock${lang ? ` lang-${escape(lang)}` : ""}"><code>${escape(body)}</code></pre>`,
            );
          }
          stripped += `\n\n@@CODEBLOCK_${idx}@@\n\n`;
          i = end + 1;
        } else {
          stripped += lines[i] + "\n";
          i += 1;
        }
      }
    }

    const blocks = stripped.split(/\n\s*\n/);
    const out = [];
    for (const raw of blocks) {
      const lines = raw.split("\n").filter((l) => l.length > 0);
      if (lines.length === 0) continue;

      // Code block placeholder — passes through unchanged.
      if (lines.length === 1) {
        const m = /^@@CODEBLOCK_(\d+)@@$/.exec(lines[0].trim());
        if (m) {
          out.push(placeholders[Number(m[1])] || "");
          continue;
        }
      }

      // Heading · also handles the "## Title\nbody" case (no blank line
      // between heading and content). Some prompts produce that pattern
      // — without the multi-line branch the H2 leaks as literal `## …`
      // text into a paragraph fallback. The trailing lines are processed
      // as a separate paragraph block so we don't lose them.
      {
        const m = /^(#{1,4})\s+(.+)$/.exec(lines[0]);
        if (m) {
          const level = Math.min(m[1].length, 4);
          out.push(`<h${level}>${inline(escape(m[2]))}</h${level}>`);
          if (lines.length > 1) {
            const rest = lines.slice(1).join(" ").trim();
            if (rest) out.push(`<p>${inline(escape(rest))}</p>`);
          }
          continue;
        }
      }

      // Pipe table · header row · separator · data rows.
      // Detect: ≥ 2 lines, first looks like `| h1 | h2 |`, second is `|---|---|`.
      if (
        lines.length >= 2 &&
        /\|/.test(lines[0]) &&
        /^\s*\|?[\s:|\-]+\|?\s*$/.test(lines[1]) &&
        /-/.test(lines[1])
      ) {
        const splitRow = (l) =>
          l
            .replace(/^\s*\|/, "")
            .replace(/\|\s*$/, "")
            .split("|")
            .map((c) => c.trim());
        const headers = splitRow(lines[0]);
        const rows = lines.slice(2).map(splitRow);
        const thead = `<thead><tr>${headers.map((h) => `<th>${inline(escape(h))}</th>`).join("")}</tr></thead>`;
        const tbody = `<tbody>${rows
          .map((r) => `<tr>${r.map((c) => `<td>${inline(escape(c))}</td>`).join("")}</tr>`)
          .join("")}</tbody>`;
        out.push(`<table class="md-table">${thead}${tbody}</table>`);
        continue;
      }

      // Blockquote?
      if (lines.every((l) => /^>\s?/.test(l))) {
        const inner = lines.map((l) => inline(escape(l.replace(/^>\s?/, "")))).join("<br>");
        out.push(`<blockquote>${inner}</blockquote>`);
        continue;
      }

      // Bulleted?
      if (lines.every((l) => /^\s*[-*]\s+/.test(l))) {
        const items = lines.map((l) => `<li>${inline(escape(l.replace(/^\s*[-*]\s+/, "")))}</li>`);
        out.push(`<ul>${items.join("")}</ul>`);
        continue;
      }

      // Ordered list · first line starts with `1. `. Subsequent lines
      // either start a new item (`2. ...`) or are indented continuation
      // lines (e.g. the `_Rationale:_ ...` rows under each rec). Each
      // continuation becomes its own <p> inside the <li>, which is what
      // the post-render Recommendations / New Questions restructurers
      // expect to find.
      const olStart = /^\s*\d+[\.)]\s+/;
      if (olStart.test(lines[0])) {
        const items = []; // Array<string[]> — one bucket per item, lines kept separate
        let cur = null;
        for (const line of lines) {
          if (olStart.test(line)) {
            if (cur !== null) items.push(cur);
            cur = [line.replace(olStart, "")];
          } else if (cur !== null) {
            const t = line.trim();
            if (t.length > 0) cur.push(t);
          }
        }
        if (cur !== null) items.push(cur);
        const itemsHtml = items.map((parts) => {
          const ps = parts
            .filter((p) => p.length > 0)
            .map((p) => `<p>${inline(escape(p))}</p>`)
            .join("");
          return `<li>${ps}</li>`;
        });
        out.push(`<ol>${itemsHtml.join("")}</ol>`);
        continue;
      }

      // Paragraph
      out.push(`<p>${inline(escape(lines.join(" ")))}</p>`);
    }
    return out.join("");
  }

  function fmtTime(ms) {
    if (!ms) return "";
    const d = new Date(ms);
    return d.toLocaleString();
  }

  /** Map H2 heading text → section class. We match on a normalised lowercase
   *  comparison so the report writer can produce minor variations (e.g.
   *  "Where We Diverged · The Crux") and the wrapper still applies. */
  const SECTION_MATCHERS = [
    { re: /^bottom\s*line/i,                     cls: "section-bottom-line" },
    { re: /^the\s*thesis|^thesis$/i,             cls: "section-thesis" },
    { re: /^a\s+working\s+hypothesis|^working\s*hypothesis/i, cls: "section-working-hypothesis" },
    { re: /^strategic\s*outlook|^战略前景|^战略展望/i, cls: "section-strategic-outlook" },
    { re: /^frame\s*shift/i,                     cls: "section-frame-shift" },
    { re: /^headline\s*findings?/i,              cls: "section-headline-findings" },
    { re: /^three\s*big\s*ideas|^big\s*ideas/i,  cls: "section-big-ideas" },
    { re: /^(where\s*we\s*)?converge[d]?/i,      cls: "section-convergence" },
    { re: /^(where\s*we\s*)?diverge[d]?|crux/i,  cls: "section-divergence" },
    { re: /^positions?/i,                        cls: "section-positions" },
    { re: /^options?\s*analysis/i,               cls: "section-options-analysis" },
    { re: /^two\s*paths|^two\s*futures|^two\s*scenarios/i, cls: "section-two-paths" },
    { re: /^why\s*now/i,                         cls: "section-why-now" },
    // Gartner-density blocks · placed in classifier order so a brief
    // with all four reads top-to-bottom: outlook → assumptions → tree
    // → indicators. The matchers tolerate light wording variation
    // (e.g. "Critical Assumptions Log").
    { re: /^critical\s*assumptions?|^load[-\s]bearing\s*assumptions?|^承重假设|^关键假设/i, cls: "section-critical-assumptions" },
    { re: /^scenario\s*tree|^scenarios?$|^情景树|^情景分析|^命名情景/i, cls: "section-scenario-tree" },
    { re: /^leading\s*indicators?|^watch[-\s]list|^先行指标|^监测指标|^监控信号/i, cls: "section-leading-indicators" },
    // Dashboard-style KPI strip · catches the house-style label
    // variants (By the Numbers / The Underwrite / Three Numbers Worth
    // Pricing In / Strategic Indicators / Quantitative Reads / 用数字说话 /
    // 关键指标 / 指标看板 / 实证锚点 / 战略指标 / etc.) plus the literal default.
    { re: /^by\s*the\s*numbers|^the\s*underwrite|^(three|key|strategic|quantitative)\s*(numbers?|metrics?|indicators?|reads?|anchors?)|^numbers?\s*(that|worth)|^the\s*numbers$|^a\s+few\s+numbers|^what\s+the\s+(numbers|data|math)|^why\s+the\s+math|^the\s*diagnostic\s*at\s*a\s*glance|^indicator\s*dashboard|^empirical\s*anchors|^metric\s*strip|^用数字说话|^支撑数据|^值得定价的|^数字$|^数字告诉我们|^几个浮上来的数字|^数据怎么说|^为什么数算得过来|^战略指标|^关键指标|^诊断速览|^驱动判断的数字|^定量结果|^实证锚点|^指标看板|^定量判读/i, cls: "section-metric-strip" },
    { re: /^recommendations?/i,                  cls: "section-recommendations" },
    { re: /^the\s*bet$|^the\s*bet[\s·:]/i,       cls: "section-the-bet" },
    { re: /^considerations?/i,                   cls: "section-considerations" },
    { re: /^pre[-\s]?mortem|risks?/i,            cls: "section-pre-mortem" },
    { re: /^new\s*questions?/i,                  cls: "section-new-questions" },
    { re: /^strategic\s*planning\s*assumption|^planning\s*assumption/i, cls: "section-planning-assumption" },
    { re: /^open\s*questions?/i,                 cls: "section-open-questions" },
    { re: /^methodology|^方法论|^methods?$/i,    cls: "section-methodology" },

    // ── Brainstorm-mode sections (room.mode === "brainstorm") ──
    // Match the field-notes house-style label variants + writer prompt
    // headings. Patterns are permissive — the writer occasionally adds
    // suffixes / decorations.
    { re: /^what\s+if\s+this\s+is\s+real|^what\s+changes\s+if|^the\s+premise\s+worth|^如果这事成立|^若这件事真的发生|^值得呆一会儿的前提/i, cls: "section-opening-hook" },
    { re: /^the\s+shape\s+of\s+the\s+room|^how\s+big\s+the\s+question|^where\s+this\s+lives|^房间的形状|^这个问题有多大|^这事生活在哪里/i, cls: "section-opportunity-shape" },
    { re: /^doors\s+worth\s+opening|^different\s+ways\s+in|^angles\s+the\s+room|^值得打开的几扇门|^几种不同的进入方式|^房间试戴过的几个角度/i, cls: "section-adjacent-angles" },
    { re: /^if\s+this\s+plays\s+out|^what\s+this\s+could\s+open\s+up|^如果这条线走通了|^这会打开什么/i, cls: "section-what-if-this-works" },
    { re: /^threads\s+worth\s+pulling|^where\s+the\s+heat\s+is|^things\s+the\s+room\s+kept\s+returning|^值得拉的几条线|^热度在哪里|^房间反复回到的事/i, cls: "section-worth-chasing" },
    { re: /^roads\s+we\s+walked\s+back|^paths\s+the\s+room\s+set\s+down|^我们折返的几条路|^房间放下的几条路径/i, cls: "section-dead-ends-noted" },
    { re: /^questions\s+worth\s+sitting\s+with|^what\s+this\s+opens\s+up|^the\s+field's\s+next\s+horizon|^值得多坐一会儿的问题|^由此打开的问题|^这个领域的下一道地平线/i, cls: "section-brainstorm-questions" },
    // Mode-neutral writer-prompt headings the brainstorm writer uses
    // for frame-shift / convergence / divergence (the brainstorm
    // writer prompt phrases them differently from the constructive
    // ones, so add narrow matchers for those exact phrasings).
    { re: /^how\s+the\s+question\s+moved/i,     cls: "section-frame-shift" },
    { re: /^where\s+the\s+room\s+aligned/i,     cls: "section-convergence" },
    { re: /^where\s+the\s+room\s+split/i,       cls: "section-divergence" },
    { re: /^sketches\s+from\s+the\s+room|^房间里的草图/i, cls: "section-options-analysis" },

    // ── Critique-mode sections (room.mode === "critique") ──
    // The audit-memo house style + the critique writer prompt.
    { re: /^under\s+review|^what\s+this\s+audit\s+covers|^审查对象|^本次审查的范围/i, cls: "section-deliverable-summary" },
    { re: /^what's\s+already\s+working|^strengths\s+worth\s+preserving|^what\s+the\s+deliverable\s+gets\s+right|^已经在起作用的部分|^值得保留的优点|^交付物已经做对的事/i, cls: "section-whats-good" },
    { re: /^issues\s+found|^where\s+the\s+deliverable\s+breaks\s+down|^quality\s+defects|^发现的问题|^交付物的失效点|^质量缺陷/i, cls: "section-quality-issues" },
    { re: /^fixes,\s*ranked|^what\s+to\s+change|^prescriptions?|^修复方案|^需要修改的地方|^处方/i, cls: "section-severity-ranked-fixes" },
    { re: /^residual\s+risks?|^risks?\s+the\s+audit\s+couldn't\s+close|^残余风险|^本次审查无法关闭的风险/i, cls: "section-residual-risks" },
  ];

  function classifyHeading(text) {
    const t = (text || "").trim().toLowerCase();
    for (const m of SECTION_MATCHERS) if (m.re.test(t)) return m.cls;
    return null;
  }

  /** Walk the body, tag each H2 + wrap its following content (until the
   *  next H2 or end of body) in a <section> with the matching class. */
  function wrapSections(body) {
    const h2s = Array.from(body.querySelectorAll("h2"));
    for (const h2 of h2s) {
      const cls = classifyHeading(h2.textContent);
      if (!cls) continue;
      h2.classList.add(cls);
      // Collect siblings until next H2.
      const between = [];
      let n = h2.nextSibling;
      while (n && !(n.nodeType === 1 && n.tagName === "H2")) {
        const next = n.nextSibling;
        between.push(n);
        n = next;
      }
      if (!between.length) continue;
      const section = document.createElement("section");
      section.classList.add(cls);
      // Insert section right after the H2.
      h2.parentNode.insertBefore(section, h2.nextSibling);
      for (const node of between) section.appendChild(node);
    }
  }

  /** Tag inline `<code>` elements that look like confidence / priority
   *  badges so CSS can color them. Looks at text content only. */
  function tagBadges(body) {
    const codes = Array.from(body.querySelectorAll("code"));
    for (const c of codes) {
      const t = (c.textContent || "").trim();
      if (/^P0$/i.test(t)) c.classList.add("badge-priority-p0");
      else if (/^P1$/i.test(t)) c.classList.add("badge-priority-p1");
      else if (/^P2$/i.test(t)) c.classList.add("badge-priority-p2");
      else if (/^high$/i.test(t)) c.classList.add("badge-confidence-high");
      else if (/^medium$/i.test(t)) c.classList.add("badge-confidence-medium");
      else if (/^low$/i.test(t)) c.classList.add("badge-confidence-low");
    }
  }

  /** Inject mono "section 0X" labels above each chapter H2 (skipping
   *  the Bottom Line, which has its own treatment, and the Methodology
   *  footer). McKinsey-style chapter numbering. */
  function injectChapterNumbers(body) {
    const h2s = Array.from(body.querySelectorAll("h2"));
    let n = 0;
    for (const h2 of h2s) {
      // Skip the anchor sections (executive-summary slot, not a numbered
      // chapter) and Methodology (footer treatment).
      if (h2.classList.contains("section-bottom-line")) continue;
      if (h2.classList.contains("section-thesis")) continue;
      if (h2.classList.contains("section-working-hypothesis")) continue;
      if (h2.classList.contains("section-methodology")) continue;
      // Brainstorm anchor (opening-hook) + critique anchor
      // (deliverable-summary) play the same "executive-summary slot"
      // role as bottom-line/thesis — exempt from chapter numbering.
      if (h2.classList.contains("section-opening-hook")) continue;
      if (h2.classList.contains("section-deliverable-summary")) continue;
      n += 1;
      const num = String(n).padStart(2, "0");
      const label = document.createElement("div");
      label.className = "chapter-num";
      label.textContent = `Section ${num}`;
      h2.parentNode.insertBefore(label, h2);
    }
  }

  /** Inside the Headline Findings section, transform 3 H3 sub-headings
   *  into a pillar grid. Each pillar = .pillar div containing the H3
   *  + everything until the next H3. Three pillars side-by-side on
   *  wide screens (CSS handles responsive collapse). */
  function buildHeadlinePillars(body) {
    const section = body.querySelector("section.section-headline-findings");
    if (!section) return;
    const h3s = Array.from(section.querySelectorAll("h3"));
    if (h3s.length === 0) return;
    const grid = document.createElement("div");
    grid.className = "pillars-grid";
    h3s.forEach((h3, i) => {
      const pillar = document.createElement("div");
      pillar.className = "pillar";
      const num = document.createElement("div");
      num.className = "pillar-num";
      num.textContent = String(i + 1).padStart(2, "0");
      pillar.appendChild(num);
      pillar.appendChild(h3.cloneNode(true));
      let n = h3.nextSibling;
      while (n && !(n.nodeType === 1 && n.tagName === "H3")) {
        const next = n.nextSibling;
        pillar.appendChild(n.cloneNode(true));
        n = next;
      }
      grid.appendChild(pillar);
    });
    // Replace original H3 + content with the grid.
    // Remove the H3s and their following siblings up to (but not including) the next non-h3 element after the last h3 group.
    const firstH3 = h3s[0];
    const insertAt = firstH3;
    // Collect all the nodes to remove (H3s + everything between them + after the last H3 within the section).
    const toRemove = [];
    let cur = firstH3;
    while (cur && cur !== section.lastChild?.nextSibling) {
      toRemove.push(cur);
      cur = cur.nextSibling;
    }
    section.insertBefore(grid, firstH3);
    for (const node of toRemove) {
      if (node && node.parentNode === section) section.removeChild(node);
    }
  }

  /** Number Visual H3s as Exhibit 01 / 02 / … inside the Options
   *  Analysis section. */
  function injectExhibitLabels(body) {
    const section = body.querySelector("section.section-options-analysis");
    if (!section) return;
    const h3s = Array.from(section.querySelectorAll("h3"));
    h3s.forEach((h3, i) => {
      const num = String(i + 1).padStart(2, "0");
      const label = document.createElement("div");
      label.className = "chapter-num";
      label.style.margin = "32px 0 6px";
      label.textContent = `Exhibit ${num}`;
      h3.parentNode.insertBefore(label, h3);
    });
  }

  /** Recommendations / Considerations · the prompt produces a numbered
   *  list where each `<li>` is a wall of `<em>Label:</em> value`
   *  paragraphs. Without restructuring, every metadata field looks
   *  identical — readers can't scan owner/horizon/metric/risk apart.
   *
   *  We rebuild each `<li>` into:
   *    · header  · priority badge + action sentence
   *    · meta    · 3-column dl of Owner / Horizon / Success metric
   *    · prose   · rationale paragraph (no label)
   *    · risk    · soft alert callout
   *
   *  Field detection is by the leading `<em>` text after the lead p.
   *  Robust to two fields-per-paragraph (`_Owner:_ X · _Horizon:_ Y`),
   *  to fields appearing in any order, and to mixed en/zh content. */

  // Canonical key per known label. Substring match (case-insensitive,
  // colons stripped). Considerations uses different label words for the
  // same fields — both map here.
  const REC_LABEL_MAP = [
    { key: "rationale", patterns: ["rationale", "worth thinking about because"] },
    { key: "owner",     patterns: ["owner", "who'd own it", "who would own it"] },
    { key: "horizon",   patterns: ["horizon", "on what horizon"] },
    { key: "metric",    patterns: ["success metric", "what you'd watch", "what you would watch"] },
    { key: "risk",      patterns: ["risk if skipped", "what you'd give up by not doing this", "what you'd give up"] },
  ];
  function recLabelKey(rawLabel) {
    const t = String(rawLabel || "").toLowerCase().replace(/[:：]\s*$/, "").trim();
    if (!t) return null;
    for (const m of REC_LABEL_MAP) {
      for (const p of m.patterns) {
        if (t === p || t.startsWith(p)) return m.key;
      }
    }
    return null;
  }

  // Walk a `<p>` that may contain one or more `<em>Label:</em> value`
  // pairs separated by ` · ` (or commas / pipes). Return [{ key, value }].
  function parseRecMetaParagraph(p) {
    const ems = Array.from(p.querySelectorAll(":scope > em, :scope > strong > em"));
    const out = [];
    if (ems.length === 0) return out;
    for (let i = 0; i < ems.length; i++) {
      const em = ems[i];
      const key = recLabelKey(em.textContent);
      if (!key) continue;
      // Walk siblings until the next <em> (or end of paragraph),
      // accumulating text + inline markup.
      const stop = ems[i + 1] || null;
      let value = "";
      let n = em.nextSibling;
      while (n && n !== stop) {
        if (n.nodeType === 1 || n.nodeType === 3) {
          value += n.nodeType === 1 ? n.outerHTML || n.textContent : n.textContent;
        }
        n = n.nextSibling;
      }
      // Trim whitespace and the leading `· ` separator that might
      // sit between two fields.
      value = value
        .replace(/^[\s·,|]+/, "")
        .replace(/[\s·,|]+$/, "")
        .trim();
      if (value) out.push({ key, valueHtml: value });
    }
    return out;
  }

  function buildRecommendationItem(li, index) {
    const ps = Array.from(li.children).filter((n) => n.tagName === "P");
    if (ps.length === 0) return null;

    // Lead paragraph · expects priority `<code>` + action `<strong>`.
    const lead = ps[0];
    const codeBadge = lead.querySelector("code");
    const priority = codeBadge ? codeBadge.textContent.trim() : "";
    // Action text = lead minus the priority badge (and its wrapping
    // <strong> when the badge is alone inside one).
    const leadClone = lead.cloneNode(true);
    const cloneBadge = leadClone.querySelector("code");
    if (cloneBadge) {
      const wrappingStrong = cloneBadge.parentElement;
      const isAloneInStrong = wrappingStrong
        && wrappingStrong.tagName === "STRONG"
        && wrappingStrong.childNodes.length === 1;
      (isAloneInStrong ? wrappingStrong : cloneBadge).remove();
    }
    // The remaining text is the action — typically still wrapped in a
    // single <strong>. Unwrap it so .rec-action's own typography wins.
    if (leadClone.children.length === 1
        && leadClone.firstElementChild.tagName === "STRONG"
        && leadClone.firstElementChild.textContent.trim() === leadClone.textContent.trim()) {
      leadClone.firstElementChild.outerHTML = leadClone.firstElementChild.innerHTML;
    }
    const actionHtml = leadClone.innerHTML.trim();

    const fields = {};
    for (let i = 1; i < ps.length; i++) {
      const parsed = parseRecMetaParagraph(ps[i]);
      for (const { key, valueHtml } of parsed) {
        if (!fields[key]) fields[key] = valueHtml;
      }
    }

    // ── New editorial DOM ───────────────────────────────────────────
    //   ┌── rule ──┐
    //   │ 01  P0   │ ── thin line filling the rest of the row
    //   ├──────────┤
    //   │ ACTION   │ large display
    //   │ rational │ body prose
    //   │ MO·HO·SM │ inline meta row
    //   │ ⚠ risk   │ italic one-liner
    //   └──────────┘
    const newLi = document.createElement("li");
    newLi.className = "rec-item";
    if (priority) newLi.classList.add(`rec-priority-${priority.toLowerCase()}`);

    const rule = document.createElement("div");
    rule.className = "rec-rule";
    const num = document.createElement("span");
    num.className = "rec-num";
    num.textContent = String(index).padStart(2, "0");
    rule.appendChild(num);
    if (priority) {
      const badge = document.createElement("code");
      const lvl = priority.toLowerCase();
      if (/^p[012]$/.test(lvl)) badge.className = `badge-priority-${lvl}`;
      badge.textContent = priority;
      rule.appendChild(badge);
    }
    const ruleLine = document.createElement("span");
    ruleLine.className = "rec-rule-line";
    ruleLine.setAttribute("aria-hidden", "true");
    rule.appendChild(ruleLine);
    newLi.appendChild(rule);

    const action = document.createElement("h3");
    action.className = "rec-action";
    action.innerHTML = actionHtml;
    newLi.appendChild(action);

    if (fields.rationale) {
      const ratP = document.createElement("p");
      ratP.className = "rec-rationale";
      ratP.innerHTML = fields.rationale;
      newLi.appendChild(ratP);
    }

    const metaPairs = [];
    if (fields.owner)   metaPairs.push({ label: "Owner",   value: fields.owner });
    if (fields.horizon) metaPairs.push({ label: "Horizon", value: fields.horizon });
    if (fields.metric)  metaPairs.push({ label: "Metric",  value: fields.metric });
    if (metaPairs.length) {
      const meta = document.createElement("div");
      meta.className = "rec-meta";
      metaPairs.forEach((p, i) => {
        const pair = document.createElement("span");
        pair.className = "rec-meta-pair";
        const lbl = document.createElement("span");
        lbl.className = "rec-meta-label";
        lbl.textContent = p.label;
        const val = document.createElement("span");
        val.className = "rec-meta-value";
        val.innerHTML = p.value;
        pair.appendChild(lbl);
        pair.appendChild(val);
        meta.appendChild(pair);
        if (i < metaPairs.length - 1) {
          const sep = document.createElement("span");
          sep.className = "rec-meta-sep";
          sep.setAttribute("aria-hidden", "true");
          sep.textContent = "·";
          meta.appendChild(sep);
        }
      });
      newLi.appendChild(meta);
    }

    if (fields.risk) {
      const risk = document.createElement("p");
      risk.className = "rec-risk";
      const prefix = document.createElement("span");
      prefix.className = "rec-risk-prefix";
      prefix.textContent = "Risk if skipped";
      const sep = document.createElement("span");
      sep.className = "rec-risk-sep";
      sep.setAttribute("aria-hidden", "true");
      sep.textContent = "—";
      const text = document.createElement("span");
      text.className = "rec-risk-text";
      text.innerHTML = fields.risk;
      risk.appendChild(prefix);
      risk.appendChild(sep);
      risk.appendChild(text);
      newLi.appendChild(risk);
    }

    return newLi;
  }

  /** The brief writer separates list items with blank lines, which the
   *  markdown renderer turns into multiple consecutive `<ol>` blocks
   *  rather than one. Merge them before restructuring so item numbering
   *  is continuous and CSS sees a single list. */
  function mergeConsecutiveOls(section) {
    const ols = Array.from(section.querySelectorAll(":scope > ol"));
    if (ols.length <= 1) return ols[0] || null;
    const first = ols[0];
    for (let i = 1; i < ols.length; i++) {
      while (ols[i].firstChild) first.appendChild(ols[i].firstChild);
      ols[i].remove();
    }
    return first;
  }

  function restructureRecommendations(body) {
    const sections = Array.from(body.querySelectorAll(
      "section.section-recommendations, section.section-considerations"
    ));
    for (const section of sections) {
      const ol = mergeConsecutiveOls(section);
      if (!ol) continue;
      const lis = Array.from(ol.children).filter((n) => n.tagName === "LI");
      lis.forEach((li, idx) => {
        const newLi = buildRecommendationItem(li, idx + 1);
        if (newLi) li.replaceWith(newLi);
      });
    }
  }

  /** New Questions · same wall-of-em-labels problem. We rebuild each
   *  `<li>` into a card with a Q-numeral, italic question text (large
   *  & inviting), a why-it-matters prose paragraph (no label), and a
   *  small attribution byline at the bottom. */
  const NQ_LABEL_MAP = [
    { key: "why", patterns: ["why it matters", "why matters"] },
    { key: "by",  patterns: ["surfaced by", "raised by", "asked by"] },
  ];
  function nqLabelKey(rawLabel) {
    const t = String(rawLabel || "").toLowerCase().replace(/[:：]\s*$/, "").trim();
    if (!t) return null;
    for (const m of NQ_LABEL_MAP) {
      for (const p of m.patterns) {
        if (t === p || t.startsWith(p)) return m.key;
      }
    }
    return null;
  }
  function parseNqMetaParagraph(p) {
    const ems = Array.from(p.querySelectorAll(":scope > em, :scope > strong > em"));
    const out = [];
    if (ems.length === 0) return out;
    for (let i = 0; i < ems.length; i++) {
      const em = ems[i];
      const key = nqLabelKey(em.textContent);
      if (!key) continue;
      const stop = ems[i + 1] || null;
      let value = "";
      let n = em.nextSibling;
      while (n && n !== stop) {
        if (n.nodeType === 1 || n.nodeType === 3) {
          value += n.nodeType === 1 ? n.outerHTML || n.textContent : n.textContent;
        }
        n = n.nextSibling;
      }
      value = value.replace(/^[\s·,|]+/, "").replace(/[\s·,|]+$/, "").trim();
      if (value) out.push({ key, valueHtml: value });
    }
    return out;
  }

  function buildNewQuestionItem(li, index) {
    const ps = Array.from(li.children).filter((n) => n.tagName === "P");
    if (ps.length === 0) return null;

    const leadClone = ps[0].cloneNode(true);
    if (leadClone.children.length === 1 && leadClone.firstElementChild.tagName === "STRONG"
        && leadClone.firstElementChild.textContent.trim() === leadClone.textContent.trim()) {
      leadClone.firstElementChild.outerHTML = leadClone.firstElementChild.innerHTML;
    }
    const questionHtml = leadClone.innerHTML.trim();

    const fields = {};
    for (let i = 1; i < ps.length; i++) {
      const parsed = parseNqMetaParagraph(ps[i]);
      for (const { key, valueHtml } of parsed) {
        if (!fields[key]) fields[key] = valueHtml;
      }
    }

    // ── Op-ed style DOM ─────────────────────────────────────────────
    //   ┌── rule ──┐
    //   │ Q1 ── line ── Director Name (right) │
    //   ├──────────────────────────────────────┤
    //   │ "italic display question"            │
    //   │ why-it-matters body prose            │
    //   └──────────────────────────────────────┘
    const newLi = document.createElement("li");
    newLi.className = "nq-item";

    const rule = document.createElement("div");
    rule.className = "nq-rule";
    const num = document.createElement("span");
    num.className = "nq-num";
    num.textContent = `Q${index}`;
    rule.appendChild(num);
    const ruleLine = document.createElement("span");
    ruleLine.className = "nq-rule-line";
    ruleLine.setAttribute("aria-hidden", "true");
    rule.appendChild(ruleLine);
    if (fields.by) {
      const by = document.createElement("span");
      by.className = "nq-attribution";
      const byPrefix = document.createElement("span");
      byPrefix.className = "nq-attribution-prefix";
      byPrefix.textContent = "Surfaced by";
      const who = document.createElement("span");
      who.className = "nq-attribution-who";
      who.innerHTML = fields.by;
      by.appendChild(byPrefix);
      by.appendChild(who);
      rule.appendChild(by);
    }
    newLi.appendChild(rule);

    const q = document.createElement("blockquote");
    q.className = "nq-question";
    q.innerHTML = questionHtml;
    newLi.appendChild(q);

    if (fields.why) {
      const why = document.createElement("p");
      why.className = "nq-why";
      why.innerHTML = fields.why;
      newLi.appendChild(why);
    }

    return newLi;
  }

  function restructureNewQuestions(body) {
    const section = body.querySelector("section.section-new-questions");
    if (!section) return;
    const ol = mergeConsecutiveOls(section);
    if (!ol) return;
    const lis = Array.from(ol.children).filter((n) => n.tagName === "LI");
    lis.forEach((li, idx) => {
      const newLi = buildNewQuestionItem(li, idx + 1);
      if (newLi) li.replaceWith(newLi);
    });
  }

  /** Merge consecutive `<ol>` blocks in every wrapped section. The
   *  brief writer separates numbered items with blank lines, which the
   *  markdown renderer turns into N adjacent OLs — each restarts the
   *  counter at 01 and produces a doubled rule between siblings (item-1's
   *  bottom border + item-2's top border). Big Ideas, The Bet, and any
   *  other section with `1. … 2. …` content all need this merge before
   *  the spine CSS sees the list. */
  function mergeAllOlsInSections(body) {
    const sections = body.querySelectorAll("section");
    for (const s of sections) mergeConsecutiveOls(s);
    // Body-wide groupwise pass · catches H2s that didn't match a known
    // section classifier (e.g. model-invented "共识忽视的三件事" /
    // "What we're missing"). Their ordered-list content sits as loose
    // body children between H2s and was never wrapped in a <section>,
    // so the per-section merge above never reached it — every
    // blank-line-separated `1. …` item rendered as its own <ol>
    // restarting at "1". Walks direct body children groupwise: H2 (or
    // any non-OL sibling) breaks the run so we never merge across
    // unrelated headings.
    mergeAdjacentOlSiblings(body);
  }

  /** Merge each run of consecutive sibling `<ol>` elements directly
   *  under `parent` into a single `<ol>`. Any non-OL sibling (H2, P,
   *  HR, ...) breaks the run. Idempotent: a run of one is a no-op. */
  function mergeAdjacentOlSiblings(parent) {
    const children = Array.from(parent.children);
    let head = null;
    for (const child of children) {
      if (child.tagName === "OL") {
        if (head === null) {
          head = child;
        } else {
          while (child.firstChild) head.appendChild(child.firstChild);
          child.remove();
        }
      } else {
        head = null;
      }
    }
  }

  function decorateReport(body) {
    if (!body) return;
    try {
      wrapSections(body);
      mergeAllOlsInSections(body);
      tagBadges(body);
      injectChapterNumbers(body);
      buildHeadlinePillars(body);
      injectExhibitLabels(body);
      restructureRecommendations(body);
      restructureNewQuestions(body);
    } catch (e) {
      // Decoration is purely visual — log and leave the raw markdown
      // standing if anything goes sideways.
      console.warn("[report] decorate failed:", e);
    }
  }

  function showError(msg) {
    root.innerHTML = `<div class="placeholder error">${escape(msg)}</div>`;
  }

  async function load() {
    if (!roomId) {
      showError("no room id in url");
      return;
    }
    let room, brief, members;
    try {
      // Load room state + the requested brief in parallel.
      const briefEndpoint = briefId
        ? "/api/briefs/" + encodeURIComponent(briefId)
        : "/api/rooms/" + encodeURIComponent(roomId) + "/brief";
      const [stateRes, briefRes] = await Promise.all([
        fetch("/api/rooms/" + encodeURIComponent(roomId)),
        fetch(briefEndpoint),
      ]);
      if (!briefRes.ok) {
        showError(briefRes.status === 404 ? "no brief filed for this room yet" : "failed to load brief");
        return;
      }
      brief = await briefRes.json();
      if (stateRes.ok) {
        const j = await stateRes.json();
        room = j.room;
        members = j.members || [];
      } else {
        members = [];
      }
    } catch (e) {
      showError("network error: " + (e && e.message ? e.message : String(e)));
      return;
    }

    document.title = "BOARDROOM // " + (brief.title || "brief");
    swapSpine(brief.spine || "boardroom-dark");

    const signed = members
      .map((a) => `<img src="${escape(a.avatarPath)}" alt="${escape(a.name)}" title="${escape(a.name)}">`)
      .join("");

    const filedDate = brief.createdAt
      ? new Date(brief.createdAt).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" })
      : "—";
    const docId = (brief.id || "").slice(0, 12).toUpperCase();
    const subjectShort = room?.subject ? escape(room.subject.length > 64 ? room.subject.slice(0, 64) + "…" : room.subject) : "—";

    // Cover deck · the subtitle under the H1. Derived from the brief's
    // own opening prose (the lede) instead of a separate column —
    // writers naturally put their punchiest framing in the first
    // paragraph, so it reads as a written subtitle. Skips leading
    // headings, fenced blocks, lists, blockquotes, and HTML so we land
    // on real paragraph text. Strips inline markdown decoration and
    // caps length so it fits in 2-3 lines under the title.
    const deckText = (() => {
      const md = (brief.bodyMd || "").trim();
      if (!md) return "";
      const lines = md.split(/\r?\n/);
      const para = [];
      let inFence = false;
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (/^```/.test(line)) { inFence = !inFence; if (para.length) break; continue; }
        if (inFence) continue;
        if (!line.trim()) { if (para.length) break; continue; }
        if (/^#{1,6}\s/.test(line)) continue;
        if (/^[-*+]\s|^\d+\.\s/.test(line)) { if (para.length) break; continue; }
        if (/^>\s?/.test(line)) { if (para.length) break; continue; }
        if (/^<[a-z!/]/i.test(line)) { if (para.length) break; continue; }
        if (/^[-=*_]{3,}\s*$/.test(line)) { if (para.length) break; continue; }
        if (/^\|/.test(line)) { if (para.length) break; continue; }
        para.push(line.trim());
      }
      let text = para.join(" ");
      text = text
        .replace(/`([^`]+)`/g, "$1")
        .replace(/!\[[^\]]*]\([^)]*\)/g, "")
        .replace(/\[([^\]]+)]\([^)]*\)/g, "$1")
        .replace(/\*\*([^*]+)\*\*/g, "$1")
        .replace(/__([^_]+)__/g, "$1")
        .replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, "$1")
        .replace(/(?<!_)_([^_]+)_(?!_)/g, "$1")
        .replace(/<[^>]+>/g, "")
        .replace(/\s+/g, " ")
        .trim();
      const CAP = 220;
      if (text.length > CAP) {
        const cut = text.slice(0, CAP);
        const lastSpace = cut.lastIndexOf(" ");
        text = (lastSpace > CAP * 0.7 ? cut.slice(0, lastSpace) : cut).trim() + "…";
      }
      return text;
    })();

    // Masthead: the dossier strip at the top of the cover. Reads like
    // a research-note dateline rather than a marketing eyebrow.
    const isoFiled = brief.createdAt
      ? new Date(brief.createdAt).toISOString().slice(0, 10).replace(/-/g, ".")
      : "—";
    root.innerHTML = `
      <header class="cover">
        <div class="cover-tag">
          <span>Boardroom · Research Note</span>
          <span class="pipe"></span>
          <span class="secondary">Dossier ${escape(docId || "—")}</span>
          <span class="pipe"></span>
          <span class="secondary">Filed ${escape(isoFiled)}</span>
        </div>
        <h1 class="cover-title">${escape(brief.title || "(untitled)")}</h1>
        ${deckText ? `<div class="cover-deck">${escape(deckText)}</div>` : ""}
