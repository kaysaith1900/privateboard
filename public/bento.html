<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=840, initial-scale=1">
  <title>Bento · PrivateBoard</title>
  <link rel="icon" href="/avatars/chair.svg" type="image/svg+xml">
  <style>
  /* ═══════════════════════════════════════════════════════════════════
     Bento · single-page infographic layout. White paper register.
     Single accent colour (lime-green by default · matches the reference
     poster). Serif headlines + sans body + mono kickers + gold callout
     numbers. Card-grid via CSS grid; deterministic from BentoScaffold
     JSON · no markdown parsing here.
     ─────────────────────────────────────────────────────────────────── */
  :root {
    --bg:           #FFFFFF;
    --paper-soft:   #FAF7EC;
    --ink:          #1A1814;
    --ink-soft:     #4A4338;
    --ink-mid:      #6B6359;
    --ink-faint:    #8E8B83;
    --ink-muted:    #B5AB9B;
    --rule:         #E5E2DA;
    --rule-soft:    #F0EDE3;
    --rule-strong:  #C9C4B7;
    --accent:       #76B900;
    --accent-deep:  #5E9300;
    --accent-pale:  #ECF7DA;
    --gold:         #C9A46B;
    --gold-deep:    #B58950;
    --serif: "Charter", "Source Serif Pro", "Iowan Old Style",
             "Tiempos Headline", Georgia,
             "PingFang SC", "Songti SC", "STSong", serif;
    --sans:  "Inter", "Helvetica Neue", -apple-system, BlinkMacSystemFont,
             "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
             "Source Han Sans CN", "Noto Sans CJK SC", sans-serif;
    --mono:  "SF Mono", "JetBrains Mono", "Menlo",
             "PingFang SC", "Source Han Sans CN", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* ─── Top chrome · brand crumb + actions ────────────────────────── */
  .bento-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
  }
  .bento-crumb {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
  }
  .bento-crumb::before {
    content: "";
    width: 9px;
    height: 9px;
    background: var(--accent);
    border-radius: 50%;
    flex: 0 0 auto;
  }
  .bento-crumb-accent {
    color: var(--ink-faint);
    font-style: italic;
    font-weight: 400;
  }
  .bento-actions { display: flex; gap: 6px; }
  .bento-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 6px 12px;
    background: transparent;
    border: 0.5px solid var(--rule-strong);
    color: var(--ink-mid);
    cursor: pointer;
    text-decoration: none;
    transition: color 0.12s, background 0.12s, border-color 0.12s;
  }
  .bento-btn:hover {
    color: var(--accent-deep);
    border-color: var(--accent);
    background: var(--accent-pale);
  }
  .bento-btn:active { transform: translateY(1px); }
  .bento-btn .glyph { color: var(--ink-faint); margin-right: 4px; }
  .bento-btn:hover .glyph { color: var(--accent-deep); }

  /* ─── Doc container · max-width 840px to match the reference ──── */
  .bento-doc {
    max-width: 840px;
    margin: 0 auto;
    padding: 32px 32px 64px;
    background: var(--bg);
  }

  /* ─── Header band · serif headline + italic deck + source line ─ */
  .bento-header {
    margin-bottom: 24px;
    position: relative;
  }
  .bento-source {
    position: absolute;
    top: 6px;
    right: 0;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    text-align: right;
    white-space: nowrap;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bento-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
    line-height: 1.18;
    letter-spacing: -0.012em;
    color: var(--ink);
    margin: 0 280px 14px 0;
    max-width: 580px;
  }
  .bento-kicker {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    font-style: italic;
    max-width: 640px;
  }
  .bento-kicker::before {
    content: "";
    width: 4px;
    flex: 0 0 4px;
    align-self: stretch;
    background: var(--accent);
    margin-top: 3px;
  }
  .bento-kicker-text { padding-top: 1px; }

  /* ─── Main grid · 2 columns · left timeline + right card stack ─ */
  .bento-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 18px;
    margin-bottom: 18px;
  }
  @media (max-width: 720px) {
    .bento-grid { grid-template-columns: 1fr; }
  }

  /* ─── Left column · vertical milestone timeline ────────────────── */
  .bento-milestones-card {
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 16px 18px 18px;
  }
  .bento-milestones-head {
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .bento-milestones-title {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .bento-milestones-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .bento-timeline {
    position: relative;
    padding-left: 20px;
  }
  .bento-timeline::before {
    content: "";
    position: absolute;
    top: 6px;
    bottom: 6px;
    left: 5px;
    border-left: 1px dashed var(--rule-strong);
  }
  .bento-milestone {
    position: relative;
    padding: 0 0 18px;
  }
  .bento-milestone:last-child { padding-bottom: 0; }
  .bento-milestone::before {
    content: "";
    position: absolute;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid var(--accent);
    top: 4px;
    left: -20px;
  }
  .bento-milestone:nth-child(2)::before { background: var(--accent); }
  .bento-milestone-period {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-deep);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .bento-milestone-card {
    background: var(--paper-soft);
    border: 1px solid var(--rule);
    padding: 12px 14px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 14px;
    align-items: start;
  }
  .bento-milestone-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--ink);
    grid-column: 1;
    grid-row: 1;
  }
  .bento-milestone-callout {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
    color: var(--gold-deep);
    letter-spacing: -0.02em;
    grid-column: 2;
    grid-row: 1 / span 2;
    align-self: center;
    text-align: right;
    white-space: nowrap;
  }
  .bento-milestone-body {
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
    grid-column: 1;
    grid-row: 2;
    margin-top: 4px;
  }
  .bento-milestone-tags {
    grid-column: 1 / -1;
    grid-row: 3;
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .bento-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-mid);
    background: var(--bg);
    border: 0.5px solid var(--rule-strong);
    padding: 2px 8px;
    border-radius: 8px;
    letter-spacing: 0.02em;
  }

  /* ─── Right column · stacked sidebar cards ─────────────────────── */
  .bento-col-right {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bento-card {
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 14px 16px;
  }
  .bento-card-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .bento-card-sub {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }

  /* Ranked bars · horizontal bar list */
  .bento-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-family: var(--sans);
    font-size: 12px;
  }
  .bento-bar:last-child { margin-bottom: 0; }
  .bento-bar-label {
    flex: 0 0 80px;
    color: var(--ink);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bento-bar-track {
    flex: 1 1 auto;
    height: 6px;
    background: var(--rule-soft);
    position: relative;
    border-radius: 1px;
  }
  .bento-bar-fill {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-deep));
  }
  .bento-bar-value {
    flex: 0 0 auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    min-width: 48px;
  }

  /* Bullet lists · verification + talking points */
  .bento-bullets {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .bento-bullets li {
    position: relative;
    padding-left: 16px;
    margin-bottom: 8px;
    font-family: var(--sans);
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--ink-soft);
  }
  .bento-bullets li:last-child { margin-bottom: 0; }
  .bento-bullets li::before {
    content: "";
    position: absolute;
    width: 5px;
    height: 5px;
    left: 4px;
    top: 7px;
    background: var(--accent);
  }
  .bento-card.bento-talking .bento-bullets li::before {
    background: var(--accent);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    top: 7px;
  }
  .bento-empty {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    font-style: italic;
    padding: 4px 0;
  }

  /* ─── Bottom band · conclusion + optional flow ─────────────────── */
  .bento-bottom {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    margin-bottom: 18px;
    align-items: stretch;
  }
  @media (max-width: 720px) {
    .bento-bottom { grid-template-columns: 1fr; }
  }
  .bento-conclusion {
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 16px 20px 18px;
    display: flex;
    align-items: center;
  }
  .bento-conclusion-mark {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-deep);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .bento-conclusion-inner { width: 100%; }
  .bento-conclusion-text {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.45;
    color: var(--ink);
    font-weight: 500;
  }
  .bento-flow {
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 14px 18px 16px;
    min-width: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .bento-flow-mark {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-deep);
    font-weight: 700;
  }
  .bento-flow-chain {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    text-align: center;
    line-height: 1.25;
  }
  .bento-flow-chain .arrow {
    color: var(--accent);
    margin: 0 6px;
    font-weight: 700;
  }
  .bento-flow-caption {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--ink-mid);
    text-align: center;
    margin-top: 2px;
  }

  /* ─── Footer band · mono caption ───────────────────────────────── */
  .bento-footer {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    flex-wrap: wrap;
  }
  .bento-footer-left {
    color: var(--ink-mid);
    font-weight: 500;
  }
  .bento-footer-right {
    color: var(--ink-faint);
  }
  .bento-footer-right .accent-swatch {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    border-radius: 1px;
  }

  /* ─── States · loading / error / empty ─────────────────────────── */
  .bento-state {
    max-width: 560px;
    margin: 80px auto;
    padding: 40px 32px;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--rule);
  }
  .bento-state-mark {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }
  .bento-state-title {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .bento-state-body {
    font-family: var(--sans);
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ─── Print · drop chrome, fit single page ────────────────────── */
  @media print {
    .bento-top-bar { display: none; }
    .bento-doc { padding: 12mm; max-width: none; }
    body, html { background: white; }
    .bento-milestone-card,
    .bento-card,
    .bento-conclusion,
    .bento-flow {
      break-inside: avoid;
      page-break-inside: avoid;
    }
  }
  </style>
</head>
<body>

  <header class="bento-top-bar" data-bento-chrome>
    <a href="/" class="bento-crumb">PrivateBoard <span class="bento-crumb-accent">· bento</span></a>
    <div class="bento-actions">
      <button type="button" class="bento-btn" data-bento-png>
        <span class="glyph">↓</span>PNG
      </button>
      <button type="button" class="bento-btn" data-bento-print>
        <span class="glyph">↓</span>PDF
      </button>
    </div>
  </header>

  <main data-bento-root>
    <div class="bento-state" data-bento-loading>
      <div class="bento-state-mark">// loading</div>
      <div class="bento-state-title">Loading bento…</div>
      <div class="bento-state-body">Fetching the structured infographic for this brief.</div>
    </div>
  </main>

  <script>
  /* ──────────────────────────────────────────────────────────────────
     Bento renderer · deterministic templating from BentoScaffold JSON.
     Reads the brief id from the URL query string (`?b=<id>` or
     `?r=<roomId>` for the latest brief on a room), fetches via the
     existing /api/briefs/:id endpoint, validates the brief is in
     bento mode, and templates the body_json into the layout.
     ────────────────────────────────────────────────────────────── */
  (function () {
    const params = new URLSearchParams(location.search);
    const briefId = (params.get("b") || "").trim();
    const roomId = (params.get("r") || "").trim();
    const root = document.querySelector("[data-bento-root]");

    function escape(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showState(mark, title, body) {
      root.innerHTML = `
        <div class="bento-state">
          <div class="bento-state-mark">${escape(mark)}</div>
          <div class="bento-state-title">${escape(title)}</div>
          <div class="bento-state-body">${escape(body)}</div>
        </div>`;
    }

    async function loadBrief() {
      let url;
      if (briefId) {
        url = `/api/briefs/${encodeURIComponent(briefId)}`;
      } else if (roomId) {
        url = `/api/rooms/${encodeURIComponent(roomId)}/brief`;
      } else {
        showState("// missing query", "No brief specified",
          "Add ?b=<briefId> or ?r=<roomId> to the URL.");
        return null;
      }
      const res = await fetch(url);
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        showState("// not found", "Brief not found",
          e.error || "The requested brief doesn't exist or is no longer available.");
        return null;
      }
      return await res.json();
    }

    function renderMilestone(m) {
      const tagsHtml = (m.tags || []).map((t) =>
        `<span class="bento-tag">${escape(t)}</span>`).join("");
      const bodyParts = [];
      bodyParts.push(`<div class="bento-milestone-period">${escape(m.period || "")}</div>`);
      bodyParts.push(`<div class="bento-milestone-card">`);
      bodyParts.push(`  <div class="bento-milestone-title">${escape(m.title || "")}</div>`);
      if (m.callout) {
        bodyParts.push(`  <div class="bento-milestone-callout">${escape(m.callout)}</div>`);
      }
      bodyParts.push(`  <div class="bento-milestone-body">${escape(m.body || "")}</div>`);
      if (tagsHtml) {
        bodyParts.push(`  <div class="bento-milestone-tags">${tagsHtml}</div>`);
      }
      bodyParts.push(`</div>`);
      return `<div class="bento-milestone">${bodyParts.join("")}</div>`;
    }

    function renderRankedBars(rb) {
      if (!rb || !rb.entries || rb.entries.length === 0) return "";
      const items = rb.entries.map((e) => {
        const ratio = Math.max(0, Math.min(1, Number(e.ratio) || 0));
        const pct = (ratio * 100).toFixed(1);
        return `
          <div class="bento-bar">
            <span class="bento-bar-label">${escape(e.label || "")}</span>
            <span class="bento-bar-track"><span class="bento-bar-fill" style="width: ${pct}%"></span></span>
            <span class="bento-bar-value">${escape(e.value || "")}</span>
          </div>`;
      }).join("");
      return `
        <section class="bento-card bento-ranked">
          <div class="bento-card-title">${escape(rb.title || "By the numbers")}</div>
          <div class="bento-card-sub">// ranked</div>
          ${items}
        </section>`;
    }

    function renderBullets(bd, klass) {
      if (!bd || !bd.bullets || bd.bullets.length === 0) {
        if (!bd || !bd.title) return "";
        return `
          <section class="bento-card ${klass}">
            <div class="bento-card-title">${escape(bd.title)}</div>
            <div class="bento-empty">// no bullets</div>
          </section>`;
      }
      const items = bd.bullets.map((b) => `<li>${escape(b)}</li>`).join("");
      return `
        <section class="bento-card ${klass}">
          <div class="bento-card-title">${escape(bd.title)}</div>
          <ul class="bento-bullets">${items}</ul>
        </section>`;
    }

    function renderFlow(flow) {
      if (!flow || !Array.isArray(flow.nodes) || flow.nodes.length < 2) return "";
      const chain = flow.nodes.map(escape).join('<span class="arrow">→</span>');
      const cap = flow.caption ? `<div class="bento-flow-caption">${escape(flow.caption)}</div>` : "";
      return `
        <aside class="bento-flow">
          <div class="bento-flow-mark">// transformation</div>
          <div class="bento-flow-chain">${chain}</div>
          ${cap}
        </aside>`;
    }

    function render(brief) {
      if (brief.mode !== "bento") {
        showState("// wrong mode", "This brief is a research note",
          "Open it in the report viewer instead. Bento is a separate output mode.");
        return;
      }
      const bento = brief.bodyJson;
      if (!bento || typeof bento !== "object") {
        if (brief.isGenerating) {
          showState("// generating",
            "Bento is still being prepared",
            "The chair is currently composing the infographic. Refresh in a few seconds.");
        } else {
          showState("// empty",
            "This brief has no bento data",
            "It may have failed to generate. Try regenerating from the room view.");
        }
        return;
      }

      // Set page title to the bento headline.
      if (bento.title) document.title = `${bento.title} · Bento`;

      const milestones = (bento.milestones || []).map(renderMilestone).join("");
      const rankedBars = renderRankedBars(bento.rankedBars);
      const verification = renderBullets(bento.verification, "bento-verify");
      const talkingPoints = renderBullets(bento.talkingPoints, "bento-talking");
      const flow = renderFlow(bento.flow);
      const conclusion = bento.conclusion
        ? `<div class="bento-conclusion-inner">
             <div class="bento-conclusion-mark">// the takeaway</div>
             <div class="bento-conclusion-text">${escape(bento.conclusion)}</div>
           </div>`
        : `<div class="bento-conclusion-inner">
             <div class="bento-empty">// no conclusion</div>
           </div>`;

      root.innerHTML = `
        <article class="bento-doc" data-bento-paper>
          <header class="bento-header">
            ${bento.source ? `<div class="bento-source">${escape(bento.source)}</div>` : ""}
            <h1 class="bento-title">${escape(bento.title || "")}</h1>
            ${bento.kicker ? `<div class="bento-kicker"><span class="bento-kicker-text">${escape(bento.kicker)}</span></div>` : ""}
          </header>

          <div class="bento-grid">
            <section class="bento-milestones-card">
              <div class="bento-milestones-head">
                <div class="bento-milestones-title">Timeline</div>
                <div class="bento-milestones-sub">// 3 milestones</div>
              </div>
              <div class="bento-timeline">${milestones}</div>
            </section>

            <div class="bento-col-right">
              ${rankedBars}
              ${verification}
              ${talkingPoints}
            </div>
          </div>

          <div class="bento-bottom">
            <section class="bento-conclusion">${conclusion}</section>
            ${flow}
          </div>

          <footer class="bento-footer">
            <span class="bento-footer-left">${escape(bento.footerTag || "")}</span>
            <span class="bento-footer-right">
              <span class="accent-swatch"></span>
              accent · <span style="font-family: var(--mono)">--accent</span>
            </span>
          </footer>
        </article>`;
    }

    /* ─── Export wiring ──────────────────────────────────────────────
       Both PNG and PDF go through the SAME canvas-snapshot path · the
       browser's native print engine handles CSS Grid / absolute
       positioning unreliably (grid items break across pages, the
       `.bento-source` absolute element gets misplaced, the document
       reflows when max-width is removed for print). So we capture the
       bento as a single PNG once, then:
         · PNG · download directly
         · PDF · open a trivial print page that contains JUST the PNG +
           `@page` sizing, then `window.print()`. The print engine sees
           no grid / no absolute positioning, just a single image —
           always renders pixel-perfect.

       html-to-image is lazy-loaded from jsdelivr on first export click
       so it's free until used. */
    let _h2iLoaded = null;
    async function ensureHtmlToImage() {
      if (window.htmlToImage) return;
      if (!_h2iLoaded) {
        _h2iLoaded = new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js";
          s.onload = res;
          s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      await _h2iLoaded;
    }

    /** Capture .bento-doc as a PNG data URL. Two reliability fixes
     *  over the naive `toPng(el)` call:
     *    1. Pass explicit width/height from `scrollWidth/Height` ·
     *       html-to-image defaults to `getBoundingClientRect()` size,
     *       which can be smaller than the actual content height when
     *       the element sits inside a flex/grid container or a
     *       scroll viewport. Result: bottom half of the document
     *       gets clipped (the user's "PNG truncated" report).
     *    2. Wait for `document.fonts.ready` · web fonts settle
     *       asynchronously after layout. Capturing before they're
     *       loaded snapshots fallback glyphs, then the page
     *       re-renders with web fonts AFTER the snapshot — leaving
     *       the PNG looking different from what's on screen. */
    async function captureBentoPng() {
      const el = document.querySelector("[data-bento-paper]");
      if (!el) throw new Error("bento doc not found");
      await ensureHtmlToImage();
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch { /* best-effort */ }
      }
      const width = Math.max(el.scrollWidth, el.offsetWidth, el.clientWidth);
      const height = Math.max(el.scrollHeight, el.offsetHeight, el.clientHeight);
      return window.htmlToImage.toPng(el, {
        pixelRatio: 2,
        backgroundColor: "#FFFFFF",
        cacheBust: true,
        width,
        height,
        canvasWidth: width,
        canvasHeight: height,
        // Pin the captured element to its natural width so flex/grid
        // ancestors don't squeeze it during snapshot.
        style: {
          margin: "0",
          width: `${width}px`,
          height: `${height}px`,
        },
      });
    }

    function slugTitle() {
      return (document.title || "bento").replace(/[^a-z0-9]+/gi, "-").slice(0, 60) || "bento";
    }

    async function exportPng() {
      try {
        const dataUrl = await captureBentoPng();
        const a = document.createElement("a");
        a.download = `${slugTitle()}.png`;
        a.href = dataUrl;
        a.click();
      } catch (e) {
        console.warn("[bento] PNG export failed:", e);
        alert("PNG export failed · see browser console.");
      }
    }

    /** PDF export · capture as PNG, embed in a minimal print-only page,
     *  trigger window.print(). The print engine sees a single `<img>`
     *  filling the page — no grid, no absolute positioning, no font
     *  loading races · always pixel-perfect. User picks "Save as PDF"
     *  in the print dialog to get the PDF file. */
    async function exportPdf() {
      try {
        const dataUrl = await captureBentoPng();
        const win = window.open("", "_blank", "width=1024,height=720");
        if (!win) {
          alert("PDF export needs to open a new window — please allow popups for this site.");
          return;
        }
        const slug = slugTitle();
        win.document.open();
        win.document.write(`<!doctype html><html lang="en"><head>
          <meta charset="utf-8">
          <title>${slug}</title>
          <style>
            @page { size: auto; margin: 10mm; }
            * { box-sizing: border-box; margin: 0; padding: 0; }
            html, body { background: #FFFFFF; }
            body {
              display: flex;
              align-items: flex-start;
              justify-content: center;
              padding: 20px;
              min-height: 100vh;
            }
            img {
              display: block;
              width: 100%;
              max-width: 840px;
              height: auto;
              box-shadow: 0 0 24px rgba(0, 0, 0, 0.08);
            }
            @media print {
              body { padding: 0; }
              img { box-shadow: none; max-width: none; width: 100%; }
            }
            .hint {
              position: fixed;
              top: 12px;
              left: 12px;
              font-family: ui-monospace, "SF Mono", Menlo, monospace;
              font-size: 11px;
              color: #8E8B83;
              background: rgba(255,255,255,0.9);
              padding: 6px 10px;
              border: 0.5px solid #E5E2DA;
            }
            @media print { .hint { display: none; } }
          </style>
        </head><body>
          <div class="hint">// press <kbd>⌘P</kbd> / <kbd>Ctrl+P</kbd> · save as PDF</div>
          <img alt="${slug}" src="${dataUrl}">
          <script>
            // Auto-fire the print dialog once the image has decoded.
            // Some browsers (Safari) ignore window.print() before the
            // image is rendered, so wait for the load event.
            (function () {
              var img = document.querySelector("img");
              function go() { setTimeout(function () { window.print(); }, 200); }
              if (img && img.complete) { go(); }
              else if (img) { img.addEventListener("load", go, { once: true }); }
            })();
          <\/script>
        </body></html>`);
        win.document.close();
      } catch (e) {
        console.warn("[bento] PDF export failed:", e);
        alert("PDF export failed · see browser console.");
      }
    }

    document.addEventListener("click", (e) => {
      if (e.target.closest("[data-bento-png]")) {
        e.preventDefault();
        exportPng();
        return;
      }
      if (e.target.closest("[data-bento-print]")) {
        e.preventDefault();
        exportPdf();
        return;
      }
    });

    /* ─── Boot ──────────────────────────────────────────────────── */
    loadBrief().then((brief) => {
      if (brief) render(brief);
    }).catch((e) => {
      console.error("[bento] load failed:", e);
      showState("// error", "Couldn't load this brief",
        e instanceof Error ? e.message : String(e));
    });
  })();
  </script>

</body>
</html>
