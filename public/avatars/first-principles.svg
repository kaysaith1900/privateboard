<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -4 48 56" shape-rendering="crispEdges">
  <!-- 48×52 head-only · First Principles · rounded face, dark hair,
       royal-blue square glasses, sharp brows, neck stub.
       skin    #FFE5C5 · #FFCFA2 · #F2B585 · #D69570 · #A8704A · #5A3520
       hair    #3A5A9C · #1F2A4A · #0A0A1A · #7AA0F0
       glass   #2C4AAB · #1A2F7A · highlight #7BA0E8 · deep #0E1F5A
  -->

  <!-- ═══ HAIR · neat short cut, shaped to the rounded head ═══ -->
  <rect x="14" y="3" width="20" height="1" fill="#0A0A1A"/>
  <rect x="11" y="4" width="26" height="2" fill="#1F2A4A"/>
  <rect x="9"  y="6" width="30" height="2" fill="#1F2A4A"/>
  <rect x="9"  y="8" width="30" height="2" fill="#3A5A9C"/>
  <!-- side hair (chamfered to match rounded head) -->
  <rect x="9"  y="10" width="2" height="3" fill="#1F2A4A"/>
  <rect x="37" y="10" width="2" height="3" fill="#1F2A4A"/>
  <rect x="11" y="10" width="2" height="2" fill="#1F2A4A"/>
  <rect x="35" y="10" width="2" height="2" fill="#1F2A4A"/>
  <!-- hair sheen -->
  <rect x="14" y="5" width="6" height="1" fill="#7AA0F0"/>
  <rect x="24" y="5" width="6" height="1" fill="#7AA0F0"/>
  <rect x="11" y="7" width="5" height="1" fill="#7AA0F0"/>
  <rect x="28" y="7" width="5" height="1" fill="#7AA0F0"/>

  <!-- ═══ ROUNDED HEAD outline ═══ -->
  <rect x="13" y="10" width="22" height="1" fill="#5A3520"/>
  <rect x="11" y="11" width="2"  height="1" fill="#5A3520"/>
  <rect x="35" y="11" width="2"  height="1" fill="#5A3520"/>
  <rect x="9"  y="12" width="2"  height="1" fill="#5A3520"/>
  <rect x="37" y="12" width="2"  height="1" fill="#5A3520"/>
  <rect x="8"  y="13" width="1"  height="17" fill="#5A3520"/>
  <rect x="39" y="13" width="1"  height="17" fill="#5A3520"/>
  <rect x="9"  y="30" width="2"  height="1" fill="#5A3520"/>
  <rect x="37" y="30" width="2"  height="1" fill="#5A3520"/>
  <rect x="11" y="31" width="2"  height="1" fill="#5A3520"/>
  <rect x="35" y="31" width="2"  height="1" fill="#5A3520"/>
  <rect x="13" y="32" width="22" height="1" fill="#5A3520"/>
  <!-- skin fill (rounded interior) -->
  <rect x="13" y="10" width="22" height="1" fill="#F2B585"/>
  <rect x="11" y="11" width="26" height="1" fill="#F2B585"/>
  <rect x="9"  y="12" width="30" height="1" fill="#F2B585"/>
  <rect x="9"  y="13" width="30" height="17" fill="#F2B585"/>
  <rect x="9"  y="30" width="30" height="1" fill="#F2B585"/>
  <rect x="11" y="31" width="26" height="1" fill="#F2B585"/>
  <rect x="13" y="32" width="22" height="1" fill="#F2B585"/>
  <!-- forehead highlight -->
  <rect x="13" y="11" width="22" height="2" fill="#FFCFA2"/>
  <rect x="14" y="12" width="20" height="1" fill="#FFE5C5"/>
  <!-- temple shadow -->
  <rect x="9"  y="18" width="2"  height="9" fill="#A8704A"/>
  <rect x="37" y="18" width="2"  height="9" fill="#A8704A"/>
  <!-- cheekbone highlight -->
  <rect x="11" y="22" width="3" height="2" fill="#FFCFA2"/>
  <rect x="34" y="22" width="3" height="2" fill="#FFCFA2"/>
  <!-- jaw shadow -->
  <rect x="11" y="27" width="26" height="2" fill="#D69570"/>
  <rect x="13" y="29" width="22" height="2" fill="#A8704A"/>

  <!-- SHARP ANGLED EYEBROWS -->
  <rect x="13" y="14" width="9" height="1" fill="#0A0A1A"/>
  <rect x="26" y="14" width="9" height="1" fill="#0A0A1A"/>
  <rect x="20" y="15" width="2" height="1" fill="#0A0A1A"/>
  <rect x="26" y="15" width="2" height="1" fill="#0A0A1A"/>

  <!-- ═══ ROYAL-BLUE SQUARE GLASSES ═══ -->
  <rect x="11" y="16" width="11" height="1" fill="#0E1F5A"/>
  <rect x="11" y="22" width="11" height="1" fill="#0E1F5A"/>
  <rect x="11" y="17" width="1"  height="5" fill="#0E1F5A"/>
  <rect x="21" y="17" width="1"  height="5" fill="#0E1F5A"/>
  <rect x="26" y="16" width="11" height="1" fill="#0E1F5A"/>
  <rect x="26" y="22" width="11" height="1" fill="#0E1F5A"/>
  <rect x="26" y="17" width="1"  height="5" fill="#0E1F5A"/>
  <rect x="36" y="17" width="1"  height="5" fill="#0E1F5A"/>
  <rect x="12" y="16" width="9" height="1" fill="#1A2F7A"/>
  <rect x="27" y="16" width="9" height="1" fill="#1A2F7A"/>
  <rect x="12" y="17" width="1" height="5" fill="#1A2F7A"/>
  <rect x="20" y="17" width="1" height="5" fill="#1A2F7A"/>
  <rect x="27" y="17" width="1" height="5" fill="#1A2F7A"/>
  <rect x="35" y="17" width="1" height="5" fill="#1A2F7A"/>
  <rect x="22" y="18" width="4" height="1" fill="#1A2F7A"/>
  <rect x="9"  y="18" width="2" height="1" fill="#0E1F5A"/>
  <rect x="37" y="18" width="2" height="1" fill="#0E1F5A"/>
  <rect x="13" y="17" width="3" height="1" fill="#7BA0E8"/>
  <rect x="28" y="17" width="3" height="1" fill="#7BA0E8"/>
  <!-- eyes behind lenses -->
  <rect x="14" y="18" width="6" height="3" fill="#FFFFFF"/>
  <rect x="28" y="18" width="6" height="3" fill="#FFFFFF"/>
  <rect x="15" y="19" width="3" height="2" fill="#1F1F1F"/>
  <rect x="29" y="19" width="3" height="2" fill="#1F1F1F"/>
  <rect x="16" y="19" width="1" height="1" fill="#FFFFFF"/>
  <rect x="30" y="19" width="1" height="1" fill="#FFFFFF"/>

  <!-- ═══ NOSE ═══ -->
  <rect x="22" y="19" width="4" height="6" fill="#F2B585"/>
  <rect x="22" y="19" width="1" height="6" fill="#FFCFA2"/>
  <rect x="22" y="19" width="1" height="3" fill="#FFE5C5"/>
  <rect x="25" y="21" width="1" height="4" fill="#D69570"/>
  <rect x="22" y="25" width="4" height="1" fill="#A8704A"/>
  <rect x="21" y="25" width="1" height="1" fill="#A8704A"/>
  <rect x="26" y="25" width="1" height="1" fill="#A8704A"/>

  <!-- ═══ FIRM MOUTH ═══ -->
  <rect x="18" y="26" width="12" height="1" fill="#5A3520"/>
  <rect x="17" y="27" width="1"  height="1" fill="#5A3520"/>
  <rect x="30" y="27" width="1"  height="1" fill="#5A3520"/>

  <!-- ═══ NECK STUB ═══ -->
  <rect x="19" y="33" width="10" height="6" fill="#F2B585"/>
  <rect x="19" y="33" width="10" height="1" fill="#A8704A"/>
  <rect x="19" y="33" width="1"  height="6" fill="#A8704A"/>
  <rect x="28" y="33" width="1"  height="6" fill="#A8704A"/>
  <rect x="20" y="34" width="8"  height="1" fill="#FFCFA2"/>
  <!-- collar shadow at very bottom -->
  <rect x="14" y="39" width="20" height="2" fill="#A8704A" opacity="0.6"/>
  <rect x="13" y="41" width="22" height="3" fill="#5A3520" opacity="0.4"/>

  <!-- sparkles -->
  <rect x="2"  y="14" width="1" height="1" fill="#FFFFFF"/>
  <rect x="44" y="15" width="1" height="1" fill="#FFFFFF"/>
  <rect x="1"  y="25" width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="46" y="28" width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
</svg>
