<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -4 48 56" shape-rendering="crispEdges">
  <!-- 48×52 head-only · Phenomenologist · rounded face, crimson knit
       beanie + pom-pom, hazel eyes, asymmetric half-smile, neck stub.
       skin    #FFE5C5 · #FFCFA2 · #F2B585 · #D69570 · #A8704A · #5A3520
       beanie  #FFE560 · #FFC830 · #F2A820 · #C98818 · #A06814 · #7A4F0A
       pom     #FFFFFF · #E5E2D8 · #B8B0A0 · #8E8675
       hair    #5A3825 · #3F2818 · #2A1A12
  -->

  <!-- POM-POM -->
  <rect x="22" y="1" width="4" height="1" fill="#8E8675"/>
  <rect x="21" y="2" width="6" height="2" fill="#FFFFFF"/>
  <rect x="22" y="4" width="4" height="1" fill="#E5E2D8"/>
  <rect x="20" y="3" width="1" height="1" fill="#B8B0A0"/>
  <rect x="27" y="3" width="1" height="1" fill="#B8B0A0"/>

  <!-- BEANIE -->
  <rect x="14" y="5" width="20" height="1" fill="#7A4F0A"/>
  <rect x="11" y="6" width="26" height="1" fill="#A06814"/>
  <rect x="9"  y="7" width="30" height="1" fill="#C98818"/>
  <rect x="9"  y="8" width="30" height="3" fill="#F2A820"/>
  <rect x="9"  y="11" width="30" height="2" fill="#FFC830"/>
  <rect x="9"  y="13" width="30" height="3" fill="#F2A820"/>
  <!-- ribbing -->
  <rect x="11" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="14" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="17" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="20" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="23" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="26" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="29" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="32" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="35" y="13" width="1" height="3" fill="#A06814"/>
  <rect x="9"  y="6" width="1" height="10" fill="#7A4F0A"/>
  <rect x="38" y="6" width="1" height="10" fill="#7A4F0A"/>
  <rect x="13" y="9" width="4" height="1" fill="#FFE560"/>
  <rect x="22" y="9" width="4" height="1" fill="#FFE560"/>

  <!-- hair tufts peeking from beanie -->
  <rect x="9"  y="16" width="2" height="1" fill="#2A1A12"/>
  <rect x="13" y="16" width="2" height="1" fill="#3F2818"/>
  <rect x="33" y="16" width="2" height="1" fill="#3F2818"/>
  <rect x="37" y="16" width="2" height="1" fill="#2A1A12"/>

  <!-- ═══ ROUNDED HEAD ═══ -->
  <rect x="13" y="16" width="22" height="1" fill="#5A3520"/>
  <rect x="11" y="17" width="2"  height="1" fill="#5A3520"/>
  <rect x="35" y="17" width="2"  height="1" fill="#5A3520"/>
  <rect x="9"  y="17" width="2"  height="1" fill="#5A3520"/>
  <rect x="37" y="17" width="2"  height="1" fill="#5A3520"/>
  <rect x="8"  y="18" width="1"  height="14" fill="#5A3520"/>
  <rect x="39" y="18" width="1"  height="14" fill="#5A3520"/>
  <rect x="9"  y="32" width="2"  height="1" fill="#5A3520"/>
  <rect x="37" y="32" width="2"  height="1" fill="#5A3520"/>
  <rect x="11" y="33" width="2"  height="1" fill="#5A3520"/>
  <rect x="35" y="33" width="2"  height="1" fill="#5A3520"/>
  <rect x="13" y="34" width="22" height="1" fill="#5A3520"/>
  <rect x="13" y="16" width="22" height="1" fill="#F2B585"/>
  <rect x="11" y="17" width="26" height="1" fill="#F2B585"/>
  <rect x="9"  y="17" width="30" height="1" fill="#F2B585"/>
  <rect x="9"  y="18" width="30" height="14" fill="#F2B585"/>
  <rect x="9"  y="32" width="30" height="1" fill="#F2B585"/>
  <rect x="11" y="33" width="26" height="1" fill="#F2B585"/>
  <rect x="13" y="34" width="22" height="1" fill="#F2B585"/>
  <rect x="13" y="17" width="22" height="2" fill="#FFCFA2"/>
  <rect x="14" y="18" width="20" height="1" fill="#FFE5C5"/>
  <rect x="9"  y="22" width="2"  height="9" fill="#A8704A"/>
  <rect x="37" y="22" width="2"  height="9" fill="#A8704A"/>
  <rect x="11" y="29" width="26" height="2" fill="#D69570"/>
  <rect x="13" y="31" width="22" height="2" fill="#A8704A"/>

  <!-- chestnut brows (right slightly raised · curious) -->
  <rect x="13" y="19" width="7" height="1" fill="#3F2818"/>
  <rect x="28" y="19" width="7" height="1" fill="#3F2818"/>
  <rect x="28" y="18" width="3" height="1" fill="#3F2818"/>

  <!-- EYES · hazel iris -->
  <rect x="13" y="21" width="7" height="3" fill="#FFFFFF"/>
  <rect x="28" y="21" width="7" height="3" fill="#FFFFFF"/>
  <rect x="14" y="21" width="4" height="3" fill="#7A5A3A"/>
  <rect x="29" y="21" width="4" height="3" fill="#7A5A3A"/>
  <rect x="15" y="21" width="2" height="2" fill="#1F1F1F"/>
  <rect x="30" y="21" width="2" height="2" fill="#1F1F1F"/>
  <rect x="15" y="21" width="1" height="1" fill="#FFFFFF"/>
  <rect x="30" y="21" width="1" height="1" fill="#FFFFFF"/>

  <!-- ROUND HIPSTER GLASSES (signature · big black John Lennon style) -->
  <!-- Left lens · round outline (5w × 4h) -->
  <rect x="13" y="20" width="6" height="1" fill="#1A1A1A"/>
  <rect x="13" y="24" width="6" height="1" fill="#1A1A1A"/>
  <rect x="12" y="21" width="1" height="3" fill="#1A1A1A"/>
  <rect x="19" y="21" width="1" height="3" fill="#1A1A1A"/>
  <!-- subtle lens shine -->
  <rect x="14" y="21" width="1" height="1" fill="#7A5A3A" opacity="0.5"/>
  <!-- Right lens · round outline -->
  <rect x="28" y="20" width="6" height="1" fill="#1A1A1A"/>
  <rect x="28" y="24" width="6" height="1" fill="#1A1A1A"/>
  <rect x="27" y="21" width="1" height="3" fill="#1A1A1A"/>
  <rect x="34" y="21" width="1" height="3" fill="#1A1A1A"/>
  <rect x="29" y="21" width="1" height="1" fill="#7A5A3A" opacity="0.5"/>
  <!-- Bridge between lenses -->
  <rect x="20" y="22" width="7" height="1" fill="#1A1A1A"/>
  <!-- Temple arms (extending out to sides) -->
  <rect x="9"  y="22" width="3" height="1" fill="#1A1A1A"/>
  <rect x="35" y="22" width="3" height="1" fill="#1A1A1A"/>

  <!-- NOSE -->
  <rect x="22" y="22" width="4" height="5" fill="#F2B585"/>
  <rect x="22" y="22" width="1" height="5" fill="#FFCFA2"/>
  <rect x="25" y="24" width="1" height="3" fill="#D69570"/>
  <rect x="22" y="27" width="4" height="1" fill="#A8704A"/>

  <!-- ASYMMETRIC HALF-SMILE -->
  <rect x="17" y="28" width="14" height="1" fill="#7A4838"/>
  <rect x="29" y="29" width="3" height="1" fill="#7A4838"/>
  <rect x="18" y="29" width="13" height="1" fill="#D67F5C"/>

  <!-- NECK STUB -->
  <rect x="19" y="35" width="10" height="6" fill="#F2B585"/>
  <rect x="19" y="35" width="10" height="1" fill="#A8704A"/>
  <rect x="19" y="35" width="1"  height="6" fill="#A8704A"/>
  <rect x="28" y="35" width="1"  height="6" fill="#A8704A"/>
  <rect x="20" y="36" width="8"  height="1" fill="#FFCFA2"/>
  <!-- collar shadow -->
  <rect x="14" y="41" width="20" height="2" fill="#A8704A" opacity="0.55"/>
  <rect x="13" y="43" width="22" height="3" fill="#5A3520" opacity="0.35"/>

  <rect x="2"  y="14" width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="44" y="15" width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
</svg>
